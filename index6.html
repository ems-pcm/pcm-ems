  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  // QRMode

  var QRMode = {

    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,

    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,

    PATTERN101 : 5,
    PATTERN110 : 6,

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],
      [6, 30],
      [6, 34],
      [6, 22, 38],
      [6, 24, 42],
      [6, 26, 46],

<style>
/* ====================== DESIGN TOKENS — single brand color ====================== */
:root{
  --brand:#0E7C7B;          /* the one brand color (deep teal) */
  --brand-700:#0A5F5E;
  --brand-600:#0E7C7B;
  --brand-300:#5CB0AE;
  --brand-tint:#E7F2F1;
  --brand-tint-2:#F2F8F7;

  --ink:#13211F;            /* near-black with a teal cast */
  --ink-2:#3D514E;
  --muted:#6E817E;
  --line:#E2E8E6;
  --line-2:#EEF3F2;
  --surface:#FFFFFF;
  --bg:#F6F8F7;

  /* functional status colors (not decoration) */
  --ok:#147D55; --ok-bg:#E5F4ec;
  --warn:#9A6700; --warn-bg:#FBF1DA;
  --bad:#B42318; --bad-bg:#FCEBE9;
  --info:#1F5FA8; --info-bg:#E8F0FA;

  --r:14px; --r-sm:10px; --r-lg:20px;
  --shadow:0 1px 2px rgba(19,33,31,.04), 0 8px 24px -12px rgba(19,33,31,.18);
  --shadow-lg:0 24px 60px -24px rgba(19,33,31,.35);
  --font-d:'Space Grotesk', system-ui, sans-serif;
  --font-b:'Inter', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--brand-700)}
h1,h2,h3{font-family:var(--font-d);margin:0;letter-spacing:-.01em}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd8d6;border-radius:20px;border:3px solid var(--bg)}

/* ====================== BUTTONS / CHIPS / INPUTS ====================== */
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;border-radius:var(--r-sm);
  padding:9px 14px;font-size:14px;font-weight:600;background:var(--surface);color:var(--ink);transition:.15s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-700)}
.btn.ghost{background:transparent;border-color:var(--line)}
.btn.ghost:hover{background:var(--brand-tint-2);border-color:var(--brand-300)}
.btn.subtle{background:var(--brand-tint);color:var(--brand-700)}
.btn.danger{background:var(--bad-bg);color:var(--bad)}
.btn.danger:hover{background:var(--bad);color:#fff}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn.block{width:100%;justify-content:center}
.btn[disabled]{opacity:.5;pointer-events:none}
.iconbtn{border:1px solid var(--line);background:#fff;border-radius:8px;width:32px;height:32px;display:inline-grid;place-items:center;color:var(--ink-2)}
.iconbtn:hover{border-color:var(--brand-300);color:var(--brand-700)}

.field{display:block;margin-bottom:14px}
.field > label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field .req{color:var(--bad)}
.input,select.input,textarea.input{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);
  padding:10px 12px;background:#fff;color:var(--ink);transition:.15s;outline:none}
.input:focus,textarea.input:focus,select.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
textarea.input{min-height:92px;resize:vertical}
.hint{font-size:12px;color:var(--muted);margin-top:5px}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.01em}
.chip.ok{background:var(--ok-bg);color:var(--ok)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}
.chip.bad{background:var(--bad-bg);color:var(--bad)}
.chip.info{background:var(--info-bg);color:var(--info)}
.chip.muted{background:var(--line-2);color:var(--ink-2)}
.chip.brand{background:var(--brand-tint);color:var(--brand-700)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}

/* ====================== LAYOUT SHELL ====================== */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:#fff;border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;padding:18px 14px}
.brandmark{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.brandmark .logo{width:38px;height:38px;border-radius:11px;background:var(--brand);display:grid;place-items:center;color:#fff;font-family:var(--font-d);font-weight:700;font-size:18px;box-shadow:var(--shadow)}
.brandmark b{font-family:var(--font-d);font-size:16px;display:block;line-height:1.1}
.brandmark span{font-size:11.5px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.nav .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 10px 6px;font-weight:700}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--ink-2);text-decoration:none;font-weight:500;font-size:14px;position:relative}
.nav a:hover{background:var(--brand-tint-2);color:var(--ink)}
.nav a.active{background:var(--brand-tint);color:var(--brand-700);font-weight:600}
.nav a .ic{width:18px;height:18px;flex:none}
.nav a .badge{margin-left:auto;background:var(--brand);color:#fff;font-size:11px;font-weight:700;border-radius:999px;min-width:20px;height:20px;display:grid;place-items:center;padding:0 5px}
.side .foot{margin-top:auto;border-top:1px solid var(--line-2);padding-top:12px}
.side .who{display:flex;align-items:center;gap:10px;padding:6px 8px}
.side .who .av{width:32px;height:32px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
.side .who small{display:block;color:var(--muted);font-size:11.5px}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(246,248,247,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:14px}
.topbar .mh{display:none}
.topbar h1{font-size:19px}
.topbar .crumb{font-size:12.5px;color:var(--muted);font-weight:500}
.topbar .spacer{flex:1}
.content{padding:24px 26px 60px;max-width:1200px;width:100%;margin:0 auto}

/* ====================== CARDS / GRID / TABLE ====================== */
.grid{display:grid;gap:16px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
.stat .v{font-family:var(--font-d);font-size:30px;font-weight:700;margin-top:8px;letter-spacing:-.02em}
.stat .s{font-size:12px;color:var(--muted);margin-top:2px}
.stat .ic{width:30px;height:30px;border-radius:9px;background:var(--brand-tint);color:var(--brand-700);display:grid;place-items:center}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.panel .ph{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line-2)}
.panel .ph h2{font-size:15.5px}
.panel .ph .spacer{flex:1}
.panel .pb{padding:18px}
.panel .pb.flush{padding:0}

.tablewrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--brand-tint-2);position:sticky;top:0}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:var(--brand-tint-2)}
.tbl .name{font-weight:600;color:var(--ink)}
.tbl .sub{font-size:12px;color:var(--muted)}
.rowacts{display:flex;gap:6px;justify-content:flex-end}

.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .big{width:54px;height:54px;border-radius:14px;background:var(--brand-tint);color:var(--brand-700);display:grid;place-items:center;margin:0 auto 14px}
.empty h3{color:var(--ink);font-size:16px;margin-bottom:6px}

.eventcard{display:flex;flex-direction:column;gap:0}
.eventcard .top{padding:16px 18px;border-bottom:1px solid var(--line-2)}
.eventcard .cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.eventcard h3{font-size:16.5px;margin:8px 0 4px}
.eventcard .meta{font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:8px}
.eventcard .bot{padding:12px 18px;display:flex;align-items:center;gap:8px}
.cardgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

.tabs{display:flex;gap:4px;background:var(--line-2);padding:4px;border-radius:11px;width:fit-content;max-width:100%;overflow:auto}
.tabs button{border:none;background:transparent;padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-2);white-space:nowrap}
.tabs button.active{background:#fff;color:var(--brand-700);box-shadow:var(--shadow)}

/* timeline */
.tl{position:relative;padding-left:24px}
.tl::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl .it{position:relative;padding:0 0 16px}
.tl .it::before{content:"";position:absolute;left:-22px;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--brand-300)}
.tl .it.done::before{background:var(--brand);border-color:var(--brand)}
.tl .it .t{font-weight:600;font-size:13.5px}
.tl .it .d{font-size:12px;color:var(--muted)}

/* ====================== MODAL ====================== */
.modal-root{position:fixed;inset:0;z-index:100;display:none}
.modal-root.open{display:block}
.modal-bg{position:absolute;inset:0;background:rgba(19,33,31,.42);backdrop-filter:blur(2px);animation:fade .2s}
.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;border-radius:var(--r-lg);
  width:min(560px,calc(100vw - 32px));max-height:calc(100vh - 48px);overflow:auto;box-shadow:var(--shadow-lg);animation:pop .22s}
.modal.lg{width:min(720px,calc(100vw - 32px))}
.modal .mh{display:flex;align-items:flex-start;gap:12px;padding:20px 22px 8px}
.modal .mh h2{font-size:18px}
.modal .mh p{font-size:13px;color:var(--muted);margin:4px 0 0}
.modal .mh .x{margin-left:auto;border:none;background:var(--line-2);width:30px;height:30px;border-radius:8px;font-size:16px;color:var(--ink-2)}
.modal .mb{padding:8px 22px 6px}
.modal .mf{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:#fff}
@keyframes pop{from{opacity:0;transform:translate(-50%,-46%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* dynamic field builder */
.fieldrow{display:grid;grid-template-columns:1fr 120px 78px auto;gap:8px;align-items:end;padding:10px;border:1px solid var(--line-2);border-radius:10px;margin-bottom:8px;background:var(--brand-tint-2)}
.fieldrow .field{margin:0}
.fieldrow .field>label{font-size:11px}
.divider{height:1px;background:var(--line-2);margin:16px 0}
.subhead{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:6px 0 10px;display:flex;align-items:center;gap:8px}

/* toast */
.toasts{position:fixed;right:18px;bottom:18px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:11px 15px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;animation:slide .25s;max-width:330px}
.toast.ok{background:#0f5c4a}.toast.bad{background:#8c2018}.toast.warn{background:#7a5200}
.toast .tclose{margin-left:auto;background:rgba(255,255,255,.18);border:none;color:#fff;width:22px;height:22px;border-radius:6px;font-size:15px;line-height:1;cursor:pointer;flex:none}
.toast .tclose:hover{background:rgba(255,255,255,.3)}
@keyframes slide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ====================== PUBLIC / AUTH SCREENS ====================== */
.authwrap{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:radial-gradient(1200px 500px at 80% -10%, var(--brand-tint) 0%, transparent 60%), var(--bg)}
.authcard{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:min(440px,100%);overflow:hidden}
.authcard .head{padding:26px 28px 8px}
.authcard .head .logo{width:46px;height:46px;border-radius:13px;background:var(--brand);color:#fff;display:grid;place-items:center;font-family:var(--font-d);font-weight:700;font-size:22px;margin-bottom:14px}
.authcard .head h1{font-size:22px}
.authcard .head p{color:var(--muted);font-size:13.5px;margin:6px 0 0}
.authcard .body{padding:18px 28px 28px}

.public{min-height:100vh;background:radial-gradient(1000px 480px at 50% -12%, var(--brand-tint) 0, transparent 55%), var(--bg);padding:0 0 60px}
.public .pbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30}
.public .pbar-nav{margin-left:auto;display:flex;gap:8px}
.public .pbtn{border:1px solid var(--line);background:#fff;color:var(--ink-2);font-weight:600;font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer}
.public .pbtn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.public .wrap{max-width:680px;margin:0 auto;padding:24px 16px}
.portal-hero{background:linear-gradient(135deg,var(--brand) 0,var(--brand-700) 100%);color:#fff;border-radius:16px;padding:22px 22px 18px;margin-bottom:4px}
.portal-hero h3{margin:0 0 6px;font-family:var(--font-d);font-size:21px;color:#fff}
.portal-hero p{margin:0;color:rgba(255,255,255,.9);font-size:14px}
.portal-hero .herometa{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:13px;font-weight:600;color:rgba(255,255,255,.95)}
.tabs.big{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tabs.big button{padding:12px 10px;font-size:13.5px}
.loginbox{border:1px solid var(--line);border-radius:14px;padding:18px;background:#fff}
.loginbox .logintitle{font-family:var(--font-d);font-weight:700;font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.qrbox{display:grid;place-items:center;gap:10px}
.qrbox canvas,.qrbox img{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}

/* admit card */
.admit{border:2px solid var(--brand);border-radius:16px;overflow:hidden;background:#fff}
.admit .ah{background:var(--brand);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.admit .ah .logo{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-family:var(--font-d);font-weight:700}
.admit .ab{padding:18px 20px;display:grid;grid-template-columns:1fr 130px;gap:16px}
.admit dl{display:grid;grid-template-columns:120px 1fr;gap:6px 10px;margin:0;font-size:13.5px}
.admit dt{color:var(--muted);font-weight:600}
.admit dd{margin:0;font-weight:600}
.admit .seal{text-align:center}

/* ====================== RESPONSIVE ====================== */
@media (max-width:920px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .cardgrid{grid-template-columns:1fr}
}
@media (max-width:760px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;z-index:60;width:260px;transform:translateX(-105%);transition:.25s;box-shadow:var(--shadow-lg)}
  .side.open{transform:none}
  .scrim{position:fixed;inset:0;background:rgba(19,33,31,.4);z-index:55;display:none}
  .scrim.open{display:block}
  .topbar .mh{display:inline-grid}
  .content{padding:18px 16px 60px}
  .fieldrow{grid-template-columns:1fr 1fr;}
  .admit .ab{grid-template-columns:1fr}
  .admit .seal{justify-self:start}
}
@media (max-width:480px){
  .cards{grid-template-columns:1fr}
}
/* ---- per-program QR grid ---- */
.progqr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.progqr{border:1px solid var(--line-2);border-radius:12px;padding:12px;text-align:center}
.progqr .ttl{font-weight:600;font-size:13px;margin-bottom:8px}
/* ---- question paper builder ---- */
.kv{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13.5px;color:var(--ink-2)}
.qlist{display:flex;flex-direction:column;gap:10px}
.qrow{border:1px solid var(--line-2);border-radius:12px;padding:12px 14px}
.qtop{display:flex;align-items:flex-start;gap:8px;font-size:14px}
.qtop .spacer{flex:1}
.qopts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.qopt{font-size:12.5px;padding:4px 10px;border-radius:8px;background:var(--line-2);color:var(--ink-2)}
.qopt.correct{background:var(--ok-bg);color:var(--ok);font-weight:600}
.qoptrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.qoptrow input[type=radio]{width:18px;height:18px;accent-color:var(--brand)}
.gopts{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.gopt{font-size:13px;padding:8px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;text-align:left}
.gopt.key{border-color:var(--ok);color:var(--ok)}
.gopt.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.gopt.clr{color:var(--muted);border-style:dashed}
/* ---- printable answer sheet ---- */
.ansheet{background:#fff;color:#111;border:1px solid #ccc;border-radius:10px;padding:20px}
.ansheet .as-head{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:12px}
.ansheet .as-id{font-size:12.5px;line-height:1.9;color:#222}
.ansheet .as-tbl{width:100%;border-collapse:collapse;font-size:13px}
.ansheet .as-tbl th,.ansheet .as-tbl td{border:1px solid #999;padding:7px 9px;text-align:left}
.ansheet .as-tbl th{background:#f1f1f1}
.ansheet .as-tbl .qn{width:42px;text-align:center;font-weight:700}
.ansheet .as-note{font-size:12px;color:#333;margin:0 0 10px}
.ansheet .as-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 14px}
.ansheet .as-q{display:flex;align-items:center;gap:8px;border:1px solid #bbb;border-radius:8px;padding:7px 9px;break-inside:avoid}
.ansheet .as-q .qn{font-weight:700;min-width:26px;text-align:right}
.ansheet .as-q .qbubs{display:flex;flex-wrap:wrap;gap:4px}
.ansheet .bub{display:inline-grid;place-items:center;width:24px;height:24px;border:1.5px solid #333;border-radius:50%;font-size:11px;font-weight:700}
.ansheet .as-foot{margin-top:14px;font-size:12px;color:#333;border-top:1px solid #ccc;padding-top:8px}
@media (max-width:560px){ .ansheet .as-grid{grid-template-columns:repeat(2,1fr)} }
@media print{
  .no-print{display:none!important}
  body{background:#fff!important}
  /* Print ONLY the marked element (admit card / answer sheet) — hide everything else */
  body * { visibility:hidden!important; }
  .print-target, .print-target * { visibility:visible!important; }
  .modal-root,.modal-bg,.modal,.mb{position:static!important;background:none!important;box-shadow:none!important;overflow:visible!important;max-height:none!important;width:auto!important;transform:none!important;padding:0!important;border:0!important;margin:0!important}
  .print-target{position:fixed!important;left:0;top:0;width:100%!important;box-shadow:none!important;border-radius:0!important}
  @page{ margin:14mm; }
}

<body>
<div id="app"></div>
<div class="modal-root" id="modalRoot"></div>
<div class="toasts" id="toasts"></div>

<script>
/* =======================================================================
   Campus Desk — College Events & Entrance Management (single-file, local)
   Data lives in localStorage. No server. Works offline once libs cached.
   ======================================================================= */

/* ---------- tiny helpers ---------- */
const $  = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
const nowISO = ()=>new Date().toISOString();
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = iso => { if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?esc(iso):d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); };
const fmtDT = iso => { if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?esc(iso):d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); };

/* ---------- storage ---------- */
const DB = {
  read(k,def){ try{ const v=localStorage.getItem('cd_'+k); return v==null?def:JSON.parse(v); }catch(e){ return def; } },
  write(k,v){ localStorage.setItem('cd_'+k, JSON.stringify(v)); },
};
function seed(){
  if(!DB.read('admin',null)) DB.write('admin',{username:'admin',password:'admin123',name:'Administrator'});
  if(!DB.read('events',null)) DB.write('events',[]);
  if(!DB.read('apps',null))  DB.write('apps',[]);   // applicants / registrations (unified)
  if(!DB.read('trash',null)) DB.write('trash',[]);
}
seed();

const CATS = {
  college_event:  {label:'College Event',    icon:'🎓', color:'var(--brand)'},
  club_meeting:   {label:'Club Meeting',      icon:'🏛️', color:'#7A5AF8'},
  entrance_exam:  {label:'Entrance Exam',     icon:'📝', color:'#C9560E'},
  staff_meeting:  {label:'Staff Meeting',     icon:'🧑‍💼', color:'#1F5FA8'},
};
const COMMON_FIELDS = [
  {id:'f_name', label:'Full Name',     type:'text',  required:true},
  {id:'f_email',label:'Email',         type:'email', required:true},
  {id:'f_phone',label:'Phone',         type:'tel',   required:true},
];
/* status machine for entrance applicants */
const STATUS = {
  submitted:    {label:'Submitted',     chip:'warn'},
  approved:     {label:'Approved',      chip:'info'},
  rejected:     {label:'Rejected',      chip:'bad'},
  admit_issued: {label:'Admit issued',  chip:'brand'},
  present:      {label:'Present',       chip:'ok'},
  absent:       {label:'Absent',        chip:'bad'},
  result:       {label:'Result out',    chip:'ok'},
};

/* ---------- toast + confirm + modal ---------- */
function toast(msg,type=''){ const wrap=$('#toasts'); const t=document.createElement('div'); t.className='toast '+type;
  t.innerHTML=`<span>${esc(msg)}</span><button class="tclose" title="Dismiss" aria-label="Dismiss">×</button>`;
  const close=()=>{ t.style.opacity='0'; t.style.transition='.25s'; setTimeout(()=>t.remove(),250); };
  t.querySelector('.tclose').addEventListener('click',close);
  wrap.appendChild(t);
  // Messages stay until the user/admin closes them. Cap the stack so it can't grow forever.
  while(wrap.children.length>6) wrap.removeChild(wrap.firstChild);
}

function modal(html,opts={}){
  const root=$('#modalRoot');
  root.innerHTML=`<div class="modal-bg" data-close></div><div class="modal ${opts.lg?'lg':''}">${html}</div>`;
  root.classList.add('open');
  root.querySelector('[data-close]')?.addEventListener('click',closeModal);
  $$('.modal [data-x]',root).forEach(b=>b.addEventListener('click',closeModal));
  return root.querySelector('.modal');
}
function closeModal(){ $('#modalRoot').classList.remove('open'); $('#modalRoot').innerHTML=''; }
function confirmDelete({title,body,confirmText='Delete',danger=true,onYes}){
  modal(`<div class="mh"><div><h2>${esc(title)}</h2><p>${body}</p></div><button class="x" data-x>×</button></div>
    <div class="mf"><button class="btn ghost" data-x>Cancel</button>
    <button class="btn ${danger?'danger':'primary'}" id="cYes">${esc(confirmText)}</button></div>`);
  $('#cYes').onclick=()=>{ closeModal(); onYes&&onYes(); };
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- icons (inline svg) ---------- */
const I = {
  grid:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  cal:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 3v3M16 3v3"/></svg>',
  exam:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3.5h11l3 3V20.5H5z"/><path d="M15.5 3.5V7h3.5M8 12h8M8 16h5"/></svg>',
  check:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3.5 13l5 5L20.5 6"/></svg>',
  trash:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V4.5h6V7M6 7l1 13h10l1-13"/></svg>',
  gear:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>',
  users:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.4"/><path d="M3 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"/><path d="M16 5.2a3.2 3.2 0 010 6M21 20c0-2.8-1.6-4.6-3.5-5.2"/></svg>',
  award:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="5.2"/><path d="M8.5 13.5L7 21l5-2.5L17 21l-1.5-7.5"/></svg>',
  doc:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 12h6M9 16h6"/></svg>',
};

/* ============================ ROUTER ============================ */
function route(){ return (location.hash||'#/').replace(/^#/,''); }
function go(path){ location.hash = path; }
function render(){
  routeRender();
  setTimeout(paintInlineQR,0);
}
function routeRender(){
  const r = route();
  // PUBLIC: /r/<eventId>  (this is what the QR opens — registration / portal)
  if(r.startsWith('/r/')){ const parts=r.split('/'); const pi=parts.indexOf('p'); const prog=(pi>=0)?decodeURIComponent(parts[pi+1]||''):''; return renderPublic(parts[2], prog); }
  // ADMIN
  const session = DB.read('session',null);
  if(!session){ return renderAdminLogin(); }
  const seg = r.replace(/^\//,'').split('/');
  switch(seg[0]){
    case '': case 'dashboard': return shell('dashboard', viewDashboard());
    case 'events':   return seg[1] ? shell('events', viewEventDetail(seg[1])) : shell('events', viewEvents());
    case 'entrance': return seg[1] ? shell('entrance', viewEntranceDetail(seg[1])) : shell('entrance', viewEntrance());
    case 'papers':   return seg[1] ? shell('papers', viewPaperBuilder(seg[1])) : shell('papers', viewPapers());
    case 'attendance': return shell('attendance', viewAttendance());
    case 'results':  return shell('results', viewResults());
    case 'trash':    return shell('trash', viewTrash());
    case 'settings': return shell('settings', viewSettings());
    default: return shell('dashboard', viewDashboard());
  }
}
window.addEventListener('hashchange',render);

/* ============================ SHELL ============================ */
function counts(){
  const apps=DB.read('apps',[]);
  return {
    pending: apps.filter(a=>a.status==='submitted').length,
    trash: DB.read('trash',[]).length,
  };
}
function shell(active, html){
  const admin=DB.read('admin',{}); const c=counts();
  const nav=(href,icon,label,key,badge)=>`<a href="#/${href}" class="${active===key?'active':''}">${icon}<span>${label}</span>${badge?`<span class="badge">${badge}</span>`:''}</a>`;
  $('#app').innerHTML=`
  <div class="scrim" id="scrim"></div>
  <div class="shell">
    <aside class="side" id="side">
      <div class="brandmark"><div class="logo">C</div><div><b>Campus Desk</b><span>Events &amp; Entrance</span></div></div>
      <nav class="nav">
        <div class="label">Overview</div>
        ${nav('dashboard',I.grid,'Dashboard','dashboard')}
        ${nav('events',I.cal,'Events','events')}
        <div class="label">Admissions</div>
        ${nav('entrance',I.exam,'Entrance Exams','entrance')}
        ${nav('papers',I.doc,'Question Papers','papers')}
        ${nav('attendance',I.check,'Attendance','attendance')}
        ${nav('results',I.award,'Results','results')}
        <div class="label">System</div>
        ${nav('trash',I.trash,'Trash (Trace)','trash',c.trash||'')}
        ${nav('settings',I.gear,'Settings','settings')}
      </nav>
      <div class="foot">
        <div class="who"><div class="av">${esc((admin.name||'A')[0].toUpperCase())}</div>
          <div><b style="font-size:13.5px">${esc(admin.name||'Admin')}</b><small>Signed in</small></div></div>
        <button class="btn ghost block sm" style="margin-top:8px" onclick="logout()">Sign out</button>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">

function entranceTable(e,apps,tab){

  if(!rows.length) return emptyState('Nothing here yet','Applications submitted via the QR form will show up here.','',null);
  return `<div class="tablewrap"><table class="tbl"><thead><tr>
    <th>Applicant</th><th>Program</th><th>Symbol</th><th>Status</th><th>Result</th><th></th></tr></thead><tbody>

      return `<tr>

      <td><span class="chip ${st.chip}"><span class="dot"></span>${st.label}</span></td>
      <td>${a.result?`<b>${esc(a.result.outcome)}</b> <span class="sub">${a.result.marks!=null?a.result.marks:''}${a.result.rank?(' · Rank '+a.result.rank):''}</span>`:'<span class="sub">—</span>'}</td>

        ${['approved','admit_issued','present','absent','result'].includes(a.status)?`<button class="btn sm subtle" onclick="showAdmit('${a.id}')">Admit card</button>`:''}
        ${['approved','admit_issued','present','absent'].includes(a.status)?`<button class="btn sm ghost" onclick="publishResult('${a.id}')">Result</button>`:''}

        <button class="iconbtn" title="Delete" onclick="askDeleteEntry('${a.id}')">${I.trash}</button>
      </div></td></tr>`;}).join('')}

}

function saveAdmin(){ const a=DB.read('admin',{}); a.name=$('#setName').value.trim()||'Administrator'; a.username=$('#setUser').value.trim()||'admin'; a.password=$('#setPass').value||'admin123'; DB.write('admin',a); toast('Settings saved','ok'); render(); }
function exportBackup(){ const data={admin:DB.read('admin',{}),events:DB.read('events',[]),apps:DB.read('apps',[]),trash:DB.read('trash',[])};
  dl('campus-desk-backup.json', new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); toast('Backup downloaded','ok'); }
function importBackup(inp){ const f=inp.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{const d=JSON.parse(r.result);

/* ============================ QR ============================ */
/* Bulletproof on-screen QR: use the library's own image output (works without canvas quirks) */
function qrImg(text, sizePx){
  const qr=qrcode(0,'M'); qr.addData(String(text)); qr.make();
  const n=qr.getModuleCount(); const cell=Math.max(2, Math.floor((sizePx||220)/(n+8)));
  const img=document.createElement('img');
  img.src=qr.createDataURL(cell, cell*4);
  img.alt='QR code'; img.style.width='100%'; img.style.maxWidth=(sizePx||220)+'px'; img.style.height='auto'; img.style.imageRendering='pixelated'; img.style.display='block'; img.style.margin='0 auto';
  return img;
}
function qrInto(sel, text, sizePx){
  const box=(typeof sel==='string')?$(sel):sel; if(!box)return; box.innerHTML='';
  try{ box.appendChild(qrImg(text, sizePx)); }
  catch(e){ box.innerHTML='<p class="hint">Could not render QR — text too long.</p>'; }
}
function eventURL(id, program){ return location.origin+location.pathname+'#/r/'+id+(program?('/p/'+encodeURIComponent(program)):''); }
function showQR(id, program){
  const e=DB.read('events',[]).find(x=>x.id===id); const url=eventURL(id, program);
  modal(`<div class="mh"><div><h2>QR code</h2><p>${esc(e.title)}${program?(' · '+esc(program)):''}</p></div><button class="x" data-x>×</button></div>
    <div class="mb"><div class="qrbox"><div id="qrModal"></div>
      <div class="hint" style="text-align:center;word-break:break-all">${esc(url)}</div></div></div>
    <div class="mf"><button class="btn ghost" data-x>Close</button>
      <button class="btn subtle" onclick="closeModal();go('/r/${id}${program?('/p/'+encodeURIComponent(program)):''}')">Open form ↗</button>
      <button class="btn primary" onclick="downloadQR('${id}','${program?encodeURIComponent(program):''}')">⬇ Download QR</button></div>`);
  qrInto('#qrModal', url, 240);
}
function drawQR(sel,id,size){ qrInto(sel, eventURL(id), size); }
function downloadQR(id, programEnc){
  const e=DB.read('events',[]).find(x=>x.id===id); const program=programEnc?decodeURIComponent(programEnc):'';
  try{
    const c=qrCanvas(eventURL(id, program), 640);
    c.toBlob(b=>{ dl(`QR-${((e&&e.title)||'event').replace(/\s+/g,'-')}${program?('-'+program.replace(/\s+/g,'-')):''}.png`, b); toast('QR downloaded','ok'); });
  }catch(err){ toast('QR error','bad'); }
}

function paintInlineQR(){ const r=route(); const m=r.match(/^\/(events|entrance)\/(.+)/); if(m && $('#qrInline')) drawQR('#qrInline', m[2], 200);
  $$('[data-progqr]').forEach(el=>{ qrInto(el, el.getAttribute('data-progqr'), 150); }); }


/* ============================ ATTENDANCE EXCEL ============================ */
function exportEntries(eventId){
  const e=DB.read('events',[]).find(x=>x.id===eventId);
  const apps=DB.read('apps',[]).filter(a=>a.eventId===eventId);
  if(!apps.length){ toast('No entries to export','warn'); return; }
  const fieldsMeta=allFieldsFor(e);
  const rows=apps.map(a=>{ const o={}; fieldsMeta.forEach(f=>o[f.label]=a.data[f.id]||''); o['Attendance']=a.attendance||''; o['Submitted']=fmtDT(a.createdAt); return o; });
  sheetDownload(rows, `${(e.title||'event').replace(/\s+/g,'-')}-entries.xlsx`, 'Entries');
}
function exportAttendanceSheet(eventId){
  const e=DB.read('events',[]).find(x=>x.id===eventId);
  const apps=DB.read('apps',[]).filter(a=>a.eventId===eventId && ['approved','admit_issued','present','absent','result'].includes(a.status));
  if(!apps.length){ toast('No approved applicants yet','warn'); return; }
  // group/sort by program, build one workbook with a sheet per program
  if(!window.XLSX){ toast('Excel library not loaded','bad'); return; }
  const wb=XLSX.utils.book_new();
  const byProg={}; apps.forEach(a=>{ (byProg[a.program||'General']=byProg[a.program||'General']||[]).push(a); });
  Object.entries(byProg).forEach(([prog,list])=>{
    const rows=list.sort((x,y)=>(x.symbol||'').localeCompare(y.symbol||'')).map((a,i)=>({
      'SN':i+1,'Symbol No':a.symbol,'Name':a.data.f_name||'','DOB':a.dob||'','Program':prog,'Signature':'','Present (yes/no)':''}));
    const ws=XLSX.utils.json_to_sheet(rows); ws['!cols']=[{wch:5},{wch:16},{wch:24},{wch:14},{wch:16},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws, prog.slice(0,28)||'Sheet');
  });
  XLSX.writeFile(wb, `Attendance-${(e.title||'exam').replace(/\s+/g,'-')}.xlsx`);
  toast('Attendance sheet downloaded','ok');
}
function importAttendance(eventId,inp){
  const f=inp.files[0]; if(!f)return; if(!window.XLSX){ toast('Excel library not loaded','bad'); inp.value='';return; }
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'}); let updated=0;
      const apps=DB.read('apps',[]);
      wb.SheetNames.forEach(sn=>{
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn]);
        rows.forEach(row=>{
          const sym=String(row['Symbol No']||row['Symbol']||row['symbol']||'').trim();
          const present=String(row['Present (yes/no)']||row['Present']||row['present']||'').trim().toLowerCase();
          if(!sym)return;
          const a=apps.find(x=>x.eventId===eventId && (x.symbol||'').toLowerCase()===sym.toLowerCase());
          if(a){ const val=['yes','y','1','present','true','p'].includes(present)?'present':(present?'absent':a.attendance);
            if(val && val!==a.attendance){ a.attendance=val; a.status= val==='present'?'present':(a.status==='result'?'result':'absent');
              a.updatedAt=nowISO(); a.logs.push({at:nowISO(),action:'Attendance imported: '+val}); updated++; } }
        });
      });
      DB.write('apps',apps);
      recordUpload(eventId,'Attendance (Excel)',f.name,`${updated} updated`,f);
      toast(updated? `Attendance updated for ${updated} applicant(s)`:'No matching symbols found', updated?'ok':'warn');
      render();
    }catch(e){ toast('Could not read file','bad'); }
  };
  r.readAsBinaryString(f); inp.value='';
}
function sheetDownload(rows,name,sheet='Sheet1'){
  if(!window.XLSX){ toast('Excel library not loaded','bad'); return; }
  const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,sheet);
  XLSX.writeFile(wb,name); toast('Excel downloaded','ok');
}

/* ============================ RESULTS (upload & publish) ============================ */
function pick(row,keys){ for(const k of keys){ if(row[k]!=null && String(row[k]).trim()!=='') return row[k]; } return ''; }
function normOutcome(s){ const t=String(s).trim().toLowerCase();
  if(['pass','passed','p','selected','admit','admitted','qualified','y','yes'].includes(t)) return 'Pass';
  if(['fail','failed','f','rejected','reject','not qualified','no','n'].includes(t)) return 'Fail';
  if(['waitlist','wait','waiting','wl','hold'].includes(t)) return 'Waitlist';
  return String(s).trim(); }

  const evs=entranceEvents();
  if(!evs.length) return panelWrap('Results', emptyState('No entrance exams yet','Create an entrance exam first — then download its results template, fill in marks, and upload to publish.','New entrance exam',"openEventModal('entrance_exam')"));

  const published=apps.filter(a=>a.status==='result');
  return `

      ${evs.map(e=>{
        const list=apps.filter(a=>a.eventId===e.id);

          <div style="min-width:170px"><b>${esc(e.title)}</b><div class="hint">📆 ${fmtDate(e.date)} · ${eligible} eligible · ${pub} published</div></div>
          <div class="spacer"></div>
          <button class="btn ghost sm" onclick="exportResultsTemplate('${e.id}')">⬇ Results template</button>
          <label class="btn primary sm" style="margin:0">⬆ Upload results<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importResults('${e.id}',this)"></label>
          <button class="btn subtle sm" onclick="go('/entrance/${e.id}');setTab('results')">Open exam</button>
        </div>`;
      }).join('')}
    </div>
  </div>
  ${published.length?`
  <div class="panel" style="margin-top:16px">
    <div class="ph"><h2>Published results</h2><span class="chip muted">${published.length}</span></div>
    <div class="pb flush"><div class="tablewrap"><table class="tbl"><thead><tr>
      <th>Applicant</th><th>Symbol</th><th>Outcome</th><th>Marks</th><th>Admission</th><th>Message</th></tr></thead><tbody>
      ${published.sort((x,y)=>(x.symbol||'').localeCompare(y.symbol||'')).map(a=>`<tr>
        <td><div class="name">${esc(a.data.f_name||'—')}</div><div class="sub">DOB ${esc(a.dob||'—')}</div></td>
        <td><span class="chip brand">${esc(a.symbol||'—')}</span></td>
        <td><b>${esc(a.result.outcome)}</b></td>
        <td>${a.result.marks!=null?a.result.marks:'—'}</td>
        <td>${a.result.admission&&a.result.admission.offered?'<span class="chip ok">Offered</span>':'<span class="sub">—</span>'}</td>
        <td class="sub">${esc(a.result.message||a.result.remarks||'—')}</td></tr>`).join('')}
    </tbody></table></div></div>
  </div>`:''}`;
}

function exportResultsTemplate(eventId){
  const e=DB.read('events',[]).find(x=>x.id===eventId);
  const apps=DB.read('apps',[]).filter(a=>a.eventId===eventId && ['approved','admit_issued','present','absent','result'].includes(a.status));
  if(!apps.length){ toast('No approved applicants yet — approve applicants first','warn'); return; }
  const rows=apps.sort((x,y)=>(x.symbol||'').localeCompare(y.symbol||'')).map(a=>({
    'Symbol No':a.symbol||'', 'Name':a.data.f_name||'', 'DOB':a.dob||'', 'Program':a.program||'',
    'Outcome (Pass/Fail/Waitlist)': a.result?a.result.outcome:'',
    'Marks': a.result&&a.result.marks!=null?a.result.marks:'',
    'Rank': a.result&&a.result.rank!=null?a.result.rank:'',
    'Message to student': a.result?(a.result.message||a.result.remarks||''):'',
    'Offer admission (yes/no)': a.result&&a.result.admission&&a.result.admission.offered?'yes':'',
    'Admission message': a.result&&a.result.admission?(a.result.admission.message||''):'' }));
  sheetDownload(rows, `Results-${(e.title||'exam').replace(/\s+/g,'-')}.xlsx`, 'Results');
}

function importResults(eventId,inp){
  const f=inp.files[0]; if(!f)return; if(!window.XLSX){ toast('Excel library not loaded','bad'); inp.value=''; return; }
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'}); let updated=0, missing=0;
      const apps=DB.read('apps',[]);
      wb.SheetNames.forEach(sn=>{
        XLSX.utils.sheet_to_json(wb.Sheets[sn]).forEach(row=>{
          const sym=String(pick(row,['Symbol No','Symbol','symbol'])||'').trim();
          const outcome=String(pick(row,['Outcome (Pass/Fail/Waitlist)','Outcome','Result','outcome'])||'').trim();
          if(!sym || !outcome) return; // skip blank/un-graded rows
          const a=apps.find(x=>x.eventId===eventId && (x.symbol||'').toLowerCase()===sym.toLowerCase());
          if(!a){ missing++; return; }
          const marksRaw=pick(row,['Marks','Score','marks']);
          const rankRaw=pick(row,['Rank','rank']);
          const msg=String(pick(row,['Message to student','Message','Remarks','message'])||'').trim();
          const offerRaw=String(pick(row,['Offer admission (yes/no)','Offer admission','Admission','admission'])||'').trim().toLowerCase();
          const admMsg=String(pick(row,['Admission message','admission message','Admission Message'])||'').trim();
          const offered=['yes','y','1','true','offer','offered','admit','admitted','selected'].includes(offerRaw);
          a.result={ outcome: normOutcome(outcome),
            marks: marksRaw!==''&&marksRaw!=null&&!isNaN(Number(marksRaw))?Number(marksRaw):null,
            rank: rankRaw!==''&&rankRaw!=null&&!isNaN(Number(rankRaw))?Number(rankRaw):null,
            remarks: msg, message: msg,
            admission: { offered, message: admMsg || (offered?('Congratulations! You are offered admission'+(a.program?(' to '+a.program):'')+'. Show the admission QR below at the admissions office to begin enrolment.'):'') } };
          a.status='result'; a.updatedAt=nowISO();
          a.logs.push({at:nowISO(),action:'Result published via Excel: '+a.result.outcome+(offered?' · admission offered':'')});
          updated++;
        });
      });
      DB.write('apps',apps);
      let m=updated?`Published results for ${updated} applicant(s)`:'No matching rows found';
      if(missing) m+=` · ${missing} symbol(s) not found`;
      toast(m, updated?'ok':'warn'); render();
    }catch(err){ toast('Could not read results file','bad'); }
  };
  r.readAsBinaryString(f); inp.value='';
}

/* ============================ QUESTION PAPERS (exam builder + grading) ============================ */
function examOf(e){ if(!e.exam) e.exam={questions:[],passMarks:0}; return e.exam; }
function paperTotal(ex){ return (ex.questions||[]).reduce((s,q)=>s+(Number(q.marks)||0),0); }
function letter(i){ return String.fromCharCode(65+i); }
function letterToIdx(L){ const c=String(L||'').trim().toUpperCase().charCodeAt(0)-65; return (c>=0&&c<26)?c:-1; }
function writeEvent(e){ const evs=DB.read('events',[]); const i=evs.findIndex(x=>x.id===e.id); if(i>=0){ evs[i]=e; DB.write('events',evs); } }
function examApproved(a){ return !!(a.exam && a.exam.approved); }

function questionRow(eid,q,i){
  return `<div class="qrow">
    <div class="qtop"><b>Q${i+1}.</b> <span>${esc(q.text)}</span>
      <span class="spacer"></span><span class="chip brand">${q.marks} mark${Number(q.marks)===1?'':'s'}</span>
      <button class="iconbtn" title="Edit" onclick="openQuestionModal('${eid}','${q.id}')">✎</button>
      <button class="iconbtn" title="Delete" onclick="deleteQuestion('${eid}','${q.id}')">${I.trash}</button></div>
    <div class="qopts">${(q.options||[]).map((o,oi)=>`<span class="qopt ${oi===q.correct?'correct':''}">${letter(oi)}. ${esc(o)}${oi===q.correct?' ✓':''}</span>`).join('')}</div>
  </div>`;
}

let qDraft=null;
function openQuestionModal(eid,qid){
  const e=DB.read('events',[]).find(x=>x.id===eid); const ex=examOf(e);
  const q = qid? ex.questions.find(x=>x.id===qid) : null;
  qDraft = q? JSON.parse(JSON.stringify(q)) : {id:uid('q'),text:'',options:['',''],correct:0,marks:1};
  modal(`<div class="mh"><div><h2>${qid?'Edit':'Add'} question</h2><p>${esc(e.title)}</p></div><button class="x" data-x>×</button></div>
    <div class="mb">
      <div class="field"><label>Question</label><textarea class="input" id="qText" rows="2" placeholder="Type the question">${esc(qDraft.text)}</textarea></div>
      <label style="display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px">Options — select the correct one</label>
      <div id="qOpts"></div>
      <button class="btn ghost sm" onclick="addQOption()" style="margin-top:4px">+ Add option</button>
      <div class="field" style="margin-top:14px;max-width:170px"><label>Marks for this question</label><input class="input" id="qMarks" type="number" min="1" value="${qDraft.marks}"></div>
    </div>
    <div class="mf"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" onclick="saveQuestion('${eid}','${qid||''}')">Save question</button></div>`,{lg:true});
  renderQOptions();
}
function renderQOptions(){
  const box=$('#qOpts'); if(!box)return;
  box.innerHTML=qDraft.options.map((o,i)=>`<div class="qoptrow">
    <input type="radio" name="qcorrect" ${i===qDraft.correct?'checked':''} onchange="qDraft.correct=${i}" title="Mark as correct">
    <input class="input" value="${esc(o)}" placeholder="Option ${letter(i)}" oninput="qDraft.options[${i}]=this.value">
    ${qDraft.options.length>2?`<button class="iconbtn" onclick="rmQOption(${i})" title="Remove">✕</button>`:''}
  </div>`).join('');
}
function addQOption(){ if(qDraft.options.length>=6){ toast('Up to 6 options','warn'); return; } qDraft.options.push(''); renderQOptions(); }
function rmQOption(i){ qDraft.options.splice(i,1); if(qDraft.correct>=qDraft.options.length) qDraft.correct=0; renderQOptions(); }
function saveQuestion(eid,qid){
  qDraft.text=$('#qText').value.trim(); qDraft.marks=Math.max(1,Number($('#qMarks').value)||1);
  const opts=qDraft.options.map(o=>String(o).trim());
  if(!qDraft.text){ toast('Enter the question','bad'); return; }
  if(opts.filter(o=>o).length<2){ toast('Add at least 2 options','bad'); return; }
  if(!opts[qDraft.correct]){ toast('Mark a non-empty option as correct','bad'); return; }
  const kept=[]; let correctIdx=0;
  opts.forEach((o,i)=>{ if(o){ if(i===qDraft.correct) correctIdx=kept.length; kept.push(o); } });
  qDraft.options=kept; qDraft.correct=correctIdx;
  const e=DB.read('events',[]).find(x=>x.id===eid); examOf(e);
  if(qid){ const i=e.exam.questions.findIndex(x=>x.id===qid); e.exam.questions[i]=qDraft; }
  else { e.exam.questions.push(qDraft); }
  writeEvent(e); closeModal(); toast('Question saved','ok'); render();
}
function deleteQuestion(eid,qid){
  const e=DB.read('events',[]).find(x=>x.id===eid);
  confirmDelete({title:'Delete question?',body:'This question will be removed from the paper.',confirmText:'Delete',onYes:()=>{
    examOf(e); e.exam.questions=e.exam.questions.filter(q=>q.id!==qid); writeEvent(e); toast('Question deleted','warn'); render();
  }});
}
function savePassMarks(eid,val){ const e=DB.read('events',[]).find(x=>x.id===eid); examOf(e); e.exam.passMarks=Math.max(0,Number(val)||0); writeEvent(e); toast('Pass marks saved','ok'); }

function exportQuestions(eid){
  const e=DB.read('events',[]).find(x=>x.id===eid); const ex=examOf(e);
  if(!ex.questions.length){ toast('No questions to export','warn'); return; }
  if(!window.XLSX){ toast('Excel library not loaded','bad'); return; }
  const maxOpt=Math.max(4,...ex.questions.map(q=>q.options.length));
  const rows=ex.questions.map((q,i)=>{ const o={'SN':i+1,'Question':q.text};
    for(let k=0;k<maxOpt;k++) o['Option '+letter(k)]=q.options[k]||'';
    o['Correct (A/B/C..)']=letter(q.correct); o['Marks']=q.marks; return o; });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Questions');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{'Total marks':paperTotal(ex),'Pass marks':ex.passMarks||0}]), 'Meta');
  XLSX.writeFile(wb, `Questions-${(e.title||'exam').replace(/\s+/g,'-')}.xlsx`); toast('Questions exported','ok');
}
function importQuestions(eid,inp){
  const f=inp.files[0]; if(!f)return; if(!window.XLSX){ toast('Excel library not loaded','bad'); inp.value=''; return; }
  const r=new FileReader();
  r.onload=ev=>{ try{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const qName=wb.SheetNames.find(n=>/quest/i.test(n))||wb.SheetNames[0];
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[qName]); const questions=[];
    rows.forEach(row=>{ const text=String(pick(row,['Question','question','Q'])||'').trim(); if(!text)return;
      const options=[]; ['A','B','C','D','E','F'].forEach(L=>{ const v=pick(row,['Option '+L,'Option'+L,L]); if(String(v).trim()!=='') options.push(String(v).trim()); });
      if(options.length<2)return;
      let correct=letterToIdx(pick(row,['Correct (A/B/C..)','Correct','Answer','correct'])); if(correct<0||correct>=options.length)correct=0;
      const marks=Math.max(1,Number(pick(row,['Marks','Mark','marks']))||1);
      questions.push({id:uid('q'),text,options,correct,marks});
    });
    if(!questions.length){ toast('No questions found in the file','warn'); inp.value=''; return; }
    let pass=null; const metaName=wb.SheetNames.find(n=>/meta/i.test(n));

}

let gradeState=null;
function openGradeGrid(appId){
  const a=DB.read('apps',[]).find(x=>x.id===appId); const e=DB.read('events',[]).find(x=>x.id===a.eventId); const ex=examOf(e);
  if(!ex.questions.length){ toast('Build the question paper first','warn'); return; }
  gradeState={appId, responses: a.exam? {...a.exam.responses} : {}};
  modal(`<div class="mh"><div><h2>Grade — ${esc(a.data.f_name||'')}</h2><p>${esc(a.symbol||'')} · ${esc(a.program||'')} · tick the option the student chose</p></div><button class="x" data-x>×</button></div>
    <div class="mb"><div id="gradeGrid"></div></div>
    <div class="mf"><span id="gradeScore" class="chip muted" style="margin-right:auto"></span>
      <button class="btn ghost" data-x>Cancel</button><button class="btn primary" onclick="saveGrade()">Save grade</button></div>`,{lg:true});
  renderGradeGrid();
}
function renderGradeGrid(){
  const a=DB.read('apps',[]).find(x=>x.id===gradeState.appId); const e=DB.read('events',[]).find(x=>x.id===a.eventId); const ex=examOf(e);
  const box=$('#gradeGrid'); if(!box)return;
  box.innerHTML=ex.questions.map((q,i)=>{ const chosen=gradeState.responses[q.id];
    return `<div class="qrow"><div class="qtop"><b>Q${i+1}.</b> <span>${esc(q.text)}</span><span class="spacer"></span><span class="chip muted">${q.marks}m</span></div>
      <div class="gopts">${q.options.map((o,oi)=>`<button class="gopt ${chosen===oi?'sel':''} ${oi===q.correct?'key':''}" onclick="pickGrade('${q.id}',${oi})">${letter(oi)}. ${esc(o)}${oi===q.correct?' ✓':''}</button>`).join('')}
        <button class="gopt clr" onclick="pickGrade('${q.id}',-1)">Clear</button></div></div>`;
  }).join('');
  updateGradeScore();
}
function pickGrade(qid,oi){ if(oi<0) delete gradeState.responses[qid]; else gradeState.responses[qid]=oi; renderGradeGrid(); }
function computeGrade(ex,responses){ let correct=0,wrong=0,obtained=0; const total=paperTotal(ex);
  (ex.questions||[]).forEach(q=>{ const r=responses[q.id]; if(r==null)return; if(r===q.correct){ correct++; obtained+=Number(q.marks)||0; } else wrong++; });
  const unanswered=(ex.questions||[]).length-correct-wrong; const pass=obtained>=(ex.passMarks||0);
  return {correct,wrong,unanswered,obtained,total,pass}; }
function updateGradeScore(){ const a=DB.read('apps',[]).find(x=>x.id===gradeState.appId); const e=DB.read('events',[]).find(x=>x.id===a.eventId); const ex=examOf(e);
  const g=computeGrade(ex,gradeState.responses); const el=$('#gradeScore'); if(el) el.textContent=`Score ${g.obtained}/${g.total} · ${g.correct}✓ ${g.wrong}✗ · ${g.pass?'PASS':'FAIL'}`; }
function saveGrade(){ const apps=DB.read('apps',[]); const a=apps.find(x=>x.id===gradeState.appId); const e=DB.read('events',[]).find(x=>x.id===a.eventId); const ex=examOf(e);
  const g=computeGrade(ex,gradeState.responses);
  a.exam={responses:{...gradeState.responses}, ...g, approved:(a.exam&&a.exam.approved)||false, gradedAt:nowISO()};
  a.updatedAt=nowISO(); a.logs.push({at:nowISO(),action:`Exam graded: ${g.obtained}/${g.total} (${g.pass?'Pass':'Fail'})`});
  DB.write('apps',apps); closeModal(); toast('Grade saved','ok'); render(); }

function resultFromGrade(a,g){ return {outcome:g.pass?'Pass':'Fail', marks:g.obtained, rank:null,
  remarks:`Scored ${g.obtained}/${g.total} · ${g.correct} correct, ${g.wrong} wrong`,
  message:`You scored ${g.obtained} out of ${g.total}. ${g.pass?'Congratulations — you passed the entrance exam.':'Unfortunately you did not meet the pass mark.'}`,
  admission:{ offered:g.pass, message: g.pass?('Congratulations! You are offered admission'+(a.program?(' to '+a.program):'')+'. Show the admission QR below at the admissions office to begin enrolment.'):'' } }; }
function approveExamResult(appId){
  const apps=DB.read('apps',[]); const a=apps.find(x=>x.id===appId);
  if(!a.exam){ toast('Grade this applicant first','warn'); return; }
  a.exam.approved=true; a.result=resultFromGrade(a,a.exam); a.status='result'; a.updatedAt=nowISO();
  a.logs.push({at:nowISO(),action:'Exam result approved & published to student'});

}
function approveAllExamResults(eid){

function exportResponseTemplate(eid){

function importResponses(eid,inp){
  const f=inp.files[0]; if(!f)return; if(!window.XLSX){ toast('Excel library not loaded','bad'); inp.value=''; return; }
  const e=DB.read('events',[]).find(x=>x.id===eid); const ex=examOf(e);
  const r=new FileReader();
  r.onload=ev=>{ try{
    const wb=XLSX.read(ev.target.result,{type:'binary'}); const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    const apps=DB.read('apps',[]); let n=0,miss=0;
    rows.forEach(row=>{ const sym=String(pick(row,['Symbol No','Symbol','symbol'])||'').trim(); if(!sym)return;
      const a=apps.find(x=>x.eventId===eid && (x.symbol||'').toLowerCase()===sym.toLowerCase()); if(!a){ miss++; return; }
      const responses={}; ex.questions.forEach((q,i)=>{ const v=pick(row,['Q'+(i+1),'q'+(i+1)]); const idx=letterToIdx(v); if(idx>=0&&idx<q.options.length)responses[q.id]=idx; });
      const g=computeGrade(ex,responses); a.exam={responses, ...g, approved:false, gradedAt:nowISO()}; a.updatedAt=nowISO();
      a.logs.push({at:nowISO(),action:`Exam graded via Excel: ${g.obtained}/${g.total}`}); n++; });
    DB.write('apps',apps); let m=n?`Graded ${n} response(s)`:'No matching symbols found'; if(miss)m+=` · ${miss} not found`;
    recordUpload(eid,'Responses (Excel)',f.name,`graded ${n}`+(miss?` · ${miss} unmatched`:''),f);
    toast(m, n?'ok':'warn'); render();
  }catch(err){ toast('Could not read the responses file','bad'); } };
  r.readAsBinaryString(f); inp.value='';
}

function loadPdfJs(){
  if(window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  return new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{ try{ window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; res(window.pdfjsLib); }catch(e){ rej(e); } };
    s.onerror=rej; document.head.appendChild(s); });
}
function importAnswerPDF(eid,inp){
  const f=inp.files[0]; if(!f)return; inp.value='';
  toast('Reading PDF…','');
  loadPdfJs().then(pdfjs=>{
    const reader=new FileReader();
    reader.onload=async ev=>{ try{
      const pdf=await pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise;
      let text='';
      for(let p=1;p<=pdf.numPages;p++){ const page=await pdf.getPage(p); const c=await page.getTextContent(); text+=' '+c.items.map(i=>i.str).join(' '); }
      const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9]/g,'');
      const ntext=norm(text);
      const apps=DB.read('apps',[]).filter(a=>a.eventId===eid && a.symbol);
      // match on full symbol OR its numeric tail, ignoring spaces/punctuation/case
      let found = ntext ? apps.find(a=>{ const ns=norm(a.symbol); const tail=(String(a.symbol).match(/(\d{2,})\s*$/)||[])[1]||''; return ns && (ntext.includes(ns) || (tail && ntext.includes(norm(tail)))); }) : null;
      if(found){ recordUpload(eid,'Answer sheet (PDF)',f.name,'Identified '+(found.symbol||found.data.f_name||''),f); toast('Identified '+(found.data.f_name||found.symbol)+' — tick the answers to grade','ok'); openGradeGrid(found.id); return; }
      recordUpload(eid,'Answer sheet (PDF)',f.name,'Manual grading (not auto-identified)',f);
      const reason = ntext.length<8
        ? 'This looks like a scanned/photo PDF with no text layer, so the symbol number can’t be read automatically.'
        : 'Couldn’t match a Symbol No from the PDF text automatically.';
      pickApplicantForGrading(eid, reason);
    }catch(err){ toast('Could not parse the PDF','bad'); } };
    reader.readAsArrayBuffer(f);
  }).catch(()=>{ toast('PDF reader needs internet to load the first time. Use Excel responses or grade manually instead.','warn'); });
}
function pickApplicantForGrading(eid, note){
  const apps=DB.read('apps',[]).filter(a=>a.eventId===eid && ['approved','admit_issued','present','absent','result'].includes(a.status));

  const list=apps.sort((x,y)=>(x.symbol||'').localeCompare(y.symbol||'')).map(a=>`
