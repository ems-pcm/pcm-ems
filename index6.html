  modal(`<div class="mh"><div><h2>Whose answer sheet is this?</h2><p>${esc(note||'Pick the applicant to grade.')}</p></div><button class="x" data-x>×</button></div>

}

/* ----- uploads history (question papers / answer sheets / responses / attendance) ----- */
function recordUpload(eid, kind, name, summary, file){
  const e=DB.read('events',[]).find(x=>x.id===eid); if(!e)return;
  if(!e.uploads) e.uploads=[];
  const rec={id:uid('up'), kind, name:name||'(file)', summary:summary||'', at:nowISO(), data:null};
  e.uploads.unshift(rec); if(e.uploads.length>50) e.uploads.length=50;
  writeEvent(e);
  if(file && file.size && file.size<1200000){
    const fr=new FileReader();
    fr.onload=()=>{ try{ const ev=DB.read('events',[]).find(x=>x.id===eid); const r=ev&&(ev.uploads||[]).find(u=>u.id===rec.id); if(r){ r.data=fr.result; writeEvent(ev); } }catch(_){ /* quota — keep metadata only */ } };
    fr.readAsDataURL(file);
  }
}
function redownloadUpload(eid,upid){ const e=DB.read('events',[]).find(x=>x.id===eid); const u=(e.uploads||[]).find(x=>x.id===upid);
  if(!u||!u.data){ toast('Original file wasn’t stored (it was too large to keep)','warn'); return; }

  confirmDelete({title:'Clear upload history?',body:'The list of uploaded files for this exam will be removed (the imported data stays).',confirmText:'Clear history',onYes:()=>{ e.uploads=[]; writeEvent(e); toast('History cleared','warn'); render(); }}); }
function uploadHistoryPanel(e){

/* ============================ DELETE → TRASH → PURGE ============================ */
function askDeleteEvent(id){
  const e=DB.read('events',[]).find(x=>x.id===id);
  const n=DB.read('apps',[]).filter(a=>a.eventId===id).length;
  confirmDelete({title:'Delete event?',body:`<b>${esc(e.title)}</b> and its ${n} entr${n===1?'y':'ies'} will be moved to Trash, where you can restore or permanently delete them.`,
    confirmText:'Move to Trash', onYes:()=>{
      const events=DB.read('events',[]); const apps=DB.read('apps',[]); const trash=DB.read('trash',[]);
      const relApps=apps.filter(a=>a.eventId===id);
      trash.unshift({id:uid('tr'),kind:'event',label:e.title,deletedAt:nowISO(),payload:{event:e,apps:relApps}});
      DB.write('events',events.filter(x=>x.id!==id));
      DB.write('apps',apps.filter(a=>a.eventId!==id));
      DB.write('trash',trash); toast('Moved to Trash','warn');
      go(e.category==='entrance_exam'?'/entrance':'/events'); render();
    }});
}
function askDeleteEntry(id){
  const a=DB.read('apps',[]).find(x=>x.id===id);
  confirmDelete({title:'Delete entry?',body:`<b>${esc(a.data.f_name||'This entry')}</b> will be moved to Trash. You can restore it later or delete it permanently.`,
    confirmText:'Move to Trash', onYes:()=>{
      const apps=DB.read('apps',[]); const trash=DB.read('trash',[]);
      trash.unshift({id:uid('tr'),kind:'entry',label:(a.data.f_name||'Entry')+(a.symbol?(' · '+a.symbol):''),deletedAt:nowISO(),payload:{app:a}});
      DB.write('apps',apps.filter(x=>x.id!==id)); DB.write('trash',trash); toast('Moved to Trash','warn'); render();
    }});
}
function restoreTrash(tid){
  const trash=DB.read('trash',[]); const t=trash.find(x=>x.id===tid); if(!t)return;
  if(t.kind==='event'){ const events=DB.read('events',[]); events.push(t.payload.event); DB.write('events',events);
    const apps=DB.read('apps',[]); DB.write('apps',apps.concat(t.payload.apps||[])); }
  else { const apps=DB.read('apps',[]); apps.push(t.payload.app); DB.write('apps',apps); }
  DB.write('trash',trash.filter(x=>x.id!==tid)); toast('Restored','ok'); render();
}
function purgeTrash(tid){
  const trash=DB.read('trash',[]); const t=trash.find(x=>x.id===tid);
  confirmDelete({title:'Delete permanently?',body:`<b>${esc(t.label)}</b> will be erased for good. This cannot be undone.`,confirmText:'Delete forever',
    onYes:()=>{ DB.write('trash',trash.filter(x=>x.id!==tid)); toast('Permanently deleted','bad'); render(); }});
}
function emptyTrash(){
  confirmDelete({title:'Empty the trash?',body:'Everything in Trash will be permanently erased. This cannot be undone.',confirmText:'Empty trash',
    onYes:()=>{ DB.write('trash',[]); toast('Trash emptied','bad'); render(); }});
}

      ${loggedIn? `<button class="pbtn" onclick="pubLogout('${eid}')">Log out</button>` : `<button class="pbtn primary" onclick="pubLogin('${eid}')">🔑 Login</button>`}
    </div>`:'';
  return `<div class="public"><div class="pbar"><div class="brandmark" style="padding:0"><div class="logo">C</div><div><b>Campus Desk</b><span>Registration</span></div></div>${nav}</div><div class="wrap">${inner}</div></div>`;
}
function pubHome(eid){ go('/r/'+eid); render(); }
function pubLogout(eid){ DB.write('pubState',null); go('/r/'+eid); render(); toast('Logged out','ok'); }
function pubLogin(eid){ const pane=$('#portalPane'); if(pane){ portalTab('login',eid); pane.scrollIntoView({behavior:'smooth',block:'center'}); }
  else { const e=DB.read('events',[]).find(x=>x.id===eid); if(e&&e.category==='entrance_exam'){ go('/r/'+eid); render(); setTimeout(()=>portalTab('login',eid),30); } } }
function publicSubmit(eventId){
  const e=DB.read('events',[]).find(x=>x.id===eventId);
  const data=collectInputs($('#pubForm').closest('.public'));
  for(const f of allFieldsFor(e)){ if(f.required && !String(data[f.id]||'').trim() && f.type!=='file'){ toast('Please fill: '+f.label,'bad'); return; } }
  const apps=DB.read('apps',[]); apps.push(newApplicant(e,data,'','public')); DB.write('apps',apps);
  $('.public .wrap').innerHTML=`<div class="panel"><div class="pb" style="text-align:center;padding:40px">
    <div class="empty"><div class="big" style="background:var(--ok-bg);color:var(--ok)">✓</div>
    <h3>${e.category==='college_event'?'You’re registered!':'Attendance recorded'}</h3>
    <p>Thanks, ${esc(data.f_name||'')}. Your details have been submitted for <b>${esc(e.title)}</b>.</p>
    <button class="btn ghost" onclick="location.reload()">Submit another</button></div></div></div>`;
}

/* ----- ENTRANCE PORTAL (stateful: apply / login / status / admit / result) ----- */
function entranceState(){ return DB.read('pubState',null); } // {appId}
function renderEntrancePortal(e, program){
  const st=entranceState();
  const me = st? DB.read('apps',[]).find(a=>a.id===st.appId):null;
  const valid = me && me.eventId===e.id;
  $('#app').innerHTML=publicShell(`
    <div class="panel"><div class="ph"><div><div class="cat" style="color:${CATS.entrance_exam.color};font-size:11px;font-weight:700;text-transform:uppercase">📝 Entrance Exam</div>
      <h2 style="margin-top:4px">${esc(e.title)}</h2></div></div>
      <div class="pb" id="portalBody"></div></div>`, e.id);
  if(valid) portalStatus(e,me); else portalLanding(e, program);
}
function portalLanding(e, program){
  const progs=(e.programs||[]).length;
  const preset=(program && (e.programs||[]).some(p=>p.name===program))?program:'';
  $('#portalBody').innerHTML=`
    <div class="portal-hero">
      <h3>Welcome to ${esc(e.title)}</h3>
      <p>${e.description?esc(e.description):'Apply for the entrance examination below, then return any time to log in and track your application, admit card and result.'}</p>
      <div class="herometa"><span>📆 ${fmtDate(e.date)}</span>${e.location?`<span>📍 ${esc(e.location)}</span>`:''}${progs?`<span>🎚 ${progs} program${progs>1?'s':''}</span>`:''}${preset?`<span>🎯 ${esc(preset)}</span>`:''}</div>
    </div>
    <div class="tabs big" style="margin:16px 0">
      <button class="active" id="tApply" onclick="portalTab('apply','${e.id}')">📝 New applicant — Apply</button>
      <button id="tLogin" onclick="portalTab('login','${e.id}')">🔑 Approved? Log in</button>
    </div>
    <div id="portalPane"></div>`;
  portalTab('apply', e.id, preset);
}
function portalTab(which,eid,program){ const e=DB.read('events',[]).find(x=>x.id===eid);
  $('#tApply')?.classList.toggle('active',which==='apply'); $('#tLogin')?.classList.toggle('active',which==='login');
  const pane=$('#portalPane'); if(!pane)return;
  if(which==='apply'){
    const prog0=(program && (e.programs||[]).some(p=>p.name===program))?program:((e.programs||[])[0]?.name||'');
    pane.innerHTML=`
      ${(e.programs||[]).length?`<div class="field"><label>Program <span class="req">*</span></label>
        <select class="input" id="ppProg" onchange="portalProg('${eid}',this.value)">
        ${e.programs.map(p=>`<option ${p.name===prog0?'selected':''}>${esc(p.name)}</option>`).join('')}</select>
        <div class="hint">${program?'Pre-selected from the QR you scanned. ':''}Fields below change with the program you choose.</div></div>`:''}
      <div id="ppFields">${allFieldsFor(e,prog0).map(f=>renderInput(f)).join('')}</div>
      <button class="btn primary block" onclick="portalApply('${eid}')">Submit application</button>`;
  } else {
    pane.innerHTML=`
      <div class="loginbox">
        <div class="logintitle">🔑 Approved applicant login</div>
        <p class="hint" style="margin-top:0">After the admin approves your application you receive a <b>Symbol No</b>. Log in below to download your admit card and check your result.</p>
        <div class="field"><label>Username — your Date of Birth</label><input class="input" type="date" id="liDob"></div>
        <div class="field"><label>Password — your Symbol No</label><input class="input" id="liSym" placeholder="e.g. BS-2026-0001" onkeydown="if(event.key==='Enter')portalLogin('${eid}')"></div>
        <button class="btn primary block" onclick="portalLogin('${eid}')">Log in</button>
        <p class="hint" style="text-align:center;margin:10px 0 0">Not approved yet? Switch to <b>Apply</b> above, or re-scan this QR later to check back.</p>
      </div>`;
  }
}
function portalProg(eid,prog){ const e=DB.read('events',[]).find(x=>x.id===eid);
  $('#ppFields').innerHTML=allFieldsFor(e,prog).map(f=>renderInput(f)).join(''); }
function portalApply(eid){ const e=DB.read('events',[]).find(x=>x.id===eid);
  const prog=$('#ppProg')?.value || (e.programs||[])[0]?.name || '';
  const data=collectInputs($('#ppFields'));
  for(const f of allFieldsFor(e,prog)){ if(f.required && !String(data[f.id]||'').trim() && f.type!=='file'){ toast('Please fill: '+f.label,'bad'); return; } }
  const apps=DB.read('apps',[]); const ap=newApplicant(e,data,prog,'public'); apps.push(ap); DB.write('apps',apps);
  DB.write('pubState',{appId:ap.id}); renderEntrancePortal(e);
  toast('Application submitted','ok');
}
function portalLogin(eid){ const e=DB.read('events',[]).find(x=>x.id===eid);
  const dob=$('#liDob').value, sym=$('#liSym').value.trim();
  const a=DB.read('apps',[]).find(x=>x.eventId===eid && (x.dob||'')===dob && (x.symbol||'').toLowerCase()===sym.toLowerCase() && x.symbol);
  if(!a){ toast('No match. Check your DOB and Symbol No.','bad'); return; }
  DB.write('pubState',{appId:a.id}); renderEntrancePortal(e); toast('Logged in','ok');
}
function portalStatus(e,a){
  const steps=[
    {k:'submitted',t:'Application submitted',d:'We received your application.'},
    {k:'approved',t:'Approved by admin',d:'Your Symbol No has been issued.'},
    {k:'admit',t:'Admit card ready',d:'Download and bring it to the exam.'},
    {k:'attended',t:'Attendance & exam',d:'Marked at the exam hall.'},
    {k:'result',t:'Result published',d:'Your result is available below.'},
  ];
  const reached=k=>{
    const order=['submitted','approved','admit_issued','present','absent','result'];
    const cur=order.indexOf(a.status);
    const map={submitted:0,approved:1,admit:1,attended:3,result:5};
    return cur>=map[k];
  };
  const isReject=a.status==='rejected';
  $('#portalBody').innerHTML=`
    <div class="card" style="background:var(--brand-tint-2);display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <div><div class="hint">Applicant</div><b style="font-size:16px">${esc(a.data.f_name||'—')}</b></div>
      <div><div class="hint">Program</div><b>${esc(a.program||'—')}</b></div>
      <div><div class="hint">Symbol No</div><b>${a.symbol?esc(a.symbol):'<span class="chip warn">Pending approval</span>'}</b></div>
      <div style="margin-left:auto"><span class="chip ${(STATUS[a.status]||{chip:'muted'}).chip}"><span class="dot"></span>${(STATUS[a.status]||{label:a.status}).label}</span></div>
    </div>
    ${isReject?`<div class="card" style="background:var(--bad-bg);color:var(--bad);margin-top:14px">Your application was not approved. Please contact the admissions office.</div>`:`
    <div class="divider"></div>
    <div class="tl">${steps.map(s=>`<div class="it ${reached(s.k)?'done':''}"><div class="t">${s.t}</div><div class="d">${s.d}</div></div>`).join('')}</div>`}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
      ${['admit_issued','approved','present','absent','result'].includes(a.status)?`<button class="btn primary" onclick="showAdmit('${a.id}')">⬇ Admit card</button>`:''}
      ${a.result?`<button class="btn subtle" onclick="portalResult('${a.id}')">View result</button>`:''}
      <button class="btn ghost" onclick="portalLogout('${e.id}')">Log out</button>
    </div>
    ${a.status==='approved'||a.status==='submitted'?`<p class="hint" style="margin-top:12px">${a.status==='submitted'?'Your application is awaiting admin approval. Re-scan the QR later to check back.':'You are approved! Download your admit card above.'}</p>`:''}`;
}
function portalResult(id){ const a=DB.read('apps',[]).find(x=>x.id===id); if(!a||!a.result){ toast('No result published yet','warn'); return; }
  const r=a.result; const e=DB.read('events',[]).find(x=>x.id===a.eventId);
  const offered = r.admission && r.admission.offered;
  modal(`<div class="mh"><div><h2>Your result</h2><p>${esc(a.data.f_name||'')} · ${esc(a.symbol||'')}</p></div><button class="x" data-x>×</button></div>
    <div class="mb">
      <div class="card" style="text-align:center;background:var(--brand-tint-2)">
        <div class="hint">Outcome</div>
        <div style="font-family:var(--font-d);font-size:30px;font-weight:700;color:${r.outcome==='Pass'?'var(--ok)':r.outcome==='Fail'?'var(--bad)':'var(--warn)'}">${esc(r.outcome)}</div>
        <dl style="display:inline-grid;grid-template-columns:auto auto;gap:6px 14px;margin-top:10px;text-align:left">
          ${r.marks!=null?`<dt class="hint">Marks</dt><dd><b>${r.marks}</b></dd>`:''}
          ${r.rank!=null?`<dt class="hint">Rank</dt><dd><b>${r.rank}</b></dd>`:''}
        </dl>
      </div>
      ${(r.message||r.remarks)?`<div class="card" style="margin-top:12px"><div class="hint" style="margin-bottom:4px">Message</div>${esc(r.message||r.remarks)}</div>`:''}
      ${offered?`<div class="card" style="margin-top:12px;border:1.5px solid var(--ok);background:var(--ok-bg)">
        <b style="color:var(--ok)">🎓 Admission offer</b>
        <p style="margin:6px 0 12px">${esc(r.admission.message||'You are offered admission. Show this QR at the admissions office to begin enrolment.')}</p>
        <div class="qrbox" style="background:#fff;border-radius:12px;padding:14px;margin:0"><div id="admissionQR"></div>
          <div class="hint" style="text-align:center">Admission QR — show this at the admissions office</div></div>
      </div>`:''}
    </div>
    <div class="mf"><button class="btn primary" data-x>Close</button></div>`);
  if(offered){ try{ $('#admissionQR').appendChild(qrImg('ADMISSION|'+(a.symbol||'')+'|'+(a.program||'')+'|'+(e?e.title:''), 190)); }catch(_){} }
}
function portalLogout(eid){ DB.write('pubState',null); const e=DB.read('events',[]).find(x=>x.id===eid); renderEntrancePortal(e); }

/* ============================ utils: download ============================ */
function dl(name,blob){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),2000); }
function emptyState(title,body,cta,onclick){
  return `<div class="empty"><div class="big">✦</div><h3>${esc(title)}</h3>${body?`<p>${body}</p>`:''}
    ${cta&&onclick?`<button class="btn primary" style="margin-top:8px" onclick="${onclick}">${esc(cta)}</button>`:''}</div>`;
}
function panelWrap(title,inner){ return `<div class="panel"><div class="ph"><h2>${esc(title)}</h2></div><div class="pb flush">${inner}</div></div>`; }

/* ============================ boot ============================ */
window.__editId=null;
render();
</script>
</body>
</html>
