  <style>
    /* ====================== DESIGN TOKENS — single brand color ====================== */
    :root {
      --brand: #0E7C7B;
      /* the one brand color (deep teal) */
      --brand-700: #0A5F5E;
      --brand-600: #0E7C7B;
      --brand-300: #5CB0AE;
      --brand-tint: #E7F2F1;
      --brand-tint-2: #F2F8F7;

      --ink: #13211F;
      /* near-black with a teal cast */
      --ink-2: #3D514E;
      --muted: #6E817E;
      --line: #E2E8E6;
      --line-2: #EEF3F2;
      --surface: #FFFFFF;
      --bg: #F6F8F7;

      /* functional status colors (not decoration) */
      --ok: #147D55;
      --ok-bg: #E5F4ec;
      --warn: #9A6700;
      --warn-bg: #FBF1DA;
      --bad: #B42318;
      --bad-bg: #FCEBE9;
      --info: #1F5FA8;
      --info-bg: #E8F0FA;

      --r: 14px;
      --r-sm: 10px;
      --r-lg: 20px;
      --shadow: 0 1px 2px rgba(19, 33, 31, .04), 0 8px 24px -12px rgba(19, 33, 31, .18);
      --shadow-lg: 0 24px 60px -24px rgba(19, 33, 31, .35);
      --font-d: 'Space Grotesk', system-ui, sans-serif;
      --font-b: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5
    }

    button {
      font-family: inherit;
      cursor: pointer
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 14px
    }

    a {
      color: var(--brand-700)
    }

    h1,
    h2,
    h3 {
      font-family: var(--font-d);
      margin: 0;
      letter-spacing: -.01em
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px
    }

    ::-webkit-scrollbar-thumb {
      background: #cdd8d6;
      border-radius: 20px;
      border: 3px solid var(--bg)
    }

    /* ====================== BUTTONS / CHIPS / INPUTS ====================== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 600;
      background: var(--surface);
      color: var(--ink);
      transition: .15s;
      white-space: nowrap
    }

    .btn:hover {
      transform: translateY(-1px)
    }

    .btn:active {
      transform: translateY(0)
    }

    .btn.primary {
      background: var(--brand);
      color: #fff
    }

    .btn.primary:hover {
      background: var(--brand-700)
    }

    .btn.ghost {
      background: transparent;
      border-color: var(--line)
    }

    .btn.ghost:hover {
      background: var(--brand-tint-2);
      border-color: var(--brand-300)
    }

    .btn.subtle {
      background: var(--brand-tint);
      color: var(--brand-700)
    }

    .btn.danger {
      background: var(--bad-bg);
      color: var(--bad)
    }

    .btn.danger:hover {
      background: var(--bad);
      color: #fff
    }

    .btn.sm {
      padding: 6px 10px;
      font-size: 12.5px;
      border-radius: 8px
    }

    .btn.block {
      width: 100%;
      justify-content: center
    }

    .btn[disabled] {
      opacity: .5;
      pointer-events: none
    }

    .iconbtn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      color: var(--ink-2)
    }

    .iconbtn:hover {
      border-color: var(--brand-300);
      color: var(--brand-700)
    }

    .field {
      display: block;
      margin-bottom: 14px
    }

    .field>label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 6px
    }

    .field .req {
      color: var(--bad)
    }

    .input,
    select.input,
    textarea.input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      transition: .15s;
      outline: none
    }

    .input:focus,
    textarea.input:focus,
    select.input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-tint)
    }

    textarea.input {
      min-height: 92px;
      resize: vertical
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: .01em
    }

    .chip.ok {
      background: var(--ok-bg);
      color: var(--ok)
    }

    .chip.warn {
      background: var(--warn-bg);
      color: var(--warn)
    }

    .chip.bad {
      background: var(--bad-bg);
      color: var(--bad)
    }

    .chip.info {
      background: var(--info-bg);
      color: var(--info)
    }

    .chip.muted {
      background: var(--line-2);
      color: var(--ink-2)
    }

    .chip.brand {
      background: var(--brand-tint);
      color: var(--brand-700)
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block
    }

    /* ====================== LAYOUT SHELL ====================== */
    .shell {
      display: grid;
      grid-template-columns: 248px 1fr;
      min-height: 100vh
    }

    .side {
      background: #fff;
      border-right: 1px solid var(--line);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 18px 14px
    }

    .brandmark {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 6px 8px 18px;
      position: sticky;
      top: -18px;
      background: #fff;
      z-index: 5;
      margin: -18px -14px 0;
      padding: 18px 14px 14px
    }

    .brandmark .logo {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--brand);
      display: grid;
      place-items: center;
      color: #fff;
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 18px;
      box-shadow: var(--shadow)
    }

    .brandmark b {
      font-family: var(--font-d);
      font-size: 16px;
      display: block;
      line-height: 1.1
    }

    .brandmark span {
      font-size: 11.5px;
      color: var(--muted)
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 4px
    }

    .nav .label {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      padding: 14px 10px 6px;
      font-weight: 700
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border-radius: 10px;
      color: var(--ink-2);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      position: relative
    }

    .nav a:hover {
      background: var(--brand-tint-2);
      color: var(--ink)
    }

    .nav a.active {
      background: var(--brand-tint);
      color: var(--brand-700);
      font-weight: 600
    }

    .nav a .ic {
      width: 18px;
      height: 18px;
      flex: none
    }

    .nav a .badge {
      margin-left: auto;
      background: var(--brand);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      min-width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      padding: 0 5px
    }

    .side .foot {
      margin-top: auto;
      border-top: 1px solid var(--line-2);
      padding-top: 12px
    }

    .side .who {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px
    }

    .side .who .av {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: var(--ink);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 13px
    }

    .side .who small {
      display: block;
      color: var(--muted);
      font-size: 11.5px
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246, 248, 247, .85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 14px 26px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap
    }

    .topbar .mh {
      display: none
    }

    .topbar h1 {
      font-size: 19px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .topbar .crumb {
      font-size: 12.5px;
      color: var(--muted);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .topbar .spacer {
      flex: 1
    }

    .topbar>div:not(.spacer) {
      min-width: 0;
      max-width: 100%
    }

    .topbar select.input {
      max-width: 100%
    }

    .content {
      padding: 24px 26px 60px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto
    }

    .pwrap {
      position: relative;
      display: flex
    }

    .pwrap .input {
      padding-right: 40px
    }

    .pwtoggle {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 6px 8px;
      line-height: 1;
      opacity: .7
    }

    .pwtoggle:hover {
      opacity: 1
    }

    /* ====================== CARDS / GRID / TABLE ====================== */
    .grid {
      display: grid;
      gap: 16px
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 18px;
      box-shadow: var(--shadow)
    }

    .stat .k {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .stat .v {
      font-family: var(--font-d);
      font-size: 30px;
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: -.02em
    }

    .stat .s {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px
    }

    .stat .ic {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: var(--brand-tint);
      color: var(--brand-700);
      display: grid;
      place-items: center
    }

    .card.stat {
      position: relative;
      transition: transform .15s ease, box-shadow .15s ease
    }

    .card.stat:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px -10px rgba(19, 33, 31, .18)
    }

    .card.stat.hl {
      border: 1px solid var(--brand);
      background: linear-gradient(160deg, var(--brand-tint) 0%, #fff 70%)
    }

    .card.stat.hl::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: 14px 0 0 14px;
      background: var(--brand)
    }

    .card.stat.hl.warn {
      border-color: #e0a829;
      background: linear-gradient(160deg, #fff6e0 0%, #fff 70%)
    }

    .card.stat.hl.warn::before {
      background: #e0a829
    }

    .card.stat.hl.bad {
      border-color: #c0392b;
      background: linear-gradient(160deg, #fdecea 0%, #fff 70%)
    }

    .card.stat.hl.bad::before {
      background: #c0392b
    }

    .card.stat.hl.ok {
      border-color: #1a9b6e;
      background: linear-gradient(160deg, #e8f8f0 0%, #fff 70%)
    }

    .card.stat.hl.ok::before {
      background: #1a9b6e
    }

    .minichart {
      padding: 4px 2px
    }

    .minichart svg {
      display: block;
      width: 100%;
      height: auto
    }

    .minichart .mc-bar {
      transition: opacity .15s ease
    }

    .minichart .mc-bar:hover {
      opacity: .75
    }

    .minichart .mc-empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 30px 0
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow: hidden
    }

    .panel .ph {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line-2)
      overflow: auto;
    }

    .panel .ph h2 {
      font-size: 15.5px
    }

    .panel .ph .spacer {
      flex: 1
    }

    .panel .pb {
      padding: 18px
    }

    .panel .pb.flush {
      padding: 0
    }

    .tablewrap {
      overflow-x: auto
    }

    table.tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      min-width: 560px
    }

    table.tbl th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      font-weight: 700;
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--brand-tint-2);
      position: sticky;
      top: 0
    }

    table.tbl td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-2);
      vertical-align: middle
    }

    table.tbl tr:last-child td {
      border-bottom: none
    }

    table.tbl tr:hover td {
      background: var(--brand-tint-2)
    }

    .tbl .name {
      font-weight: 600;
      color: var(--ink)
    }

    .tbl .sub {
      font-size: 12px;
      color: var(--muted)
    }

    .rowacts {
      display: flex;
      gap: 6px;
      justify-content: flex-end
    }

    .empty {
      text-align: center;
      padding: 46px 20px;
      color: var(--muted)
    }

    .empty .big {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: var(--brand-tint);
      color: var(--brand-700);
      display: grid;
      place-items: center;
      margin: 0 auto 14px
    }

    .empty h3 {
      color: var(--ink);
      font-size: 16px;
      margin-bottom: 6px
    }

    .eventcard {
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .eventcard .top {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line-2)
    }

    .eventcard .cat {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .eventcard h3 {
      font-size: 16.5px;
      margin: 8px 0 4px
    }

    .eventcard .meta {
      font-size: 12.5px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      margin-top: 8px
    }

    .eventcard .bot {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .cardgrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--line-2);
      padding: 4px;
      border-radius: 11px;
      width: fit-content;
      max-width: 100%;
      overflow: auto
    }

    .tabs button {
      border: none;
      background: transparent;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      color: var(--ink-2);
      white-space: nowrap
    }

    .tabs button.active {
      background: #fff;
      color: var(--brand-700);
      box-shadow: var(--shadow)
    }

    /* timeline */
    .tl {
      position: relative;
      padding-left: 24px
    }

    .tl::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--line)
    }

    .tl .it {
      position: relative;
      padding: 0 0 16px
    }

    .tl .it::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid var(--brand-300)
    }

    .tl .it.done::before {
      background: var(--brand);
      border-color: var(--brand)
    }

    .tl .it .t {
      font-weight: 600;
      font-size: 13.5px
    }

    .tl .it .d {
      font-size: 12px;
      color: var(--muted)
    }

    /* ====================== MODAL ====================== */
    .modal-root {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none
    }

    .modal-root.open {
      display: block
    }

    .modal-bg {
      position: absolute;
      inset: 0;
      background: rgba(19, 33, 31, .42);
      backdrop-filter: blur(2px);
      animation: fade .2s
    }

    .modal {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: var(--r-lg);
      width: min(560px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      overflow: auto;
      box-shadow: var(--shadow-lg);
      animation: pop .22s
    }

    .modal.lg {
      width: min(720px, calc(100vw - 32px))
    }

    .modal .mh {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 20px 22px 8px
    }

    .modal .mh h2 {
      font-size: 18px
    }

    .modal .mh p {
      font-size: 13px;
      color: var(--muted);
      margin: 4px 0 0
    }

    .modal .mh .x {
      margin-left: auto;
      border: none;
      background: var(--line-2);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      font-size: 16px;
      color: var(--ink-2)
    }

    .modal .mb {
      padding: 8px 22px 6px
    }

    .modal .mf {
      padding: 14px 22px 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      background: #fff
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translate(-50%, -46%) scale(.97)
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1)
      }
    }

    @keyframes fade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* dynamic field builder */
    .fieldrow {
      display: grid;
      grid-template-columns: 1fr 120px 78px auto;
      gap: 8px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--line-2);
      border-radius: 10px;
      margin-bottom: 8px;
      background: var(--brand-tint-2)
    }

    .fieldrow .field {
      margin: 0
    }

    .fieldrow .field>label {
      font-size: 11px
    }

    .divider {
      height: 1px;
      background: var(--line-2);
      margin: 16px 0
    }

    .subhead {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin: 6px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    /* toast */
    .toasts {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .toast {
      background: var(--ink);
      color: #fff;
      padding: 11px 15px;
      border-radius: 11px;
      font-size: 13.5px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slide .25s;
      max-width: 330px
    }

    .toast.ok {
      background: #0f5c4a
    }

    .toast.bad {
      background: #8c2018
    }

    .toast.warn {
      background: #7a5200
    }

    .toast .tclose {
      margin-left: auto;
      background: rgba(255, 255, 255, .18);
      border: none;
      color: #fff;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      flex: none
    }

    .toast .tclose:hover {
      background: rgba(255, 255, 255, .3)
    }

    @keyframes slide {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ====================== PUBLIC / AUTH SCREENS ====================== */
    .authwrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(1200px 500px at 80% -10%, var(--brand-tint) 0%, transparent 60%), var(--bg)
    }

    .authcard {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      width: min(440px, 100%);
      overflow: hidden
    }

    .authcard .head {
      padding: 26px 28px 8px
    }

    .authcard .head .logo {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 14px
    }

    .authcard .head h1 {
      font-size: 22px
    }

    .authcard .head p {
      color: var(--muted);
      font-size: 13.5px;
      margin: 6px 0 0
    }

    .authcard .body {
      padding: 18px 28px 28px
    }

    /* Homepage (logged-out landing) */
    .homewrap {
      min-height: 100vh;
      background: var(--bg)
    }

    .homenav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      max-width: 1080px;
      margin: 0 auto
    }

    .homenav .logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 17px;
      flex: none
    }

    .homenav b {
      font-size: 15.5px
    }

    .homenav .navlinks {
      margin-left: auto;
      display: flex;
      gap: 22px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--ink-2)
    }

    .homenav .navlinks a {
      color: var(--ink-2)
    }

    .homenav .navlinks a:hover {
      color: var(--brand-700)
    }

    .homehero {
      background: linear-gradient(160deg, var(--brand) 0%, var(--brand-700) 100%);
      color: #fff;
      padding: 54px 28px 70px;
      text-align: center
    }

    .homehero .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, .16);
      border: 1px solid rgba(255, 255, 255, .3);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 600;
      margin-bottom: 18px
    }

    .homehero h1 {
      font-family: var(--font-d);
      font-size: clamp(28px, 4.5vw, 42px);
      margin: 0 0 14px;
      line-height: 1.15
    }

    .homehero p {
      max-width: 620px;
      margin: 0 auto;
      color: rgba(255, 255, 255, .92);
      font-size: 15.5px;
      line-height: 1.6
    }

    .homehero .cta {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap
    }

    .homehero .cta a {
      background: #fff;
      color: var(--brand-700);
      font-weight: 700;
      font-size: 14px;
      padding: 13px 26px;
      border-radius: 11px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .15)
    }

    .homehero .cta a.ghost {
      background: rgba(255, 255, 255, .12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .4);
      box-shadow: none
    }

    .homebody {
      max-width: 1080px;
      margin: -40px auto 0;
      padding: 0 28px 70px;
      position: relative
    }

    .homecard {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      padding: 30px 32px;
      margin-bottom: 22px
    }

    .homecard h2 {
      font-family: var(--font-d);
      font-size: 20px;
      margin: 0 0 6px
    }

    .homecard .sub {
      color: var(--muted);
      font-size: 13.5px;
      margin: 0 0 22px
    }

    .featgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px
    }

    .featgrid .fc {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px
    }

    .featgrid .fc .ico {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--brand-tint);
      color: var(--brand-700);
      display: grid;
      place-items: center;
      font-size: 18px;
      margin-bottom: 12px
    }

    .featgrid .fc h3 {
      font-size: 14.5px;
      margin: 0 0 6px
    }

    .featgrid .fc p {
      font-size: 13px;
      color: var(--ink-2);
      margin: 0;
      line-height: 1.55
    }

    .datagrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px
    }

    .datagrid .dg-col h3 {
      font-size: 14px;
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .datagrid .dg-col p,
    .datagrid .dg-col li {
      font-size: 13.5px;
      color: var(--ink-2);
      line-height: 1.65
    }

    .datagrid ul {
      margin: 0;
      padding-left: 18px
    }

    .homefoot {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding: 24px 0 4px
    }

    .homefoot a {
      color: var(--ink-2);
      font-weight: 600
    }

    @media (max-width:760px) {
      .homenav .navlinks {
        display: none
      }

      .featgrid {
        grid-template-columns: 1fr
      }

      .datagrid {
        grid-template-columns: 1fr
      }

      .homehero {
        padding: 44px 20px 60px
      }

      .homebody {
        padding: 0 16px 60px
      }

      .homecard {
        padding: 22px 18px
      }
    }

    html {
      scroll-behavior: smooth
    }

    .homehero {
      position: relative;
      overflow: hidden
    }

    .homehero::before,
    .homehero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, .08);
      pointer-events: none
    }

    .homehero::before {
      width: 340px;
      height: 340px;
      top: -160px;
      right: -80px
    }

    .homehero::after {
      width: 220px;
      height: 220px;
      bottom: -120px;
      left: -60px
    }

    .homehero .tag,
    .homehero h1,
    .homehero p,
    .homehero .cta {
      position: relative;
      z-index: 1
    }

    .homehero .cta a {
      transition: transform .15s ease, box-shadow .15s ease
    }

    .homehero .cta a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, .2)
    }

    .homenav .btn.primary {
      transition: transform .15s ease
    }

    .homenav .btn.primary:hover {
      transform: translateY(-1px)
    }

    .featgrid .fc {
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      cursor: default
    }

    .featgrid .fc:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px -12px rgba(19, 33, 31, .22);
      border-color: var(--brand)
    }

    .featgrid .fc .ico {
      transition: transform .18s ease
    }

    .featgrid .fc:hover .ico {
      transform: scale(1.12) rotate(-4deg)
    }

    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity .55s ease, transform .55s ease
    }

    .reveal.in {
      opacity: 1;
      transform: translateY(0)
    }

    #signin.homecard {
      transition: transform .18s ease, box-shadow .18s ease
    }

    #signin.homecard:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px -16px rgba(19, 33, 31, .25)
    }

    /* Sign-in modal */
    .modalbg {
      position: fixed;
      inset: 0;
      background: rgba(15, 25, 23, .55);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity .2s ease
    }

    .modalbg.show {
      opacity: 1;
      visibility: visible
    }

    .authmodal {
      position: relative;
      transform: translateY(14px) scale(.97);
      transition: transform .22s ease;
      max-width: 420px;
      width: 100%
    }

    .modalbg.show .authmodal {
      transform: translateY(0) scale(1)
    }

    .modalx {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: var(--line-2);
      width: 30px;
      height: 30px;
      border-radius: 9px;
      font-size: 14px;
      cursor: pointer;
      color: var(--ink-2)
    }

    .modalx:hover {
      background: var(--line)
    }

<body>
  <div id="app"></div>
  <div class="modal-root" id="modalRoot"></div>
  <div class="toasts" id="toasts"></div>

  <script>
    /* =======================================================================
       Campus Desk — College Events & Entrance Management (single-file, local)
       Data lives in localStorage. No server. Works offline once libs cached.
       ======================================================================= */

    /* ---------- tiny helpers ---------- */
    const $ = (s, el = document) => el.querySelector(s);
    const $$ = (s, el = document) => [...el.querySelectorAll(s)];
    const uid = (p = 'id') => p + '_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
    const nowISO = () => new Date().toISOString();
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const fmtDate = iso => { if (!iso) return '—'; const d = new Date(iso); return isNaN(d) ? esc(iso) : d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); };
    const fmtDT = iso => { if (!iso) return '—'; const d = new Date(iso); return isNaN(d) ? esc(iso) : d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); };

    /* ---------- storage ---------- */
    const DB = {
      read(k, def) { try { const v = localStorage.getItem('cd_' + k); return v == null ? def : JSON.parse(v); } catch (e) { return def; } },
      write(k, v) { localStorage.setItem('cd_' + k, JSON.stringify(v)); try { scheduleAutoPush(); } catch (_) { } },
    };
    let __autoPushTimer = null;
    function scheduleAutoPush() { clearTimeout(__autoPushTimer); __autoPushTimer = setTimeout(() => { try { syncPushSilent(); } catch (_) { } }, 1200); }
    function seed() {
      if (!DB.read('admin', null)) DB.write('admin', { username: 'admin', password: 'admin123', name: 'Administrator' });
      if (!DB.read('events', null)) DB.write('events', []);
      if (!DB.read('apps', null)) DB.write('apps', []);   // applicants / registrations (unified)
      if (!DB.read('trash', null)) DB.write('trash', []);
    }
    seed();

    const CATS = {
      college_event: { label: 'College Event', icon: '🎓', color: 'var(--brand)' },
      club_meeting: { label: 'Club Meeting', icon: '🏛️', color: '#7A5AF8' },
      entrance_exam: { label: 'Entrance Exam', icon: '📝', color: '#C9560E' },
      staff_meeting: { label: 'Staff Meeting', icon: '🧑‍💼', color: '#1F5FA8' },
    };
    const COMMON_FIELDS = [
      { id: 'f_name', label: 'Full Name', type: 'text', required: true },
      { id: 'f_email', label: 'Email', type: 'email', required: true },
      { id: 'f_phone', label: 'Phone', type: 'tel', required: true },
    ];
    /* status machine for entrance applicants */
    const STATUS = {
      submitted: { label: 'Submitted', chip: 'warn' },
      approved: { label: 'Approved', chip: 'info' },
      rejected: { label: 'Rejected', chip: 'bad' },
      admit_issued: { label: 'Admit issued', chip: 'brand' },
      present: { label: 'Present', chip: 'ok' },
      absent: { label: 'Absent', chip: 'bad' },
      result: { label: 'Result out', chip: 'ok' },
    };

    /* ---------- toast + confirm + modal ---------- */
    function toast(msg, type = '') {
      const wrap = $('#toasts'); const t = document.createElement('div'); t.className = 'toast ' + type;
      t.innerHTML = `<span>${esc(msg)}</span><button class="tclose" title="Dismiss" aria-label="Dismiss">×</button>`;
      const close = () => { t.style.opacity = '0'; t.style.transition = '.25s'; setTimeout(() => t.remove(), 250); };
      t.querySelector('.tclose').addEventListener('click', close);
      wrap.appendChild(t);

        const [path, qs] = r.split('?'); const parts = path.split('/'); const pi = parts.indexOf('p'); const prog = (pi >= 0) ? decodeURIComponent(parts[pi + 1] || '') : '';
        let payload = null; if (qs) { const mm = qs.match(/(?:^|&)d=([^&]+)/); if (mm) { const j = b64urlDec(decodeURIComponent(mm[1])); if (j) { try { payload = JSON.parse(j); } catch (_) { } } } }

    function viewSettings() {
      const me = currentStaff();
      if (!isSuper()) {
        return `<div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="panel"><div class="ph"><h2>My account</h2></div><div class="pb">

        <div class="field"><label>Password</label><input class="input" id="myPass" type="text" value="${esc(me ? me.password : '')}"></div>
        <button class="btn primary" onclick="saveMyAccount()">Save changes</button>

        <p class="hint" style="margin-top:0">Programs and features assigned to you by the super admin.</p>

        <div class="field"><label>Features</label><div>${PERMS.filter(k => can(k)).map(k => `<span class="chip muted" style="margin:2px">${esc(PERM_LABELS[k] || k)}</span>`).join('') || '<span class="sub">None</span>'}</div></div>

      return `<div class="grid" style="grid-template-columns:1fr 1fr">

      <p class="hint" style="margin-top:0">Rename the system and set a short logo (e.g. “PCM”). Shown across every dashboard and the login screen.</p>
      <div class="field"><label>System name</label><input class="input" id="setApp" value="${esc(cfg().appName || 'Campus Desk')}" placeholder="e.g. PCM College"></div>

      <div class="field"><label>Tagline</label><input class="input" id="setTag" value="${esc(cfg().appTagline || '')}" placeholder="(optional)"></div>
      <button class="btn primary" onclick="saveBrand()">Save branding</button>
    </div></div>
    <div class="panel"><div class="ph"><h2>Admin account</h2></div><div class="pb">
      <div class="field"><label>Display name</label><input class="input" id="setName" value="${esc(admin.name || '')}"></div>
      <div class="field"><label>Username</label><input class="input" id="setUser" value="${esc(admin.username || '')}"></div>
      <div class="field"><label>Password</label><input class="input" id="setPass" type="text" value="${esc(admin.password || '')}"></div>
      <button class="btn primary" onclick="saveAdmin()">Save changes</button>
    </div></div>
    <div class="panel"><div class="ph"><h2>Data</h2></div><div class="pb">
      <p class="hint" style="margin-top:0">All data is stored in this browser only (localStorage). Export a backup or reset everything.</p>
      <button class="btn ghost block" style="margin-bottom:10px" onclick="exportBackup()">⬇ Export backup (all data)</button>
      <label class="btn ghost block" style="margin-bottom:10px">⬆ Import backup<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
      <div class="field" style="margin-top:6px"><label>Backup reminder every (hours)</label><input class="input" id="setBkup" type="number" min="1" value="${cfg().backupEveryH || 24}"></div>
      <div class="field"><label>Low-mark alert threshold (%)</label><input class="input" id="setLow" type="number" min="1" max="100" value="${cfg().lowMarkPct || 40}"></div>
      <div class="field"><label>Exam rounds / shifts (comma-separated)</label><input class="input" id="setShifts" value="${esc((cfg().examShifts || []).join(', '))}"></div>
      <button class="btn ghost block" style="margin-bottom:10px" onclick="saveCfg()">Save preferences</button>
      <button class="btn danger block" onclick="resetAll()">Reset all data</button>

    ${syncPanel()}

    }
    function saveBrand() {
      setCfg({ appName: $('#setApp').value.trim() || 'Campus Desk', appLogo: $('#setLogo').value.trim(), appTagline: $('#setTag').value.trim() });
      document.title = brandName(); logEvent('Updated system branding'); toast('Branding saved', 'ok'); render();
    }
    function saveMyAccount() {
      const me = currentStaff(); if (!me) return; const staff = DB.read('staff', []); const u = staff.find(x => x.id === me.id);
      const name = $('#myName').value.trim(), username = $('#myUser').value.trim(), password = $('#myPass').value;
      if (!name || !username || !password) { toast('Fill all fields', 'bad'); return; }
      if (staff.some(s => s.username.toLowerCase() === username.toLowerCase() && s.id !== me.id)) { toast('Username already exists', 'bad'); return; }
      Object.assign(u, { name, username, password }); DB.write('staff', staff); logEvent('Updated own account'); toast('Saved', 'ok'); render();
    }
    function saveCfg() {
      const shifts = ($('#setShifts').value || '').split(',').map(s => s.trim()).filter(Boolean);
      setCfg({ backupEveryH: Math.max(1, Number($('#setBkup').value) || 24), lowMarkPct: Math.max(1, Math.min(100, Number($('#setLow').value) || 40)), examShifts: shifts.length ? shifts : ['Morning', 'Day', 'Evening'] });
      const sf = ATYPES.exam.fields.find(f => f.k === 'round'); if (sf) sf.options = (shifts.length ? shifts : ['Morning', 'Day', 'Evening']).join(',');
      toast('Preferences saved', 'ok'); render();
    }
    function saveAdmin() {
      const a = DB.read('admin', {}); a.name = $('#setName').value.trim() || 'Administrator'; a.username = $('#setUser').value.trim() || 'admin'; a.password = $('#setPass').value || 'admin123'; DB.write('admin', a);
      const staff = DB.read('staff', []); const su = staff.find(x => x.role === 'super_admin'); if (su) { su.name = a.name; su.username = a.username; su.password = a.password; DB.write('staff', staff); }
      toast('Settings saved', 'ok'); render();
    }
    const BACKUP_KEYS = ['admin', 'events', 'apps', 'trash', 'staff', 'programs', 'students', 'acad', 'marks', 'payments', 'history', 'teachers', 'examtypes', 'logs', 'notifs', 'cfg'];
    function exportBackup() {
      const data = {}; BACKUP_KEYS.forEach(k => data[k] = DB.read(k, null));
      dl('campus-desk-backup-' + new Date().toISOString().slice(0, 10) + '.json', new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
      markBackupDone(); logEvent('Exported full data backup');
    }
    function importBackup(inp) {
      const f = inp.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => {
        try {
          const d = JSON.parse(r.result);
          BACKUP_KEYS.forEach(k => { if (d[k] != null) DB.write(k, d[k]); });
          toast('Backup imported', 'ok'); logEvent('Imported data backup'); render();
        } catch (e) { toast('Invalid backup file', 'bad'); }
      }; r.readAsText(f); inp.value = '';
    }
    function resetAll() { confirmDelete({ title: 'Reset all data?', body: 'This permanently erases every record (events, students, marks, fees, logs…) and the trash. This cannot be undone.', confirmText: 'Reset everything', onYes: () => { ['events', 'apps', 'trash', 'programs', 'students', 'acad', 'marks', 'payments', 'history', 'teachers', 'logs', 'notifs'].forEach(k => DB.write(k, [])); toast('All data reset', 'warn'); go('/'); render(); } }); }

    /* draft custom fields */

    function fieldRow(f, i, scope) {
      return `<div class="fieldrow">
    <div class="field"><label>Field label</label><input class="input" value="${esc(f.label)}" oninput="updField('${scope}',${i},'label',this.value)" placeholder="e.g. Citizenship No"></div>

    <div class="field"><label>Required</label><select class="input" onchange="updField('${scope}',${i},'required',this.value==='yes')">

  </div>`;
    }
    let progScope = {}; // index -> for program fields we use scope 'prog:<pi>'
    function updField(scope, i, key, val) {
      if (scope === 'draft') { draft.fields[i][key] = val; if (key === 'type') renderDraftFields(); }

    function renderInput(f, val = '') {

    function collectInputs(scopeEl) {

    function saveEntry(eventId, entryId, program) {

      const apps = DB.read('apps', []);
      if (entryId) {
        const a = apps.find(x => x.id === entryId); a.data = { ...a.data, ...data }; a.program = prog; a.dob = data.f_dob || a.dob; a.updatedAt = nowISO();

    /* ============================ QR ============================ */
    /* Bulletproof on-screen QR: use the library's own image output (works without canvas quirks) */
    function qrImg(text, sizePx) {
      const qr = qrcode(0, 'M'); qr.addData(String(text)); qr.make();
      const n = qr.getModuleCount(); const cell = Math.max(2, Math.floor((sizePx || 220) / (n + 8)));
      const img = document.createElement('img');
      img.src = qr.createDataURL(cell, cell * 4);
      img.alt = 'QR code'; img.style.width = '100%'; img.style.maxWidth = (sizePx || 220) + 'px'; img.style.height = 'auto'; img.style.imageRendering = 'pixelated'; img.style.display = 'block'; img.style.margin = '0 auto';
      return img;
    }
    function qrInto(sel, text, sizePx) {
      const box = (typeof sel === 'string') ? $(sel) : sel; if (!box) return; box.innerHTML = '';
      try { box.appendChild(qrImg(text, sizePx)); }
      catch (e) { box.innerHTML = '<p class="hint">Could not render QR — text too long.</p>'; }
    }
    /* base URL of THIS page (works for http(s) and file://) */
    function baseURL() { return location.href.split('#')[0]; }
    function b64urlEnc(str) { try { return btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); } catch (_) { return ''; } }
    function b64urlDec(b) { try { b = String(b).replace(/-/g, '+').replace(/_/g, '/'); return decodeURIComponent(escape(atob(b))); } catch (_) { return ''; } }
    /* compact form schema so any device opening the link can render the form even without local data */
    function encodeForm(e) {
      const sf = f => ({ i: f.id, l: f.label, ty: f.type, r: f.required ? 1 : 0, o: f.options || '' });
      const slim = {
        t: e.title, c: e.category, dt: e.date, lo: e.location || '', de: e.description || '',
        f: (e.fields || []).map(sf), p: (e.programs || []).map(x => ({ n: x.name, f: (x.fields || []).map(sf) }))
      };
      return b64urlEnc(JSON.stringify(slim));
    }
    function eventFromPayload(id, p) {
      const rf = f => ({ id: f.i, label: f.l, type: f.ty, required: !!f.r, options: f.o || '' });
      return {
        id, title: p.t || 'Form', category: p.c || 'college_event', date: p.dt || '', location: p.lo || '', description: p.de || '',
        fields: (p.f || []).map(rf), programs: (p.p || []).map(x => ({ name: x.n, fields: (x.f || []).map(rf) })), _fromLink: true
      };
    }
    function eventURL(id, program) {
      let url = baseURL() + '#/r/' + id + (program ? ('/p/' + encodeURIComponent(program)) : '');
      const e = DB.read('events', []).find(x => x.id === id);
      const qs = [];
      if (e) { const d = encodeForm(e); if (d && d.length <= 1100) { qs.push('d=' + d); } } // embed when small enough to scan reliably
      const sc = syncCfg(); if (sc.url && sc.room) { qs.push('sy=' + b64urlEnc(JSON.stringify({ u: sc.url, r: sc.room }))); }
      if (qs.length) url += '?' + qs.join('&');
      return url;
    }

    /* ============================ ATTENDANCE EXCEL ============================ */
    function exportEntries(eventId) {
      const e = DB.read('events', []).find(x => x.id === eventId);
      const apps = DB.read('apps', []).filter(a => a.eventId === eventId);
      if (!apps.length) { toast('No entries to export', 'warn'); return; }
      const fieldsMeta = allFieldsFor(e);
      const rows = apps.map(a => { const o = {}; fieldsMeta.forEach(f => o[f.label] = a.data[f.id] || ''); o['Attendance'] = a.attendance || ''; o['Submitted'] = fmtDT(a.createdAt); return o; });

    function exportAttendanceSheet(eventId) {
      const e = DB.read('events', []).find(x => x.id === eventId);
      const apps = DB.read('apps', []).filter(a => a.eventId === eventId && ['approved', 'admit_issued', 'present', 'absent', 'result'].includes(a.status));
      if (!apps.length) { toast('No approved applicants yet', 'warn'); return; }
      // group/sort by program, build one workbook with a sheet per program

      const wb = XLSX.utils.book_new();
      const byProg = {}; apps.forEach(a => { (byProg[a.program || 'General'] = byProg[a.program || 'General'] || []).push(a); });
      Object.entries(byProg).forEach(([prog, list]) => {
        const rows = list.sort((x, y) => (x.symbol || '').localeCompare(y.symbol || '')).map((a, i) => ({
          'SN': i + 1, 'Symbol No': a.symbol, 'Name': a.data.f_name || '', 'DOB': a.dob || '', 'Program': prog, 'Signature': '', 'Present (yes/no)': ''
        }));
        const ws = XLSX.utils.json_to_sheet(rows); ws['!cols'] = [{ wch: 5 }, { wch: 16 }, { wch: 24 }, { wch: 14 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];
        XLSX.utils.book_append_sheet(wb, ws, prog.slice(0, 28) || 'Sheet');
      });
      XLSX.writeFile(wb, `Attendance-${(e.title || 'exam').replace(/\s+/g, '-')}.xlsx`);
      toast('Attendance sheet downloaded', 'ok');
    }
    function importAttendance(eventId, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const r = new FileReader();
      r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); let updated = 0;
          const apps = DB.read('apps', []);
          wb.SheetNames.forEach(sn => {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn]);
            rows.forEach(row => {
              const sym = String(row['Symbol No'] || row['Symbol'] || row['symbol'] || '').trim();
              const present = String(row['Present (yes/no)'] || row['Present'] || row['present'] || '').trim().toLowerCase();
              if (!sym) return;
              const a = apps.find(x => x.eventId === eventId && (x.symbol || '').toLowerCase() === sym.toLowerCase());
              if (a) {
                const val = ['yes', 'y', '1', 'present', 'true', 'p'].includes(present) ? 'present' : (present ? 'absent' : a.attendance);
                if (val && val !== a.attendance) {
                  a.attendance = val; a.status = val === 'present' ? 'present' : (a.status === 'result' ? 'result' : 'absent');
                  a.updatedAt = nowISO(); a.logs.push({ at: nowISO(), action: 'Attendance imported: ' + val }); updated++;
                }
              }
            });
          });
          DB.write('apps', apps);
          recordUpload(eventId, 'Attendance (Excel)', f.name, `${updated} updated`, f);
          toast(updated ? `Attendance updated for ${updated} applicant(s)` : 'No matching symbols found', updated ? 'ok' : 'warn');
          render();
        } catch (e) { toast('Could not read file', 'bad'); }
      };
      r.readAsBinaryString(f); inp.value = '';
    }
    function sheetDownload(rows, name, sheet = 'Sheet1') {
      if (!window.XLSX) { toast('Excel library not loaded', 'bad'); return; }
      const ws = XLSX.utils.json_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, sheet);
      XLSX.writeFile(wb, name); toast('Excel downloaded', 'ok');
    }

    /* ============================ RESULTS (upload & publish) ============================ */
    function pick(row, keys) { for (const k of keys) { if (row[k] != null && String(row[k]).trim() !== '') return row[k]; } return ''; }
    function normOutcome(s) {
      const t = String(s).trim().toLowerCase();
      if (['pass', 'passed', 'p', 'selected', 'admit', 'admitted', 'qualified', 'y', 'yes'].includes(t)) return 'Pass';
      if (['fail', 'failed', 'f', 'rejected', 'reject', 'not qualified', 'no', 'n'].includes(t)) return 'Fail';
      if (['waitlist', 'wait', 'waiting', 'wl', 'hold'].includes(t)) return 'Waitlist';
      return String(s).trim();
    }

    function viewResults() {
      const evs = entranceEvents();
      if (!evs.length) return panelWrap('Results', emptyState('No entrance exams yet', 'Create an entrance exam first — then download its results template, fill in marks, and upload to publish.', 'New entrance exam', "openEventModal('entrance_exam')"));

    <div class="pb flush"><div class="tablewrap"><table class="tbl"><thead><tr>

      ${published.sort((x, y) => (x.symbol || '').localeCompare(y.symbol || '')).map(a => `<tr>

    function exportResultsTemplate(eventId) {
      const e = DB.read('events', []).find(x => x.id === eventId);
      const apps = DB.read('apps', []).filter(a => a.eventId === eventId && ['approved', 'admit_issued', 'present', 'absent', 'result'].includes(a.status));
      if (!apps.length) { toast('No approved applicants yet — approve applicants first', 'warn'); return; }

        'Symbol No': a.symbol || '', 'Name': a.data.f_name || '', 'DOB': a.dob || '', 'Program': a.program || '',
        'Outcome (Pass/Fail/Waitlist)': a.result ? a.result.outcome : '',
        'Marks': a.result && a.result.marks != null ? a.result.marks : '',
        'Rank': a.result && a.result.rank != null ? a.result.rank : '',
        'Message to student': a.result ? (a.result.message || a.result.remarks || '') : '',
        'Offer admission (yes/no)': a.result && a.result.admission && a.result.admission.offered ? 'yes' : '',
        'Admission message': a.result && a.result.admission ? (a.result.admission.message || '') : ''

    function importResults(eventId, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const r = new FileReader();
      r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); let updated = 0, missing = 0;
          const apps = DB.read('apps', []);
          wb.SheetNames.forEach(sn => {
            XLSX.utils.sheet_to_json(wb.Sheets[sn]).forEach(row => {
              const sym = String(pick(row, ['Symbol No', 'Symbol', 'symbol']) || '').trim();
              const outcome = String(pick(row, ['Outcome (Pass/Fail/Waitlist)', 'Outcome', 'Result', 'outcome']) || '').trim();
              if (!sym || !outcome) return; // skip blank/un-graded rows
              const a = apps.find(x => x.eventId === eventId && (x.symbol || '').toLowerCase() === sym.toLowerCase());
              if (!a) { missing++; return; }
              const marksRaw = pick(row, ['Marks', 'Score', 'marks']);
              const rankRaw = pick(row, ['Rank', 'rank']);
              const msg = String(pick(row, ['Message to student', 'Message', 'Remarks', 'message']) || '').trim();
              const offerRaw = String(pick(row, ['Offer admission (yes/no)', 'Offer admission', 'Admission', 'admission']) || '').trim().toLowerCase();
              const admMsg = String(pick(row, ['Admission message', 'admission message', 'Admission Message']) || '').trim();
              const offered = ['yes', 'y', '1', 'true', 'offer', 'offered', 'admit', 'admitted', 'selected'].includes(offerRaw);
              a.result = {
                outcome: normOutcome(outcome),
                marks: marksRaw !== '' && marksRaw != null && !isNaN(Number(marksRaw)) ? Number(marksRaw) : null,
                rank: rankRaw !== '' && rankRaw != null && !isNaN(Number(rankRaw)) ? Number(rankRaw) : null,
                remarks: msg, message: msg,
                admission: { offered, message: admMsg || (offered ? ('Congratulations! You are offered admission' + (a.program ? (' to ' + a.program) : '') + '. Show the admission QR below at the admissions office to begin enrolment.') : '') }
              };
              a.status = 'result'; a.updatedAt = nowISO();
              a.logs.push({ at: nowISO(), action: 'Result published via Excel: ' + a.result.outcome + (offered ? ' · admission offered' : '') });
              updated++;
            });
          });
          DB.write('apps', apps);
          let m = updated ? `Published results for ${updated} applicant(s)` : 'No matching rows found';
          if (missing) m += ` · ${missing} symbol(s) not found`;
          toast(m, updated ? 'ok' : 'warn'); render();
        } catch (err) { toast('Could not read results file', 'bad'); }
      };
      r.readAsBinaryString(f); inp.value = '';
    }

    /* ============================ QUESTION PAPERS (exam builder + grading) ============================ */
    function examOf(e) { if (!e.exam) e.exam = { questions: [], passMarks: 0 }; return e.exam; }

    function letter(i) { return String.fromCharCode(65 + i); }
    function letterToIdx(L) { const c = String(L || '').trim().toUpperCase().charCodeAt(0) - 65; return (c >= 0 && c < 26) ? c : -1; }
    function writeEvent(e) { const evs = DB.read('events', []); const i = evs.findIndex(x => x.id === e.id); if (i >= 0) { evs[i] = e; DB.write('events', evs); } }
    function examApproved(a) { return !!(a.exam && a.exam.approved); }

    function viewPapers() {

    <div>
      <div class="panel"><div class="ph"><h2>Paper summary</h2></div>

          <div class="kv"><span>Total marks</span><b>${total}</b></div>
          <div class="field" style="margin-top:10px"><label>Pass marks</label>
            <input class="input" id="passMarks" type="number" min="0" value="${ex.passMarks || 0}" onchange="savePassMarks('${id}',this.value)"></div>

          <button class="btn ghost block sm" onclick="exportQuestions('${id}')">⬇ Export questions (Excel)</button>

          <button class="btn subtle block sm" style="margin-top:8px" ${qs.length ? '' : 'disabled'} onclick="generateAnswerSheet('${id}')">🖨 Answer sheet (print / PDF)</button>

      </div>
    </div>
  </div>

  <div class="panel" style="margin-top:16px">
    <div class="ph"><h2>Grade &amp; results</h2><span class="chip muted">${graded.length}/${apps.length} graded</span><div class="spacer"></div>
      <button class="btn ghost sm" onclick="exportResponseTemplate('${id}')">⬇ Response template</button>

    function questionRow(eid, q, i) {
      return `<div class="qrow">
    <div class="qtop"><b>Q${i + 1}.</b> <span>${esc(q.text)}</span>
      <span class="spacer"></span><span class="chip brand">${q.marks} mark${Number(q.marks) === 1 ? '' : 's'}</span>

    <div class="qopts">${(q.options || []).map((o, oi) => `<span class="qopt ${oi === q.correct ? 'correct' : ''}">${letter(oi)}. ${esc(o)}${oi === q.correct ? ' ✓' : ''}</span>`).join('')}</div>

    let qDraft = null;
    function openQuestionModal(eid, qid) {
      const e = DB.read('events', []).find(x => x.id === eid); const ex = examOf(e);
      const q = qid ? ex.questions.find(x => x.id === qid) : null;
      qDraft = q ? JSON.parse(JSON.stringify(q)) : { id: uid('q'), text: '', options: ['', ''], correct: 0, marks: 1 };
      modal(`<div class="mh"><div><h2>${qid ? 'Edit' : 'Add'} question</h2><p>${esc(e.title)}</p></div><button class="x" data-x>×</button></div>
    <div class="mb">
      <div class="field"><label>Question</label><textarea class="input" id="qText" rows="2" placeholder="Type the question">${esc(qDraft.text)}</textarea></div>
      <label style="display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px">Options — select the correct one</label>
      <div id="qOpts"></div>
      <button class="btn ghost sm" onclick="addQOption()" style="margin-top:4px">+ Add option</button>
      <div class="field" style="margin-top:14px;max-width:170px"><label>Marks for this question</label><input class="input" id="qMarks" type="number" min="1" value="${qDraft.marks}"></div>
    </div>
    <div class="mf"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" onclick="saveQuestion('${eid}','${qid || ''}')">Save question</button></div>`, { lg: true });
      renderQOptions();
    }
    function renderQOptions() {
      const box = $('#qOpts'); if (!box) return;
      box.innerHTML = qDraft.options.map((o, i) => `<div class="qoptrow">
    <input type="radio" name="qcorrect" ${i === qDraft.correct ? 'checked' : ''} onchange="qDraft.correct=${i}" title="Mark as correct">
    <input class="input" value="${esc(o)}" placeholder="Option ${letter(i)}" oninput="qDraft.options[${i}]=this.value">
    ${qDraft.options.length > 2 ? `<button class="iconbtn" onclick="rmQOption(${i})" title="Remove">✕</button>` : ''}
  </div>`).join('');
    }
    function addQOption() { if (qDraft.options.length >= 6) { toast('Up to 6 options', 'warn'); return; } qDraft.options.push(''); renderQOptions(); }
    function rmQOption(i) { qDraft.options.splice(i, 1); if (qDraft.correct >= qDraft.options.length) qDraft.correct = 0; renderQOptions(); }
    function saveQuestion(eid, qid) {
      qDraft.text = $('#qText').value.trim(); qDraft.marks = Math.max(1, Number($('#qMarks').value) || 1);
      const opts = qDraft.options.map(o => String(o).trim());
      if (!qDraft.text) { toast('Enter the question', 'bad'); return; }
      if (opts.filter(o => o).length < 2) { toast('Add at least 2 options', 'bad'); return; }
      if (!opts[qDraft.correct]) { toast('Mark a non-empty option as correct', 'bad'); return; }
      const kept = []; let correctIdx = 0;
      opts.forEach((o, i) => { if (o) { if (i === qDraft.correct) correctIdx = kept.length; kept.push(o); } });
      qDraft.options = kept; qDraft.correct = correctIdx;

      return { correct, wrong, unanswered, obtained, total, pass };

    function loadPdfJs() {
      if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = () => { try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; res(window.pdfjsLib); } catch (e) { rej(e); } };
        s.onerror = rej; document.head.appendChild(s);
      });
    }
    function parseAnswersFromText(block, questions) {
      const map = {};
      const re = /(?:q\s*)?(\d{1,3})\s*[:.\)\-]?\s*([a-fA-F])\b/gi; let m;
      while ((m = re.exec(block))) { const qn = parseInt(m[1], 10); if (qn >= 1 && qn <= questions.length) { map[qn] = m[2].toUpperCase(); } }
      const responses = {}; let detected = 0;
      questions.forEach((q, i) => { const L = map[i + 1]; if (L) { const idx = L.charCodeAt(0) - 65; if (idx >= 0 && idx < q.options.length) { responses[q.id] = idx; detected++; } } });
      return { responses, detected };
    }
    function importAnswerPDF(eid, inp) {
      const file = inp.files[0]; if (!file) return; inp.value = '';
      const e = DB.read('events', []).find(x => x.id === eid); const ex = examOf(e);
      if (!ex.questions.length) { toast('Build the question paper first', 'warn'); return; }
      toast('Reading PDF…', '');
      loadPdfJs().then(pdfjs => {
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const pdf = await pdfjs.getDocument({ data: new Uint8Array(ev.target.result) }).promise;
            let text = '';
            for (let p = 1; p <= pdf.numPages; p++) { const page = await pdf.getPage(p); const c = await page.getTextContent(); text += ' ' + c.items.map(i => i.str).join(' '); }
            const lc = text.toLowerCase();
            const apps = DB.read('apps', []).filter(a => a.eventId === eid && a.symbol);
            // Locate each student's section by Symbol No (full symbol, else numeric tail) — supports many students in one PDF
            const hits = [];
            apps.forEach(a => {
              const sym = String(a.symbol).toLowerCase(); let idx = lc.indexOf(sym);
              if (idx < 0) { const tail = (String(a.symbol).match(/(\d{3,})\s*$/) || [])[1]; if (tail) idx = lc.indexOf(tail.toLowerCase()); }
              if (idx >= 0) hits.push({ id: a.id, idx });
            });
            hits.sort((x, y) => x.idx - y.idx);
            if (!hits.length) {
              recordUpload(eid, 'Answer sheet (PDF)', file.name, 'No Symbol No found — manual grading', file);
              pickApplicantForGrading(eid, lc.replace(/[^a-z0-9]/g, '').length < 8
                ? 'This looks like a scanned/photo PDF with no text layer, so neither the Symbol No nor the answers can be read automatically. Pick the student to grade by hand.'
                : 'Couldn’t match a Symbol No from the PDF. Pick the student to grade by hand.');
              return;
            }
            const all = DB.read('apps', []); const parsed = [];
            hits.forEach((h, i) => {
              const end = (i + 1 < hits.length) ? hits[i + 1].idx : text.length;
              const block = text.slice(h.idx, end);
              const { responses, detected } = parseAnswersFromText(block, ex.questions);
              const g = computeGrade(ex, responses);
              const a = all.find(x => x.id === h.id);
              a.exam = { responses, ...g, approved: false, gradedAt: nowISO(), source: 'pdf', detected };
              a.updatedAt = nowISO(); a.logs.push({ at: nowISO(), action: `Answers read from PDF: ${detected}/${ex.questions.length} detected · scored ${g.obtained}/${g.total}` });
              parsed.push({ appId: a.id, name: a.data.f_name || '', symbol: a.symbol, detected, total: ex.questions.length, score: g.obtained, max: g.total, pass: g.pass });
            });
            DB.write('apps', all);
            recordUpload(eid, 'Answer sheet (PDF)', file.name, `${hits.length} student(s) read from PDF`, file);
            const anyDetected = parsed.some(p => p.detected > 0);
            toast(`Read ${hits.length} student(s) from the PDF${anyDetected ? '' : ' — but no answers were recognised; review to enter them'}`, anyDetected ? 'ok' : 'warn');
            render(); openPdfReview(eid, parsed);
          } catch (err) { toast('Could not parse the PDF', 'bad'); }
        };
        reader.readAsArrayBuffer(file);
      }).catch(() => { toast('PDF reader needs internet to load the first time. Use Excel responses or grade manually instead.', 'warn'); });
    }
    function openPdfReview(eid, parsed) {

    <td>${p.detected}/${p.total} ${p.detected < p.total ? '<span class="chip warn">check</span>' : '<span class="chip ok">all</span>'}</td>

      modal(`<div class="mh"><div><h2>PDF read — review answers</h2><p>${parsed.length} student(s) detected · graded but not yet published</p></div><button class="x" data-x>×</button></div>

    /* ----- uploads history (question papers / answer sheets / responses / attendance) ----- */
    function recordUpload(eid, kind, name, summary, file) {
      const e = DB.read('events', []).find(x => x.id === eid); if (!e) return;
      if (!e.uploads) e.uploads = [];
      const rec = { id: uid('up'), kind, name: name || '(file)', summary: summary || '', at: nowISO(), data: null };
      e.uploads.unshift(rec); if (e.uploads.length > 50) e.uploads.length = 50;
      writeEvent(e);
      if (file && file.size && file.size < 1200000) {
        const fr = new FileReader();

    function openStudentModal(id, programId) {

    function saveMark(pid, sem, id) {
      const marks = DB.read('marks', []); const studentId = $('#mkStu').value; const course = $('#mkCourse').value;
      const obtained = Number($('#mkObt').value) || 0; const full = Number($('#mkFull').value) || 100; const exam = $('#mkExam').value.trim() || 'Internal';
      let rec;
      if (id) { rec = marks.find(x => x.id === id); Object.assign(rec, { studentId, course, obtained, full, exam }); }
      else { rec = { id: uid('mk'), studentId, programId: pid, semester: Number(sem), course, exam, obtained, full, year: new Date().getFullYear() }; marks.push(rec); }
      DB.write('marks', marks); afterMarkSaved(rec, pid); logEvent(`Recorded marks: ${course} (${exam})`, pid); closeModal(); toast('Marks saved', 'ok'); render();
    }
    function deleteMark(id) { confirmDelete({ title: 'Delete marks?', body: 'This record will be removed.', confirmText: 'Delete', onYes: () => { DB.write('marks', DB.read('marks', []).filter(x => x.id !== id)); toast('Deleted', 'warn'); render(); } }); }
    function exportMarks(pid, sem) {
      const marks = DB.read('marks', []).filter(m => m.programId === pid && Number(m.semester) === Number(sem)); const students = DB.read('students', []);
      if (!marks.length) { toast('No marks to export', 'warn'); return; }
      sheetDownload(marks.map(m => { const s = students.find(x => x.id === m.studentId); return { Symbol: s ? s.symbol : '', Student: s ? s.name : '', Subject: m.course, Exam: m.exam, Obtained: m.obtained, Full: m.full }; }), `Marks-${(progName(pid) || '').replace(/\s+/g, '-')}-S${sem}.xlsx`, 'Marks');
      histAdd('Marks export', `Marks-${progName(pid)}-S${sem}.xlsx`, marks.length + ' rows');
    }
    function importMarks(pid, sem, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const r = new FileReader(); r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          const students = DB.read('students', []); const marks = DB.read('marks', []); let n = 0, miss = 0;
          rows.forEach(row => {
            const sym = String(pick(row, ['Symbol', 'symbol']) || '').trim(); const course = String(pick(row, ['Subject', 'Course']) || '').trim(); if (!sym || !course) return;
            const s = students.find(x => (x.symbol || '').toLowerCase() === sym.toLowerCase() && x.programId === pid); if (!s) { miss++; return; }
            const obtained = Number(pick(row, ['Obtained', 'Marks'])) || 0; const full = Number(pick(row, ['Full', 'FullMarks'])) || 100; const exam = String(pick(row, ['Exam', 'ExamType', 'Exam Type']) || 'Internal');
            let ex = marks.find(m => m.studentId === s.id && m.course === course && Number(m.semester) === Number(sem) && m.exam === exam);
            if (ex) { ex.obtained = obtained; ex.full = full; } else { ex = { id: uid('mk'), studentId: s.id, programId: pid, semester: Number(sem), course, exam, obtained, full, year: new Date().getFullYear() }; marks.push(ex); } afterMarkSaved(ex, pid); n++;
          });
          DB.write('marks', marks); histAdd('Marks import', f.name, n + ' rows' + (miss ? ` · ${miss} unmatched` : ''), f); logEvent(`Bulk-imported marks (${n} rows)`, pid); toast(`Imported marks for ${n} row(s)` + (miss ? ` · ${miss} unmatched` : ''), n ? 'ok' : 'warn'); render();
        } catch (err) { toast('Could not read file', 'bad'); }
      }; r.readAsBinaryString(f); inp.value = '';
    }

      ${rows.length ? `<div class="tablewrap"><table class="tbl"><thead><tr><th>Subject</th><th>Sem</th><th>Exam type</th><th>Full</th><th>Obtained</th><th>%</th><th>Alert</th></tr></thead><tbody>

      if (tab === 'attend') {
        const mk = monthKey(); const recs = DB.read('attend', []).filter(a => a.studentId === st.id && a.absent).sort((a, b) => String(b.date).localeCompare(String(a.date)));
        const thisMonth = recs.filter(a => monthKey(a.date) === mk).length; const limit = cfg().attLimit || 4;

      ${alerts.length ? `<div class="panel" style="margin-top:14px"><div class="ph"><h2>Alerts &amp; notices</h2></div><div class="pb">${alerts.map(n => `<div class="kv"><span><b>${esc(n.title)}</b> ${n.body ? '· ' + esc(n.body) : ''}</span><span class="sub">${fmtDT(n.at)}</span></div>`).join('')}</div></div>` : ''}
      ${recs.length ? `<div class="panel" style="margin-top:14px"><div class="ph"><h2>Absence dates</h2></div><div class="pb flush"><div class="tablewrap"><table class="tbl"><thead><tr><th>Date</th><th>Month</th></tr></thead><tbody>${recs.slice(0, 40).map(a => `<tr><td>${esc(a.date)}</td><td class="sub">${monthKey(a.date)}</td></tr>`).join('')}</tbody></table></div></div></div>` : '<p class="hint" style="margin-top:12px">No absences recorded. Keep it up! 🎉</p>'}
    </div>`);
      }
      if (tab === 'calendar') {
        const now = new Date(); let cy = Number(qparam('cy')) || now.getFullYear(); let cm = qparam('cm') !== '' ? Number(qparam('cm')) : now.getMonth(); if (isNaN(cm)) cm = now.getMonth();
        const entries = calVisibleStudent(pid, cur);
        const base = `/me/calendar?s=${cur}&`;
        return panelWrap('Academic calendar — Semester ' + cur, `<div class="pb">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px">${calNavBar(cy, cm, base)}</div>
