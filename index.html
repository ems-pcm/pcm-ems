    function showDayStudent(date, pid, cur) {
      const list = calVisibleStudent(pid, cur).filter(e => String(e.date) === String(date));
      modal(`<div class="mh"><div><h2>${esc(date)}</h2><p>${list.length} entr${list.length === 1 ? 'y' : 'ies'}</p></div><button class="x" data-x>×</button></div>
    <div class="mb">${list.length ? list.map(e => `<div class="card" style="margin-bottom:8px${e.important ? ';border-color:#e0a106;background:#fff8e6' : ''}"><b>${e.important ? '⭐ ' : ''}${esc(e.title)}</b> <span class="chip muted">${esc(e.kind || 'Event')}</span>${e.programId ? `<div class="sub">${esc(progName(e.programId))}</div>` : '<div class="sub">All programs</div>'}</div>`).join('') : '<p class="hint">No events.</p>'}</div>
    <div class="mf"><button class="btn primary" data-x>Close</button></div>`, { lg: true });
    }
    function statCard(label, val, icon) { return `<div class="card stat"><div class="k"><span class="ic">${icon}</span>${label}</div><div class="v">${val}</div></div>`; }
    function miniBarChart(values, labels, opts = {}) {
      const w = 720, h = opts.h || 140, pad = 24, n = values.length;
      if (!n) return `<div class="minichart"><div class="mc-empty">Not enough data yet</div></div>`;
      const max = Math.max(1, ...values);
      const bw = (w - pad * 2) / n * 0.62, gap = (w - pad * 2) / n;
      const color = opts.color || 'var(--brand)';
      const bars = values.map((v, i) => {
        const bh = Math.max(2, (v / max) * (h - pad * 2)); const x = pad + i * gap + (gap - bw) / 2; const y = h - pad - bh;
        return `<rect class="mc-bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="4" fill="${color}"><title>${esc(String(labels ? labels[i] : i + 1))}: ${v}</title></rect>
      <text x="${(x + bw / 2).toFixed(1)}" y="${h - 6}" text-anchor="middle" font-size="10" fill="var(--muted)">${esc(String(labels ? labels[i] : i + 1))}</text>`;
      }).join('');
      return `<div class="minichart"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}</svg></div>`;
    }

    /* ============================================================================
       SIS PHASE 2 — exam categories, teachers, timetable grid, shift exams,
       immutable activity log, notifications, PDF/print reports, promotion,
       semester visibility, auto-backup alerts, calendar widget, global search.
       ============================================================================ */

    function seedSIS2() {
      if (!DB.read('teachers', null)) DB.write('teachers', []);
      if (!DB.read('examtypes', null)) DB.write('examtypes', [
        { id: uid('et'), name: 'First Term', kind: 'exam', order: 1 },
        { id: uid('et'), name: 'Mid Term', kind: 'exam', order: 2 },
        { id: uid('et'), name: 'Pre-Board', kind: 'exam', order: 3 },
        { id: uid('et'), name: 'Final', kind: 'exam', order: 4 },
        { id: uid('et'), name: 'Class Test', kind: 'test', order: 5 },
      ]);
      if (!DB.read('logs', null)) DB.write('logs', []);
      if (!DB.read('notifs', null)) DB.write('notifs', []);
      if (!DB.read('cfg', null)) DB.write('cfg', { backupEveryH: 24, backupLastAt: null, lowMarkPct: 40, examShifts: ['Morning', 'Day', 'Evening'] });
    }
    seedSIS2();

    /* extend permissions + academic types (objects are mutable) */
    ['teachers', 'examtypes', 'reports', 'promote', 'logs'].forEach(k => { if (!PERMS.includes(k)) PERMS.push(k); });
    Object.assign(PERM_LABELS, { teachers: 'Teachers', examtypes: 'Exam categories', reports: 'Reports', promote: 'Promote / shift students', logs: 'Activity log' });
    ATYPES.teacher = {
      label: 'Teachers', sing: 'Teacher', perm: 'teachers', icon: '👩‍🏫', sem: false,
      fields: [{ k: 'name', l: 'Name', req: 1 }, { k: 'subjects', l: 'Subjects' }, { k: 'phone', l: 'Phone' }, { k: 'email', l: 'Email' }],
      cols: ['name', 'subjects', 'phone', 'email'], xl: ['Name', 'Subjects', 'Phone', 'Email']
    };
    if (!ATYPES.exam.fields.some(f => f.k === 'shift')) ATYPES.exam.fields.splice(1, 0, { k: 'shift', l: 'Shift', type: 'select', options: (DB.read('cfg', {}).examShifts || ['Morning', 'Day', 'Evening']).join(',') });
    (function () { const kf = ATYPES.calendar.fields.find(f => f.k === 'kind'); if (kf) { kf.type = 'text'; kf.l = 'Type (any — e.g. Holiday, Exam, Registration, Event)'; } })();

    /* ---------- config helpers ---------- */
    function cfg() { return DB.read('cfg', { backupEveryH: 24, lowMarkPct: 40, examShifts: ['Morning', 'Day', 'Evening'] }); }
    function setCfg(patch) { const c = cfg(); Object.assign(c, patch); DB.write('cfg', c); }

    /* ---------- immutable activity log ---------- */
    function logEvent(action, programId) {
      try {
        const st = currentStaff(); const stu = (typeof currentStudent === 'function') ? currentStudent() : null;
        let actorRole = 'system', actorName = 'System', actorId = '', pid = programId || null;
        if (stu) { actorRole = 'student'; actorName = stu.name; actorId = stu.id; pid = stu.programId; }
        else if (st) { actorRole = st.role === 'super_admin' ? 'admin' : 'coordinator'; actorName = st.name; actorId = st.id; }
        const logs = DB.read('logs', []); logs.unshift({ id: uid('lg'), at: nowISO(), actorRole, actorName, actorId, action, programId: pid });
        if (logs.length > 2000) logs.length = 2000; DB.write('logs', logs);
      } catch (_) { }
    }

    function viewLogs() {
      if (!(isSuper() || can('logs'))) return restricted();
      const tab = qparam('t') || (isSuper() ? 'all' : 'student');
      let logs = DB.read('logs', []); const mine = myProgramIds();
      if (mine !== null) logs = logs.filter(l => l.actorRole === 'student' && mine.includes(l.programId)); // coordinator: only their students
      const tabs = isSuper() ? [['all', 'All'], ['student', 'Students'], ['coordinator', 'Coordinators'], ['admin', 'Admins / System']] : [['student', 'My students']];
      let rows = logs; if (tab === 'student') rows = logs.filter(l => l.actorRole === 'student');
      else if (tab === 'coordinator') rows = logs.filter(l => l.actorRole === 'coordinator');
      else if (tab === 'admin') rows = logs.filter(l => l.actorRole === 'admin' || l.actorRole === 'system');
      return `<div class="panel"><div class="ph"><h2>Activity log</h2><span class="chip muted">read-only</span><div class="spacer"></div>
      <input class="input sm" style="width:200px" placeholder="Search activity…" oninput="filterRows(this,'#logTbl')"></div>
    <div class="pb" style="padding-bottom:0"><div class="tabs wrap">${tabs.map(([k, l]) => `<button class="${tab === k ? 'active' : ''}" onclick="go('/logs?t=${k}')">${l}</button>`).join('')}</div></div>
    <div class="pb flush">${rows.length ? `<div class="tablewrap"><table class="tbl dt" id="logTbl"><thead><tr><th>When</th><th>Who</th><th>Role</th><th>Activity</th><th>Program</th></tr></thead><tbody>
      ${rows.slice(0, 500).map(l => `<tr><td class="sub">${fmtDT(l.at)}</td><td>${esc(l.actorName)}</td><td><span class="chip ${l.actorRole === 'admin' ? 'brand' : l.actorRole === 'coordinator' ? 'muted' : l.actorRole === 'student' ? 'ok' : 'muted'}">${esc(l.actorRole)}</span></td><td>${esc(l.action)}</td><td class="sub">${l.programId ? esc(progName(l.programId)) : '—'}</td></tr>`).join('')}
    </tbody></table></div>`: emptyState('No activity yet', 'Actions across the system are recorded here and cannot be edited or deleted.', '', null)}</div></div>`;
    }

    /* ---------- notifications ---------- */
    function notify(role, opt) { const n = DB.read('notifs', []); n.unshift({ id: uid('nt'), at: nowISO(), role, programId: opt.programId || null, studentId: opt.studentId || null, title: opt.title || '', body: opt.body || '', readBy: [] }); if (n.length > 500) n.length = 500; DB.write('notifs', n); }
    function viewerId() { const stu = (typeof currentStudent === 'function') ? currentStudent() : null; if (stu) return 'stu:' + stu.id; const st = currentStaff(); return st ? 'staff:' + st.id : 'anon'; }
    function notifsForViewer() {
      const all = DB.read('notifs', []); const stu = (typeof currentStudent === 'function') ? currentStudent() : null; const st = currentStaff();
      return all.filter(n => {
        if (stu) { if (n.role !== 'student' && n.role !== 'all') return false; if (n.studentId && n.studentId !== stu.id) return false; if (n.programId && n.programId !== stu.programId) return false; return true; }
        if (st && st.role === 'super_admin') { return n.role === 'admin' || n.role === 'all' || n.role === 'coordinator'; }
        if (st) { if (n.role !== 'coordinator' && n.role !== 'all') return false; if (n.programId && !(st.programs || []).includes(n.programId)) return false; return true; }
        return false;
      });
    }
    function unreadCount() { const v = viewerId(); return notifsForViewer().filter(n => !n.readBy.includes(v)).length; }
    function notifBell() { const c = unreadCount(); return `<button class="iconbtn no-print" style="position:relative" title="Notifications" onclick="openNotifs()">🔔${c ? `<span class="bell-dot">${c > 9 ? '9+' : c}</span>` : ''}</button>`; }
    function openNotifs() {
      const list = notifsForViewer().slice(0, 60); const v = viewerId();
      modal(`<div class="mh"><div><h2>Notifications</h2></div><button class="x" data-x>×</button></div>
    <div class="mb">${list.length ? list.map(n => `<div class="card" style="margin-bottom:8px;${n.readBy.includes(v) ? '' : 'border-color:var(--brand)'}">
      <div style="display:flex;gap:8px;align-items:center"><b>${esc(n.title)}</b><span class="spacer"></span><span class="sub">${fmtDT(n.at)}</span></div>
      ${n.body ? `<div class="hint" style="margin-top:4px">${esc(n.body)}</div>` : ''}</div>`).join('') : '<p class="hint">No notifications.</p>'}</div>
    <div class="mf"><button class="btn ghost" data-x>Close</button>${list.length ? `<button class="btn primary" onclick="markNotifsRead()">Mark all read</button>` : ''}</div>`, { lg: true });
    }
    function markNotifsRead() {
      const v = viewerId(); const all = DB.read('notifs', []); const visible = new Set(notifsForViewer().map(n => n.id));
      all.forEach(n => { if (visible.has(n.id) && !n.readBy.includes(v)) n.readBy.push(v); }); DB.write('notifs', all); closeModal(); render();
    }

    /* ---------- custom symbol format per program ---------- */
    function formatSymbol(program, seq) {
      const fmt = (program && program.symbolFormat) || '{CODE}-{YYYY}-{####}'; const now = new Date();
      return fmt.replace(/\{CODE\}/g, (program && program.code) || 'STU').replace(/\{PROG\}/g, (program && program.name) || '').replace(/\{YYYY\}/g, now.getFullYear()).replace(/\{YY\}/g, String(now.getFullYear()).slice(-2))
        .replace(/\{#+\}/g, m => String(seq).padStart(m.length - 2, '0'));
    }

    /* ---------- exam categories (sidebar tab) ---------- */
    function viewExamTypes() {
      if (!(isSuper() || can('examtypes'))) return restricted();
      const types = DB.read('examtypes', []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));

      ${types.map(t => `<tr><td><b>${esc(t.name)}</b></td><td><span class="chip ${t.kind === 'test' ? 'muted' : 'brand'}">${t.kind === 'test' ? 'Test exam' : 'Term exam'}</span></td><td>${t.order || '—'}</td>
        <td><div class="rowacts"><button class="iconbtn" onclick="openExamTypeModal('${t.id}')">✎</button><button class="iconbtn" onclick="deleteExamType('${t.id}')">${I.trash}</button></div></td></tr>`).join('')}
    </tbody></table></div></div></div>`;
    }
    function openExamTypeModal(id) {
      const t = id ? DB.read('examtypes', []).find(x => x.id === id) : null;
      modal(`<div class="mh"><div><h2>${id ? 'Edit' : 'Add'} exam category</h2></div><button class="x" data-x>×</button></div>
    <div class="mb"><div class="field"><label>Name <span class="req">*</span></label><input class="input" id="etName" value="${esc(t ? t.name : '')}" placeholder="e.g. Mid Term"></div>
      <div class="grid" style="grid-template-columns:1fr 1fr"><div class="field"><label>Kind</label><select class="input" id="etKind"><option value="exam" ${t && t.kind === 'exam' ? 'selected' : ''}>Term exam</option><option value="test" ${t && t.kind === 'test' ? 'selected' : ''}>Test exam</option></select></div>
      <div class="field"><label>Order</label><input class="input" id="etOrder" type="number" value="${t ? t.order : DB.read('examtypes', []).length + 1}"></div></div></div>
    <div class="mf"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" onclick="saveExamType('${id || ''}')">Save</button></div>`);
    }
    function saveExamType(id) {
      const name = $('#etName').value.trim(); if (!name) { toast('Enter a name', 'bad'); return; }
      const types = DB.read('examtypes', []);
      if (types.some(t => t.name.toLowerCase() === name.toLowerCase() && t.id !== id)) { toast('That category already exists', 'bad'); return; }
      if (id) { const t = types.find(x => x.id === id); t.name = name; t.kind = $('#etKind').value; t.order = Number($('#etOrder').value) || 0; }
      else types.push({ id: uid('et'), name, kind: $('#etKind').value, order: Number($('#etOrder').value) || 0 });

      confirmDelete({ title: 'Delete category?', body: `<b>${esc(t.name)}</b> will be removed. Existing marks keep their label.`, confirmText: 'Delete', onYes: () => { DB.write('examtypes', DB.read('examtypes', []).filter(x => x.id !== id)); toast('Deleted', 'warn'); render(); } });
    }
    function examTypeNames() { return DB.read('examtypes', []).slice().sort((a, b) => (a.order || 0) - (b.order || 0)).map(t => t.name); }

    /* ---------- timetable grid (class schedule, table format) ---------- */
    function clsGrid(pid, sem) {
      const rows = acadList('cls', pid, sem);
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].filter(d => rows.some(r => r.day === d));
      const times = [...new Set(rows.map(r => r.time).filter(Boolean))].sort((a, b) => timeMins(a) - timeMins(b));
      if (!rows.length) return '';
      return `<div class="tablewrap"><table class="tbl grid-tt"><thead><tr><th>Day \\ Time</th>${times.map(t => `<th>${esc(t)}</th>`).join('')}</tr></thead><tbody>
    ${days.map(d => `<tr><th class="dcell">${d}</th>${times.map(t => { const c = rows.find(r => r.day === d && r.time === t); return `<td>${c ? `<b>${esc(c.course || '')}</b>${c.teacher ? `<div class="sub">${esc(c.teacher)}</div>` : ''}${c.room ? `<div class="sub">${esc(c.room)}</div>` : ''}` : '<span class="sub">—</span>'}</td>`; }).join('')}</tr>`).join('')}
  </tbody></table></div>`;
    }
    /* ---------- exam schedule shift-wise table ---------- */
    function examGrid(pid, sem) {
      const rows = acadList('exam', pid, sem); const shifts = cfg().examShifts || ['Morning', 'Day', 'Evening'];
      const dates = [...new Set(rows.map(r => r.date).filter(Boolean))].sort();
      if (!rows.length) return '';
      return `<div class="tablewrap"><table class="tbl"><thead><tr><th>Date</th>${shifts.map(s => `<th>${esc(s)}</th>`).join('')}</tr></thead><tbody>
    ${dates.map(d => `<tr><td><b>${esc(d)}</b></td>${shifts.map(s => { const e = rows.find(r => r.date === d && (r.shift || shifts[0]) === s); return `<td>${e ? `<b>${esc(e.course || '')}</b>${e.time ? `<div class="sub">${esc(e.time)}</div>` : ''}${e.room ? `<div class="sub">${esc(e.room)}</div>` : ''}` : '<span class="sub">—</span>'}</td>`; }).join('')}</tr>`).join('')}
  </tbody></table></div>`;
    }

    /* ---------- marks: low-mark alerts + per exam-type ---------- */
    function markAlert(m) { const pct = m.full ? Math.round(m.obtained / m.full * 100) : 0; return pct < (cfg().lowMarkPct || 40); }
    function afterMarkSaved(m, pid) {
      if (markAlert(m)) {
        const s = DB.read('students', []).find(x => x.id === m.studentId);
        notify('coordinator', { programId: pid, title: 'Low marks alert', body: `${s ? s.name : 'A student'} scored ${m.obtained}/${m.full} in ${m.course} (${m.exam}). Consider extra support / improved teaching methods.` });
      }
      if (m.studentId) { notify('student', { studentId: m.studentId, programId: pid, title: 'New marks published', body: `${m.course} — ${m.exam}: ${m.obtained}/${m.full}` }); }
    }

    /* ---------- student promotion / shifting ---------- */
    function openPromote() {
      if (!(isSuper() || can('promote'))) { toast('No access', 'bad'); return; } const progs = scopedPrograms(); if (!progs.length) { toast('No programs', 'warn'); return; }
      modal(`<div class="mh"><div><h2>Promote / shift students</h2><p>Advance a batch to the next semester</p></div><button class="x" data-x>×</button></div>
    <div class="mb">
      <div class="field"><label>Program</label><select class="input" id="prProg">${progs.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Current semester to promote</label><input class="input" id="prSem" type="number" min="1" value="1"></div>
      <p class="hint">All students in this program at the chosen semester move up by one. They then see the new semester’s schedule, courses and fees; the finished semester’s class schedule is no longer shown to them.</p>
    </div><div class="mf"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" onclick="doPromote()">Promote</button></div>`);
    }
    function doPromote() {
      if (!shiftGuard()) return; const pid = $('#prProg').value; const fromSem = Number($('#prSem').value) || 1; const p = progById(pid);
      const students = DB.read('students', []); let n = 0;
      students.forEach(s => { if (s.programId === pid && Number(s.semester) === fromSem) { s.semester = Math.min((p.semesters || 99), fromSem + 1); s.logs = s.logs || []; s.logs.push({ at: nowISO(), action: `Promoted to semester ${s.semester}` }); n++; } });
      DB.write('students', students);
      // apply next semester's fee structure
      students.filter(s => s.programId === pid && Number(s.semester) === fromSem + 1).forEach(s => {
        const fees = DB.read('acad', []).filter(x => x.type === 'fee' && x.programId === pid && Number(x.semester) === s.semester); const pays = DB.read('payments', []);
        fees.forEach(f => { if (!pays.some(pp => pp.studentId === s.id && pp.title === f.title && Number(pp.semester) === s.semester)) pays.push({ id: uid('pay'), studentId: s.id, programId: pid, semester: s.semester, title: f.title, amount: Number(f.amount) || 0, paid: false }); });
        DB.write('payments', pays);

    /* ---------- chronological time parsing for timetable columns ---------- */
    function timeMins(s) {
      s = String(s || ''); const m = s.match(/(\d{1,2})\s*:?\s*(\d{2})?\s*(am|pm)?/i); if (!m) return 1e9;
      let h = +m[1]; const mn = +(m[2] || 0); const ap = (m[3] || '').toLowerCase(); if (ap === 'pm' && h < 12) h += 12; if (ap === 'am' && h === 12) h = 0; return h * 60 + mn;
    }

    /* ---------- expanded reports / analysis ---------- */
    function viewReports() {
      if (!(isSuper() || can('reports'))) return restricted();
      const progs = scopedPrograms();
      return `<div class="panel"><div class="ph"><h2>Reports &amp; analysis</h2><div class="spacer"></div></div>
    <div class="pb"><p class="hint" style="margin-top:0">Pick an analysis, set the parameters, then preview and download as PDF or Excel. ${isSuper() ? '' : 'Limited to your assigned programs.'}</p>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
        <div class="field"><label>Report / analysis</label><select class="input" id="rpType">
          <optgroup label="Student records">
            <option value="students">Student list</option>
            <option value="fees">Fees / dues (per student)</option>
          </optgroup>
          <optgroup label="Marks">
            <option value="marks">Marks summary</option>

            <option value="toppers">Top performers (ranked)</option>

            <option value="feecollect">Fee collection summary</option>
          </optgroup></select></div>
        <div class="field"><label>Program</label><select class="input" id="rpProg"><option value="">All my programs</option>${progs.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
        <div class="field"><label>Semester</label><select class="input" id="rpSem"><option value="">All semesters</option>${Array.from({ length: 12 }, (_, i) => i + 1).map(n => `<option value="${n}">Sem ${n}</option>`).join('')}</select></div>
        <div class="field"><label>Exam type</label><select class="input" id="rpExam"><option value="">All exam types</option>${examTypeNames().map(n => `<option>${esc(n)}</option>`).join('')}</select></div>
        <div class="field"><label>Subject contains</label><input class="input" id="rpSubj" placeholder="(optional)"></div>
        <div class="field"><label>Pass mark %</label><input class="input" id="rpPct" type="number" value="${cfg().lowMarkPct || 40}"></div>
      </div>
      <div style="margin-top:12px"><button class="btn primary" onclick="buildReport()">Generate</button></div>
      <div id="reportOut" style="margin-top:18px"></div>
    </div></div>`;
    }
    function reportMarks(pid, sem, exam, subj) { const mine = myProgramIds(); return DB.read('marks', []).filter(m => (mine === null || mine.includes(m.programId)) && (!pid || m.programId === pid) && (!sem || Number(m.semester) === Number(sem)) && (!exam || m.exam === exam) && (!subj || String(m.course || '').toLowerCase().includes(subj))); }
    function reportStudents(pid, sem) { const mine = myProgramIds(); return DB.read('students', []).filter(s => (mine === null || mine.includes(s.programId)) && (!pid || s.programId === pid) && (!sem || Number(s.semester) === Number(sem))); }
    function buildReport() {
      const type = $('#rpType').value; const pid = $('#rpProg').value; const sem = $('#rpSem').value; const exam = $('#rpExam').value; const subj = ($('#rpSubj').value || '').toLowerCase(); const pct = Number($('#rpPct').value) || 40;
      const students = DB.read('students', []); const pctOf = m => m.full ? Math.round(m.obtained / m.full * 100) : 0;
      const avg = arr => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
      let title = '', head = [], body = [];
      if (type === 'weakness' || type === 'marks') {
        let marks = reportMarks(pid, sem, exam, subj); if (type === 'weakness') marks = marks.filter(m => m.full && (m.obtained / m.full * 100) < pct);
        title = type === 'weakness' ? ('Weakness report — below ' + pct + '%') : 'Marks summary'; head = ['Student', 'Symbol', 'Program', 'Sem', 'Subject', 'Exam', 'Obtained', 'Full', '%'];
        body = marks.map(m => { const s = students.find(x => x.id === m.studentId); return [s ? s.name : '—', s ? s.symbol : '', progName(m.programId), m.semester, m.course, m.exam, m.obtained, m.full, pctOf(m) + '%']; });
      }
      else if (type === 'toppers') {
        const marks = reportMarks(pid, sem, exam, subj); const by = {}; marks.forEach(m => { (by[m.studentId] = by[m.studentId] || []).push(m); });
        title = 'Top performers'; head = ['Rank', 'Student', 'Symbol', 'Program', 'Average %', 'Subjects'];
        const rows = Object.keys(by).map(sid => { const ms = by[sid]; const s = students.find(x => x.id === sid); return { name: s ? s.name : '—', sym: s ? s.symbol : '', prog: progName(ms[0].programId), avg: avg(ms.map(pctOf)), n: ms.length }; }).sort((a, b) => b.avg - a.avg);
        body = rows.map((r, i) => [i + 1, r.name, r.sym, r.prog, r.avg + '%', r.n]);
      }
      else if (type === 'performance') {
        const marks = reportMarks(pid, sem, exam, subj); const by = {}; marks.forEach(m => { (by[m.course + '@@' + m.programId] = by[m.course + '@@' + m.programId] || []).push(m); });
        title = 'Subject-wise performance'; head = ['Subject', 'Program', 'Records', 'Average %', 'Highest', 'Lowest', 'Pass rate'];
        body = Object.keys(by).map(k => { const ms = by[k]; const ps = ms.map(pctOf); return [ms[0].course, progName(ms[0].programId), ms.length, avg(ps) + '%', Math.max(...ps) + '%', Math.min(...ps) + '%', Math.round(ms.filter(m => !markAlert(m)).length / ms.length * 100) + '%']; });
      }
      else if (type === 'examcompare') {
        const marks = reportMarks(pid, sem, '', subj); const by = {}; marks.forEach(m => { (by[m.exam] = by[m.exam] || []).push(m); });
        title = 'Exam-type comparison'; head = ['Exam type', 'Records', 'Average %', 'Below ' + pct + '%'];
        body = examTypeNames().filter(t => by[t]).map(t => { const ms = by[t]; return [t, ms.length, avg(ms.map(pctOf)) + '%', ms.filter(markAlert).length]; });
      }
      else if (type === 'semperf') {
        const marks = reportMarks(pid, '', exam, subj); const by = {}; marks.forEach(m => { (by[m.semester] = by[m.semester] || []).push(m); });
        title = 'Semester-wise performance'; head = ['Semester', 'Records', 'Average %', 'Below ' + pct + '%'];
        body = Object.keys(by).sort((a, b) => a - b).map(s => { const ms = by[s]; return ['Sem ' + s, ms.length, avg(ms.map(pctOf)) + '%', ms.filter(markAlert).length]; });
      }
      else if (type === 'progperf') {
        const marks = reportMarks(pid, sem, exam, subj); const by = {}; marks.forEach(m => { (by[m.programId] = by[m.programId] || []).push(m); });
        title = 'Program-wise performance'; head = ['Program', 'Students', 'Mark records', 'Average %', 'Below ' + pct + '%'];
        body = Object.keys(by).map(pp => { const ms = by[pp]; const sc = reportStudents(pp, '').length; return [progName(pp), sc, ms.length, avg(ms.map(pctOf)) + '%', ms.filter(markAlert).length]; });
      }
      else if (type === 'feecollect') {
        const studs = reportStudents(pid, sem); const byP = {}; studs.forEach(s => { (byP[s.programId] = byP[s.programId] || []).push(s); });
        title = 'Fee collection summary'; head = ['Program', 'Students', 'Billed', 'Collected', 'Outstanding'];
        body = Object.keys(byP).map(pp => { const ids = byP[pp].map(s => s.id); const pays = DB.read('payments', []).filter(x => ids.includes(x.studentId)); const billed = pays.reduce((a, x) => a + (+x.amount || 0), 0); const coll = pays.filter(x => x.paid).reduce((a, x) => a + (+x.amount || 0), 0); return [progName(pp), byP[pp].length, billed, coll, billed - coll]; });
      }
      else if (type === 'fees') { title = 'Fees / dues summary'; head = ['Student', 'Symbol', 'Program', 'Sem', 'Due']; body = reportStudents(pid, sem).map(s => [s.name, s.symbol, progName(s.programId), s.semester, studentDue(s.id)]); }
      else { title = 'Student list'; head = ['Name', 'Symbol', 'Program', 'Sem', 'Email', 'Phone']; body = reportStudents(pid, sem).map(s => [s.name, s.symbol, progName(s.programId), s.semester, s.email || '', s.phone || '']); }
      const scope = [pid ? progName(pid) : 'All programs', sem ? ('Sem ' + sem) : 'All semesters', exam || '', subj ? ('subject~' + subj) : ''].filter(Boolean).join(' · ');
      window.__lastRep = { title, head, body };
      $('#reportOut').innerHTML = `<div class="print-target report-doc">
    <div class="rep-head"><div><h2 style="margin:0">${esc(title)}</h2><div class="sub">${esc(scope)}</div></div><div class="sub">Generated ${fmtDT(nowISO())}</div></div>
    ${body.length ? `<table class="tbl rep-tbl"><thead><tr>${head.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>
      ${body.map(r => `<tr>${r.map(c => `<td>${esc(String(c))}</td>`).join('')}</tr>`).join('')}</tbody></table>
      <div class="sub" style="margin-top:8px">${body.length} row(s)</div>` : '<p class="hint">No records match these parameters.</p>'}
  </div>
  <div class="no-print" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn primary" onclick="window.print()">🖨 Print / Save as PDF</button>
    <button class="btn ghost" onclick="downloadReportExcel()">⬇ Download Excel</button>
  </div>`;
      logEvent('Generated report: ' + title);
    }
    function downloadReportExcel() {
      const r = window.__lastRep; if (!r || !r.body.length) { toast('Generate a report with data first', 'warn'); return; }
      sheetDownload(r.body.map(row => { const o = {}; r.head.forEach((h, i) => o[h] = row[i]); return o; }), (r.title.replace(/[^\w]+/g, '-')) + '.xlsx', r.title.slice(0, 28) || 'Report');
      logEvent('Downloaded report (Excel): ' + r.title);
    }

    /* ============================================================================
       SIS PHASE 5 — custom brand (name/logo), month-view academic calendar with
       program/semester targeting + important highlight + bulk day editing,
       coordinator approval workflows (students & calendar), faculty table under
       schedules, marks import template.
       ============================================================================ */

    /* ---------- brand ---------- */
    function brandName() { return (cfg().appName || 'Campus Desk'); }
    function brandLogo() { const l = cfg().appLogo || ''; if (l) return esc(l); return esc(brandName().trim().slice(0, 2).toUpperCase() || 'C'); }
    function brandTag(ctx) { return cfg().appTagline || ctx || ''; }
    function brandMark(tag) { return `<div class="logo">${brandLogo()}</div><div><b>${esc(brandName())}</b><span>${esc(brandTag(tag))}</span></div>`; }

    /* ---------- approval helpers ---------- */
    function needsApproval() { return !isSuper(); }   // coordinators' additions await admin approval

    /* ---------- calendar: visibility + month grid ---------- */
    function calAll() { return DB.read('acad', []).filter(x => x.type === 'calendar'); }
    function calForProgram(pid) { return calAll().filter(x => !x.programId || x.programId === pid); }
    function calVisibleStudent(pid, cur) { return calForProgram(pid).filter(x => x.approved !== false && (!x.sem || Number(x.sem) === Number(cur))); }
    function ymFromQ() { const now = new Date(); let y = Number(qparam('cy')) || now.getFullYear(); let m = qparam('cm') !== '' ? Number(qparam('cm')) : now.getMonth(); if (isNaN(m)) m = now.getMonth(); return { y, m }; }
    function monthName(m) { return ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][m]; }
    function monthGrid(entries, y, m, fnName, extraArg) {
      extraArg = extraArg || '';
      const first = new Date(y, m, 1); const startDow = first.getDay(); const days = new Date(y, m + 1, 0).getDate(); const todayStr = new Date().toISOString().slice(0, 10);
      const cellsBefore = Array.from({ length: startDow }, () => '<div class="cal-cell empty"></div>');
      const cells = Array.from({ length: days }, (_, i) => {
        const d = i + 1; const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const ev = entries.filter(e => String(e.date) === ds); const imp = ev.some(e => e.important);
        return `<div class="cal-cell${ds === todayStr ? ' today' : ''}${ev.length ? ' has' : ''}${imp ? ' important' : ''}" onclick="${fnName}('${ds}'${extraArg})">
      <div class="cd">${d}</div>
      ${ev.slice(0, 3).map(e => `<div class="cev${e.important ? ' imp' : ''}${e.approved === false ? ' pend' : ''}" title="${esc(e.title)}">${esc(e.title)}</div>`).join('')}
      ${ev.length > 3 ? `<div class="cmore">+${ev.length - 3} more</div>` : ''}</div>`;
      });
      const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      return `<div class="cal-grid">${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}${cellsBefore.join('')}${cells.join('')}</div>`;
    }
    function calNavBar(y, m, baseHref) {
      const pm = m === 0 ? 11 : m - 1, py = m === 0 ? y - 1 : y; const nm = m === 11 ? 0 : m + 1, ny = m === 11 ? y + 1 : y;
      return `<div class="cal-nav"><button class="btn ghost sm" onclick="go('${baseHref}cy=${py}&cm=${pm}')">‹ Prev</button>
    <b style="min-width:160px;text-align:center">${monthName(m)} ${y}</b>
    <button class="btn ghost sm" onclick="go('${baseHref}cy=${ny}&cm=${nm}')">Next ›</button></div>`;
    }

    /* academics → Calendar tab (admin/coordinator) */
    function calendarTab(pid) {
      const { y, m } = ymFromQ(); const entries = calForProgram(pid); const su = isSuper(); const editable = can('calendar') || su;
      const base = `/academics?p=${pid}&t=calendar&`;
      const pending = entries.filter(e => e.approved === false);
      return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      ${editable ? `<button class="btn primary sm" onclick="calAdd('${pid}','')">+ Add entry</button>` : ''}
      <button class="btn ghost sm" onclick="acadExport('calendar','${pid}',1)">⬇ Excel</button>
      ${editable ? `<label class="btn ghost sm" style="margin:0">⬆ Import<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="acadImport('calendar','${pid}',1,this)"></label>` : ''}
      <span class="spacer"></span>${calNavBar(y, m, base)}</div>
    ${su && pending.length ? `<div class="card" style="background:var(--warn-bg,#fff7e6);border:1px solid #e7c66b;margin-bottom:10px"><b>${pending.length} calendar entr${pending.length === 1 ? 'y' : 'ies'} awaiting your approval</b>
      <div style="margin-top:6px;display:flex;flex-direction:column;gap:6px">${pending.map(e => `<div class="kv"><span><b>${esc(e.date)}</b> · ${esc(e.title)} <span class="sub">${e.programId ? esc(progName(e.programId)) : 'All'}${e.sem ? (' · Sem ' + e.sem) : ''}</span></span><span><button class="btn sm primary" onclick="approveCal('${e.id}')">Approve</button> <button class="btn sm ghost" onclick="acadDelete('${e.id}')">Reject</button></span></div>`).join('')}</div></div>` : ''}
    ${monthGrid(entries, y, m, 'openDayManage', `,'${pid}'`)}
    <p class="hint" style="margin-top:8px">Click any day to add, edit or remove entries (multiple per day, bulk delete supported). Important highlights are shown in colour.</p>`;
    }
    function calAdd(pid, id, presetDate) {
      const su = isSuper(); const rec = id ? calAll().find(x => x.id === id) : null; const progs = scopedPrograms();
      modal(`<div class="mh"><div><h2>${id ? 'Edit' : 'Add'} calendar entry</h2></div><button class="x" data-x>×</button></div>
    <div class="mb">
      <div class="field"><label>Title <span class="req">*</span></label><input class="input" id="caTitle" value="${esc(rec ? rec.title : '')}"></div>
      <div class="grid" style="grid-template-columns:1fr 1fr">

      ${rows.map(r => `<tr>${editable ? `<td><input type="checkbox" class="bulkck" data-id="${r.id}"></td>` : ''}${acfg.cols.map(c => `<td>${esc(r[c] || '—')}</td>`).join('')}${type === 'course' ? `<td>${r.syllabus ? `<button class="btn sm ghost" onclick="viewSyllabus('${r.id}')">View</button>` : '<span class="sub">—</span>'}</td>` : ''}
        ${editable ? `<td><div class="rowacts"><button class="iconbtn" onclick="acadModal('${type}','${pid}',${sem},'${r.id}')">✎</button><button class="iconbtn" onclick="acadDelete('${r.id}')">${I.trash}</button></div></td>` : ''}</tr>`).join('')}
    </tbody></table></div>`: emptyState('Nothing here yet', editable ? 'Add an item or import from Excel.' : 'No records.', editable ? `+ ${esc(acfg.sing)}` : '', editable ? `acadModal('${type}','${pid}',${sem})` : null)}`;

    /* import — class schedule REPLACES the existing schedule for that program+semester */
    function acadImport(type, pid, sem, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const acfg = ATYPES[type]; const r = new FileReader();
      r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          let acad = DB.read('acad', []); let replaced = 0;
          if (type === 'cls') {
            const old = acad.filter(x => x.type === 'cls' && x.programId === pid && Number(x.semester) === Number(sem));
            old.forEach(o => softTrash('acad', 'Class schedule (replaced) · ' + (o.day || '') + ' ' + (o.time || ''), o));
            replaced = old.length; acad = acad.filter(x => !(x.type === 'cls' && x.programId === pid && Number(x.semester) === Number(sem)));
          }
          let n = 0;
          rows.forEach(row => {
            const rec = { id: uid('ac'), type, programId: pid, semester: acfg.sem ? Number(sem) : null }; let any = false;
            acfg.fields.forEach((fl, i) => { let v = pick(row, [acfg.xl[i], fl.l, fl.k]); if (fl.type === 'number') v = v === '' || v == null ? '' : Number(v); rec[fl.k] = typeof v === 'string' ? v.trim() : v; if (rec[fl.k] !== '' && rec[fl.k] != null) any = true; });
            if (any) { acad.push(rec); n++; }
          });
          DB.write('acad', acad); histAdd(acfg.label + ' import', f.name, n + ' added' + (replaced ? ` · replaced ${replaced}` : ''), f); logEvent(`Imported ${n} ${acfg.label.toLowerCase()}` + (replaced ? ` (replaced ${replaced})` : ''), pid);
          toast(`Imported ${n} ${acfg.label.toLowerCase()}` + (replaced ? ` · replaced ${replaced} old` : ''), n ? 'ok' : 'warn'); render();
        } catch (err) { toast('Could not read file', 'bad'); }
      }; r.readAsBinaryString(f); inp.value = '';
    }

    /* ============================================================================
       SIS PHASE 7 — Accounting & Administrator roles, fees with fine/discount +
       bulk Excel upload + admin approval, attendance & alerts, passed-out students,
       semester up/down, sem-wise program totals, year-wise exam data.
       ============================================================================ */

    function seedSIS7() { if (!DB.read('attend', null)) DB.write('attend', []); const c = cfg(); if (c.attLimit == null) { c.attLimit = 4; DB.write('cfg', c); } }
    seedSIS7();

    /* roles & perms */
    ['attendance', 'papers', 'eattendance'].forEach(k => { if (!PERMS.includes(k)) PERMS.push(k); });
    Object.assign(PERM_LABELS, { attendance: 'Attendance & alerts', papers: 'Question papers', eattendance: 'Entrance attendance' });
    const ROLE_LABELS = { super_admin: 'Super admin', coordinator: 'Coordinator', accounting: 'Accountant', administrator: 'Administrator', support: 'Support Assistant' };
    function roleLabel(r) { return ROLE_LABELS[r] || r; }

    /* ---------- fees: fine / discount / approval ---------- */
    function payNet(p) { return Math.max(0, (Number(p.amount) || 0) + (Number(p.fine) || 0) - (Number(p.discount) || 0)); }
    function studentDue(sid) { return DB.read('payments', []).filter(p => p.studentId === sid && !p.paid && p.approved !== false).reduce((s, p) => s + payNet(p), 0); }
    function feeStudents(pid, sem) { let st = DB.read('students', []).filter(s => s.programId === pid && (s.status !== 'graduated')); if (sem) st = st.filter(s => Number(s.semester) === Number(sem)); return st; }
    function pendingFees() { const mine = myProgramIds(); return DB.read('payments', []).filter(p => p.approved === false && (mine === null || mine.includes(p.programId))); }

    function viewFees() {
      if (!(isSuper() || can('fees'))) return restricted();
      const progs = scopedPrograms(); if (!progs.length) return panelWrap('Fees', emptyState('No programs yet', 'Create a program first.', '', null));
      const pid = qparam('p') || progs[0].id; const sem = Number(qparam('s')) || 0; const p = progById(pid); if (!canProgram(pid)) return restricted();
      const studs = feeStudents(pid, sem); const su = isSuper();
      const semSel = `<select class="input sm" style="width:auto" onchange="go('/fees?p=${pid}&s='+this.value)"><option value="0" ${!sem ? 'selected' : ''}>All semesters</option>${Array.from({ length: (p && p.semesters) || 8 }, (_, i) => i + 1).map(n => `<option value="${n}" ${n === sem ? 'selected' : ''}>Sem ${n}</option>`).join('')}</select>`;
      const pend = pendingFees().filter(x => x.programId === pid);
      return `<div class="panel"><div class="ph"><div><div class="cat" style="color:var(--brand);font-size:11px;font-weight:700;text-transform:uppercase">Fees</div><h2 style="margin-top:4px">${esc(p.name)}</h2></div><div class="spacer"></div>
      ${progSelect(pid, `go('/fees?p='+this.value+'&s=${sem}')`)} ${semSel}
      <button class="btn ghost sm" onclick="feeExport('${pid}',${sem})">⬇ Excel</button>
      <button class="btn ghost sm" onclick="feeTemplate('${pid}',${sem})">📄 Template</button>
      <label class="btn primary sm" style="margin:0">⬆ Upload fees<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="feeImport('${pid}',${sem},this)"></label>
      <input class="input sm" style="width:150px" placeholder="Search…" oninput="filterRows(this,'#feeTbl')"></div>
    ${su && pend.length ? `<div class="pb" style="padding-bottom:0"><div class="card" style="background:#fff7e6;border:1px solid #e7c66b"><b>${pend.length} fee record(s) uploaded by accounting await your approval</b>
      <div style="margin-top:6px"><button class="btn primary sm" onclick="approveFeesAll('${pid}')">Approve all for this program</button></div></div></div>` : ''}
    <div class="pb flush">${studs.length ? `<div class="tablewrap"><table class="tbl dt" id="feeTbl"><thead><tr><th>Student</th><th>Sem</th><th>Billed</th><th>Fine</th><th>Discount</th><th>Paid</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>
      ${studs.map(s => {
        const ps = DB.read('payments', []).filter(x => x.studentId === s.id); const billed = ps.reduce((a, x) => a + (Number(x.amount) || 0), 0); const fine = ps.reduce((a, x) => a + (Number(x.fine) || 0), 0); const disc = ps.reduce((a, x) => a + (Number(x.discount) || 0), 0); const paid = ps.filter(x => x.paid).reduce((a, x) => a + payNet(x), 0); const due = studentDue(s.id); const pend = ps.some(x => x.approved === false);
        return `<tr><td>${esc(s.name)} <span class="sub">${esc(s.symbol || '')}</span></td><td>${s.semester}</td><td>${billed}</td><td>${fine || '—'}</td><td>${disc || '—'}</td><td>${paid}</td>
        <td>${due > 0 ? `<span class="chip bad">${due}</span>` : '<span class="chip ok">0</span>'}</td>
        <td>${pend ? '<span class="chip bad">Pending</span>' : (due > 0 ? '<span class="chip warn">Due</span>' : '<span class="chip ok">Clear</span>')}</td>
        <td><button class="btn sm subtle" onclick="openStudentDetail('${s.id}')">Manage</button></td></tr>`;
      }).join('')}
    </tbody></table></div>`: emptyState('No students', 'No students in this program/semester.', '', null)}</div></div>`;
    }
    function feeTemplate(pid, sem) {
      const studs = feeStudents(pid, sem); const rows = []; studs.forEach(s => rows.push({ Symbol: s.symbol, Student: s.name, Semester: s.semester, Title: 'Tuition', Amount: '', Fine: 0, Discount: 0, Paid: 'No' }));
      if (!rows.length) rows.push({ Symbol: '', Student: '', Semester: sem || 1, Title: 'Tuition', Amount: '', Fine: 0, Discount: 0, Paid: 'No' });
      sheetDownload(rows, `Fees-template-${(progName(pid) || '').replace(/\s+/g, '-')}.xlsx`, 'Fees'); toast('Template downloaded', 'ok');
    }
    function feeExport(pid, sem) {
      const studs = feeStudents(pid, sem); const ids = studs.map(s => s.id); const pays = DB.read('payments', []).filter(p => ids.includes(p.studentId)); const sm = Object.fromEntries(studs.map(s => [s.id, s]));
      if (!pays.length) { toast('No fee records to export', 'warn'); return; }
      sheetDownload(pays.map(p => { const s = sm[p.studentId]; return { Symbol: s ? s.symbol : '', Student: s ? s.name : '', Semester: p.semester, Title: p.title, Amount: p.amount, Fine: p.fine || 0, Discount: p.discount || 0, Paid: p.paid ? 'Yes' : 'No', Status: p.approved === false ? 'Pending' : 'Approved' }; }), `Fees-${(progName(pid) || '').replace(/\s+/g, '-')}.xlsx`, 'Fees');
      logEvent('Exported fees Excel', pid);
    }
    function feeImport(pid, sem, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const r = new FileReader(); r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          const students = DB.read('students', []); const pays = DB.read('payments', []); let n = 0, miss = 0; const appr = isSuper();
          rows.forEach(row => {
            const sym = String(pick(row, ['Symbol', 'symbol']) || '').trim(); const title = String(pick(row, ['Title', 'Fee']) || 'Tuition').trim(); if (!sym) return;
            const s = students.find(x => (x.symbol || '').toLowerCase() === sym.toLowerCase() && x.programId === pid); if (!s) { miss++; return; }
            const amount = Number(pick(row, ['Amount'])) || 0; const fine = Number(pick(row, ['Fine'])) || 0; const discount = Number(pick(row, ['Discount'])) || 0;
            const paidRaw = String(pick(row, ['Paid', 'Status']) || '').toLowerCase(); const paid = /^(y|yes|paid|true|1)/.test(paidRaw);
            let ex = pays.find(p => p.studentId === s.id && p.title === title && Number(p.semester) === Number(s.semester));
            if (ex) { ex.amount = amount; ex.fine = fine; ex.discount = discount; ex.paid = paid; ex.paidAt = paid ? nowISO() : null; ex.approved = appr; }
            else { pays.push({ id: uid('pay'), studentId: s.id, programId: pid, semester: s.semester, title, amount, fine, discount, paid, paidAt: paid ? nowISO() : null, approved: appr }); }
            n++;
          });
          DB.write('payments', pays); histAdd('Fees import', f.name, n + ' rows' + (miss ? ` · ${miss} unmatched` : ''), f); logEvent(`Uploaded fees (${n} rows)` + (appr ? '' : ' — pending approval'), pid);

    /* ---------- attendance & alerts (administrator) ---------- */
    function monthKey(d) { d = d || new Date().toISOString().slice(0, 10); return String(d).slice(0, 7); }
    function absencesThisMonth(sid) { const mk = monthKey(); return DB.read('attend', []).filter(a => a.studentId === sid && a.absent && monthKey(a.date) === mk).length; }

      const studs = DB.read('students', []).filter(s => s.programId === pid && Number(s.semester) === sem && s.status !== 'graduated');
      const todays = DB.read('attend', []).filter(a => a.programId === pid && String(a.date) === String(date));

      return `<div class="panel"><div class="ph"><div><div class="cat" style="color:var(--brand);font-size:11px;font-weight:700;text-transform:uppercase">Attendance</div><h2 style="margin-top:4px">${esc(p.name)}</h2></div><div class="spacer"></div>
      ${progSelect(pid, `go('/attend?p='+this.value+'&s=${sem}&d=${date}')`)} ${semSel}

        ${studs.map(s => {

          <td>${esc(s.name)} <span class="sub">${esc(s.symbol || '')}</span></td>
          <td>${am >= limit ? `<span class="chip bad">${am} ⚠</span>` : `<span class="chip muted">${am}</span>`}</td>

      }).join('')}
      </tbody></table></div>
      <button class="btn primary sm" style="margin-top:10px" onclick="saveAbsences('${pid}',${sem},'${date}')">Save attendance</button>` : emptyState('No students', 'No students in this program/semester.', '', null)}
    </div></div>
    <div class="panel" style="margin-top:16px"><div class="ph"><h2>Most absent (this month)</h2></div><div class="pb flush">
      ${(() => { const rows = studs.map(s => ({ s, n: absencesThisMonth(s.id) })).filter(x => x.n > 0).sort((a, b) => b.n - a.n); return rows.length ? `<div class="tablewrap"><table class="tbl"><thead><tr><th>Student</th><th>Absences</th><th></th></tr></thead><tbody>${rows.map(x => `<tr><td>${esc(x.s.name)} <span class="sub">${esc(x.s.symbol || '')}</span></td><td><b>${x.n}</b></td><td>${x.n >= limit ? '<span class="chip bad">Over limit</span>' : ''}</td></tr>`).join('')}</tbody></table></div>` : '<p class="hint" style="padding:0 18px">No absences recorded this month.</p>'; })()}
    </div></div>`;
    }
    function saveAbsences(pid, sem, date) {
      const checked = new Set([...document.querySelectorAll('#attTbl .absck:checked')].map(c => c.getAttribute('data-id')));
      let att = DB.read('attend', []).filter(a => !(a.programId === pid && String(a.date) === String(date)));   // replace that day
      const limit = cfg().attLimit || 4;
      DB.read('students', []).filter(s => s.programId === pid && Number(s.semester) === sem).forEach(s => { if (checked.has(s.id)) att.push({ id: uid('at'), studentId: s.id, programId: pid, date, absent: true }); });
      DB.write('attend', att);
      // auto-alert over-limit

      confirmDelete({ title: `Pass out ${ids.length} student(s)?`, body: 'They move to passed-out / alumni and can be reinstated.', confirmText: 'Pass out', danger: false, onYes: () => { const students = DB.read('students', []); ids.forEach(id => { const t = students.find(x => x.id === id); if (t) { t.status = 'graduated'; t.gradAt = nowISO(); } }); DB.write('students', students); logEvent(`Passed out ${ids.length} student(s)`); toast(`${ids.length} marked passed out`, 'ok'); render(); } });

    /* ---------- semester up / down ---------- */
    function changeStudentSem(id, delta) {
      if (!shiftGuard()) return; const students = DB.read('students', []); const s = students.find(x => x.id === id); if (!s) return; const p = progById(s.programId); const max = (p && p.semesters) || 99;
      const ns = Math.min(max, Math.max(1, (Number(s.semester) || 1) + delta)); if (ns === s.semester) { toast(delta > 0 ? 'Already at final semester' : 'Already at first semester', 'warn'); return; }
      s.semester = ns; (s.logs = s.logs || []).push({ at: nowISO(), action: 'Semester changed to ' + ns }); DB.write('students', students);
      if (delta > 0) { const fees = DB.read('acad', []).filter(x => x.type === 'fee' && x.programId === s.programId && Number(x.semester) === ns); const pays = DB.read('payments', []); fees.forEach(f => { if (!pays.some(pp => pp.studentId === s.id && pp.title === f.title && Number(pp.semester) === ns)) pays.push({ id: uid('pay'), studentId: s.id, programId: s.programId, semester: ns, title: f.title, amount: Number(f.amount) || 0, paid: false, approved: true }); }); DB.write('payments', pays); }

      const students = DB.read('students', []); let n = 0; ids.forEach(id => { const s = students.find(x => x.id === id); if (s && s.semester > 1) { s.semester--; (s.logs = s.logs || []).push({ at: nowISO(), action: 'Shifted down to semester ' + s.semester }); n++; } }); DB.write('students', students); logEvent(`Shifted ${n} student(s) down a semester`); toast(`Shifted ${n} down`, 'ok'); render();

    /* ============================================================================

    /* entrance suite permissions are now grantable like any other feature — admin decides who gets access */

    /* ---------- multiple question papers ---------- */
    function examOf(e) {
      if (!e.papers || !e.papers.length) {
        const seed = (e.exam && ((e.exam.questions && e.exam.questions.length) || e.exam.passMarks)) ?
          { id: uid('pp'), title: 'Paper 1', questions: e.exam.questions || [], passMarks: e.exam.passMarks || 0 } :
          { id: uid('pp'), title: 'Paper 1', questions: [], passMarks: 0 };
        e.papers = [seed]; e.activePaper = seed.id;
      }
      if (!e.activePaper || !e.papers.some(p => p.id === e.activePaper)) e.activePaper = e.papers[0].id;
      const ap = e.papers.find(p => p.id === e.activePaper);
      if (!ap.questions) ap.questions = []; if (ap.passMarks == null) ap.passMarks = 0;
      e.exam = ap;   // the chosen paper drives all answer-sheet / OMR / grading logic
      return ap;
    }
    function paperBar(e) {
      const aid = e.activePaper;
      return `<div class="pb" style="padding-bottom:0"><div class="paperbar">
    ${(e.papers || []).map(p => `<span class="paperchip ${p.id === aid ? 'active' : ''}">
      <button class="pn" onclick="choosePaper('${e.id}','${p.id}')" title="${p.id === aid ? 'Chosen paper' : 'Choose this paper'}">${p.id === aid ? '● ' : '○ '}${esc(p.title)} <span class="sub">${(p.questions || []).length}q</span></button>
      <button class="iconbtn" title="Rename" onclick="renamePaper('${e.id}','${p.id}')">✎</button>
      <button class="iconbtn" title="Duplicate" onclick="duplicatePaper('${e.id}','${p.id}')">⧉</button>
      ${(e.papers || []).length > 1 ? `<button class="iconbtn" title="Delete paper" onclick="deletePaper('${e.id}','${p.id}')">${I.trash}</button>` : ''}
    </span>`).join('')}
    <button class="btn ghost sm" onclick="addPaper('${e.id}')">+ New paper</button>
  </div><div class="hint" style="margin-top:6px">Build as many papers as you like; the <b>chosen</b> paper (●) is the one used for this entrance — its questions drive the answer sheet, OMR and grading.</div></div>`;
    }
    function addPaper(eid) { const e = DB.read('events', []).find(x => x.id === eid); examOf(e); const p = { id: uid('pp'), title: 'Paper ' + ((e.papers || []).length + 1), questions: [], passMarks: 0 }; e.papers.push(p); e.activePaper = p.id; examOf(e); writeEvent(e); logEvent('Added question paper to ' + e.title); toast('New paper added & chosen', 'ok'); render(); }
    function choosePaper(eid, pid) { const e = DB.read('events', []).find(x => x.id === eid); if (!(e.papers || []).some(p => p.id === pid)) return; e.activePaper = pid; examOf(e); writeEvent(e); logEvent('Chose paper "' + (e.papers.find(p => p.id === pid).title) + '" for ' + e.title); toast('Paper chosen for this entrance', 'ok'); render(); }
    function renamePaper(eid, pid) {

    <div class="mb"><div class="field"><label>Paper name</label><input class="input" id="ppName" value="${esc(p.title)}"></div></div>
    <div class="mf"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" onclick="savePaperName('${eid}','${pid}')">Save</button></div>`);
    }
    function savePaperName(eid, pid) { const e = DB.read('events', []).find(x => x.id === eid); const p = e.papers.find(x => x.id === pid); p.title = $('#ppName').value.trim() || p.title; examOf(e); writeEvent(e); closeModal(); toast('Renamed', 'ok'); render(); }
    function duplicatePaper(eid, pid) {
      const e = DB.read('events', []).find(x => x.id === eid); const src = e.papers.find(x => x.id === pid);
      const copy = { id: uid('pp'), title: src.title + ' (copy)', passMarks: src.passMarks, questions: (src.questions || []).map(q => Object.assign({}, q, { id: uid('q') })) };
      e.papers.push(copy); e.activePaper = copy.id; examOf(e); writeEvent(e); logEvent('Duplicated a paper in ' + e.title); toast('Paper duplicated & chosen', 'ok'); render();
    }

      const e = DB.read('events', []).find(x => x.id === eid); if ((e.papers || []).length <= 1) { toast('Keep at least one paper', 'warn'); return; } const p = e.papers.find(x => x.id === pid);

    /* ---------- Urgent panel (top bar) ---------- */
    function urgentItems() {
      const items = []; const stu = (typeof currentStudent === 'function') ? currentStudent() : null;
      if (stu) {
        const due = studentDue(stu.id); if (due > 0) items.push({ t: 'Fees due', b: 'You owe ' + due + '. Please clear your dues.', go: "go('/me/fees')" });
        const am = absencesThisMonth(stu.id); const lim = cfg().attLimit || 4; if (am >= lim) items.push({ t: 'Attendance alert', b: am + ' absences this month.', go: "go('/me/attend')" });
        const low = DB.read('marks', []).filter(m => m.studentId === stu.id && markAlert(m)).length; if (low) items.push({ t: 'Low marks', b: low + ' subject(s) below the pass threshold.', go: "go('/me/marks')" });
        const imp = DB.read('acad', []).filter(x => x.type === 'calendar' && x.important && x.approved !== false && String(x.date) >= new Date().toISOString().slice(0, 10)).slice(0, 3); imp.forEach(e => items.push({ t: '⭐ ' + e.title, b: e.date, go: "go('/me/calendar')" }));
        return items;
      }
      if (isSuper()) {
        const ps = pendingStudents().length; if (ps) items.push({ t: ps + ' student approval(s)', b: 'Coordinator-added students awaiting approval.', go: "go('/students')" });
        const pc = DB.read('acad', []).filter(x => x.type === 'calendar' && x.approved === false).length; if (pc) items.push({ t: pc + ' calendar approval(s)', b: 'Entries awaiting approval.', go: "go('/academics')" });
        const pf = pendingFees().length; if (pf) items.push({ t: pf + ' fee approval(s)', b: 'Accounting uploads awaiting approval.', go: "go('/fees')" });
        const adm = DB.read('apps', []).filter(a => a.status === 'result' && a.result && a.result.outcome === 'Pass').length; if (adm) items.push({ t: adm + ' ready to admit', b: 'Passed applicants ready for admission.', go: "go('/admission')" });
        const c = cfg(); const last = c.backupLastAt ? new Date(c.backupLastAt).getTime() : 0; if (Date.now() - last > (c.backupEveryH || 24) * 3600000) items.push({ t: 'Backup due', b: 'Export your data from Settings.', go: "go('/settings')" });
      } else {
        const low = DB.read('marks', []).filter(m => markAlert(m) && (myProgramIds() === null || myProgramIds().includes(m.programId))).length; if (low && can('marks')) items.push({ t: low + ' low-mark alert(s)', b: 'Students scoring below the threshold.', go: "go('/exams')" });

    /* ============================================================================
       SIS PHASE 9 — automatic local backups (stored in this browser), 30-day
       retention with auto-pruning, restore / download from Settings.
       ============================================================================ */

    if (typeof BACKUP_KEYS !== 'undefined' && !BACKUP_KEYS.includes('attend')) BACKUP_KEYS.push('attend');

    const BACKUP_RETAIN_DAYS = 30;
    function snapshotData() { const data = {}; BACKUP_KEYS.forEach(k => { data[k] = DB.read(k, null); }); return data; }
    function pruneBackups(list) {
      const cutoff = Date.now() - BACKUP_RETAIN_DAYS * 86400000;
      let out = list.filter(b => new Date(b.at).getTime() >= cutoff);   // auto-delete snapshots older than 30 days
      if (out.length > 60) out = out.slice(0, 60);
      return out;
    }
    function autoBackup(force) {
      try {
        const c = cfg(); const every = (c.backupEveryH || 24) * 3600000; const last = c.autoBackupAt ? new Date(c.autoBackupAt).getTime() : 0;
        if (!force && Date.now() - last < every) return;            // not due yet
        let list = DB.read('backups', []);
        list.unshift({ id: uid('bk'), at: nowISO(), by: (currentStaff() || {}).name || 'system', data: snapshotData() });
        list = pruneBackups(list);
        try { DB.write('backups', list); }
        catch (e) { while (list.length > 3) { list.pop(); try { DB.write('backups', list); break; } catch (_) { } } }   // quota → keep fewer
        setCfg({ autoBackupAt: nowISO(), backupLastAt: nowISO() });
        if (!force) toast('Auto-backup saved locally', 'ok');
        notify('admin', { title: 'Auto-backup saved', body: 'A local backup was saved. Older than ' + BACKUP_RETAIN_DAYS + ' days are removed automatically.' });
        logEvent('Auto-backup saved (' + list.length + ' kept)');
      } catch (_) { }
    }
    function backupNow() { autoBackup(true); toast('Backup saved locally', 'ok'); render(); }
    function localBackupsPanel() {
      let list = DB.read('backups', []); list = pruneBackups(list); DB.write('backups', list);
      return `<div class="panel" style="margin-top:16px"><div class="ph"><h2>Local auto-backups</h2><span class="chip muted">${list.length}</span><div class="spacer"></div>
      <button class="btn primary sm" onclick="backupNow()">Back up now</button></div>
    <div class="pb"><p class="hint" style="margin-top:0">The system automatically saves a full snapshot of all data to this browser on a schedule (every ${cfg().backupEveryH || 24}h) and keeps the last <b>${BACKUP_RETAIN_DAYS} days</b>, deleting older snapshots automatically. Restore any point, or download it as a file for off-device safety.</p>
      ${list.length ? `<div class="tablewrap"><table class="tbl"><thead><tr><th>Saved</th><th>By</th><th>Size</th><th></th></tr></thead><tbody>
        ${list.map(b => {
        const sz = Math.round(JSON.stringify(b.data).length / 1024); return `<tr><td>${fmtDT(b.at)}</td><td class="sub">${esc(b.by || 'system')}</td><td class="sub">${sz} KB</td>
          <td><div class="rowacts"><button class="btn sm subtle" onclick="restoreLocalBackup('${b.id}')">Restore</button><button class="btn sm ghost" onclick="downloadLocalBackup('${b.id}')">Download</button><button class="iconbtn" onclick="deleteLocalBackup('${b.id}')">${I.trash}</button></div></td></tr>`;
      }).join('')}
      </tbody></table></div>`: '<p class="hint">No local backups yet — the first one is saved automatically, or click “Back up now”.</p>'}
    </div></div>`;
    }
    function restoreLocalBackup(id) {
      const b = DB.read('backups', []).find(x => x.id === id); if (!b) return;
      confirmDelete({
        title: 'Restore this backup?', body: `Restoring the snapshot from <b>${fmtDT(b.at)}</b> replaces all current data with that point. (Your current state is itself backed up first.)`, confirmText: 'Restore', danger: false, onYes: () => {
          autoBackup(true);   // snapshot current state before overwriting
          BACKUP_KEYS.forEach(k => { if (b.data[k] != null) DB.write(k, b.data[k]); });
          logEvent('Restored local backup from ' + fmtDT(b.at)); toast('Backup restored', 'ok'); go('/'); render();
        }
      });
    }
    function downloadLocalBackup(id) {
      const b = DB.read('backups', []).find(x => x.id === id); if (!b) return;
      dl('campus-desk-backup-' + String(b.at).slice(0, 10) + '.json', new Blob([JSON.stringify(b.data, null, 2)], { type: 'application/json' })); logEvent('Downloaded a local backup');
    }
    function deleteLocalBackup(id) { DB.write('backups', DB.read('backups', []).filter(x => x.id !== id)); toast('Backup removed', 'warn'); render(); }

    /* ============================================================================
       SIS PHASE 10 — datatable (pagination + page size), change symbol,

    /* ---------- DATATABLE: pagination + page size ---------- */
    const DT_SIZES = [15, 20, 50, 100, 200];
    function enhanceTables() {
      document.querySelectorAll('table.dt').forEach(tbl => {
        if (tbl.dataset.dtMounted || !tbl.tBodies[0]) return; tbl.dataset.dtMounted = '1';
        const wrap = tbl.closest('.tablewrap') || tbl;
        const bar = document.createElement('div'); bar.className = 'dtbar';
        bar.innerHTML = `<label class="dtsz">Show <select class="input sm">${DT_SIZES.map(n => `<option value="${n}">${n}</option>`).join('')}</select> entries</label>`;
        wrap.parentNode.insertBefore(bar, wrap);
        const foot = document.createElement('div'); foot.className = 'dtfoot'; wrap.parentNode.insertBefore(foot, wrap.nextSibling);
        const sel = bar.querySelector('select'); sel.value = '15';
        tbl._dt = { page: 1, size: 15, foot };
        sel.addEventListener('change', () => { tbl._dt.size = Number(sel.value); tbl._dt.page = 1; paintDT(tbl); });
        paintDT(tbl);
      });
    }
    function paintDT(tbl) {
      const st = tbl._dt; if (!st || !tbl.tBodies[0]) return;
      const rows = [...tbl.tBodies[0].rows];
      const vis = rows.filter(r => !r.classList.contains('dt-hide'));
      const pages = Math.max(1, Math.ceil(vis.length / st.size)); if (st.page > pages) st.page = pages; if (st.page < 1) st.page = 1;
      const start = (st.page - 1) * st.size, end = start + st.size;
      vis.forEach((r, i) => r.classList.toggle('dt-page-hide', i < start || i >= end));
      st.foot.innerHTML = vis.length
        ? `<span class="sub">${start + 1}–${Math.min(end, vis.length)} of ${vis.length}</span><span class="spacer"></span>
       <button class="btn sm ghost dtp" data-d="-1" ${st.page <= 1 ? 'disabled' : ''}>‹ Prev</button>
       <span class="dtpg">Page ${st.page} / ${pages}</span>
       <button class="btn sm ghost dtp" data-d="1" ${st.page >= pages ? 'disabled' : ''}>Next ›</button>`
        : '<span class="sub">No matching rows</span>';
      st.foot.querySelectorAll('.dtp').forEach(b => b.onclick = () => { st.page += Number(b.dataset.d); paintDT(tbl); });
    }
    function filterRows(input, sel) {
      const q = String(input.value || '').toLowerCase().trim(); const tbl = document.querySelector(sel); if (!tbl) return;
      tbl.querySelectorAll('tbody tr').forEach(tr => tr.classList.toggle('dt-hide', q && !tr.textContent.toLowerCase().includes(q)));
      if (tbl._dt) { tbl._dt.page = 1; paintDT(tbl); }
    }

    /* ---------- change student symbol (also for shifted students) ---------- */

    /* ---------- robust result import (fixes "No matching rows found") ---------- */
    function normSym(x) { return String(x || '').toLowerCase().replace(/\s+/g, '').trim(); }
    function importResults(eventId, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const r = new FileReader();
      r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); let updated = 0, missing = 0, rowsRead = 0;
          const apps = DB.read('apps', []); const mine = apps.filter(a => a.eventId === eventId);
          const bySym = {}, byND = {}; mine.forEach(a => { if (a.symbol) bySym[normSym(a.symbol)] = a; byND[normSym(a.data.f_name) + '|' + normSym(a.dob || a.data.f_dob)] = a; });
          wb.SheetNames.forEach(sn => {
            XLSX.utils.sheet_to_json(wb.Sheets[sn]).forEach(row => {
              const sym = String(pick(row, ['Symbol No', 'Symbol', 'SymbolNo', 'symbol', 'Roll', 'Roll No']) || '').trim();
              const outcome = String(pick(row, ['Outcome (Pass/Fail/Waitlist)', 'Outcome', 'Result', 'outcome', 'Status']) || '').trim();
              const nm = String(pick(row, ['Name', 'name', 'Full Name']) || '').trim(); const dob = String(pick(row, ['DOB', 'Dob', 'Date of Birth']) || '').trim();
              if (!outcome && !sym && !nm) return; rowsRead++;
              if (!outcome) return;
              let a = sym ? bySym[normSym(sym)] : null; if (!a && nm) a = byND[normSym(nm) + '|' + normSym(dob)];
              if (!a) { missing++; return; }
              const marksRaw = pick(row, ['Marks', 'Score', 'marks']); const rankRaw = pick(row, ['Rank', 'rank']);
              const msg = String(pick(row, ['Message to student', 'Message', 'Remarks', 'message']) || '').trim();
              const offerRaw = String(pick(row, ['Offer admission (yes/no)', 'Offer admission', 'Admission', 'admission']) || '').trim().toLowerCase();
              const admMsg = String(pick(row, ['Admission message', 'admission message', 'Admission Message']) || '').trim();
              const offered = ['yes', 'y', '1', 'true', 'offer', 'offered', 'admit', 'admitted', 'selected'].includes(offerRaw);
              a.result = {
                outcome: normOutcome(outcome),
                marks: marksRaw !== '' && marksRaw != null && !isNaN(Number(marksRaw)) ? Number(marksRaw) : null,
                rank: rankRaw !== '' && rankRaw != null && !isNaN(Number(rankRaw)) ? Number(rankRaw) : null,
                remarks: msg, message: msg, published: true,
                admission: { offered, message: admMsg || (offered ? ('Congratulations! You are offered admission' + (a.program ? (' to ' + a.program) : '') + '. Show the admission QR below at the admissions office to begin enrolment.') : '') }
              };
              a.status = 'result'; a.updatedAt = nowISO(); a.logs.push({ at: nowISO(), action: 'Result published via Excel: ' + a.result.outcome }); updated++;
            });
          });
          DB.write('apps', apps);
          if (updated) { logEvent(`Published ${updated} result(s) via Excel`); let m = `Published results for ${updated} applicant(s)` + (missing ? ` · ${missing} row(s) didn’t match a symbol/name` : ''); toast(m, 'ok'); }
          else {
            const approved = mine.filter(a => a.symbol).length;
            toast(approved ? 'No rows matched. Check the Symbol No column matches exactly — download the template, fill the Outcome column, and re-upload.' : 'No symbols to match yet — approve applicants first (this assigns their Symbol No), then upload results.', 'warn');
          }
          render();
        } catch (err) { toast('Could not read results file', 'bad'); }
      };
      r.readAsBinaryString(f); inp.value = '';
    }

    /* ---------- individual result via Excel answer file ---------- */
    function importAnswerOne(appId, inp) {
      const f = inp.files[0]; if (!f) return; if (!window.XLSX) { toast('Excel library not loaded', 'bad'); inp.value = ''; return; }
      const apps = DB.read('apps', []); const a = apps.find(x => x.id === appId); const e = DB.read('events', []).find(x => x.id === a.eventId); const ex = examOf(e);
      const r = new FileReader(); r.onload = ev => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          // expect columns: Q (number) and Answer (option index 1-based or letter A/B/.. or option text)
          const ans = {}; rows.forEach(row => {
            const q = Number(pick(row, ['Q', 'Question', 'No', 'QNo'])); let v = pick(row, ['Answer', 'Ans', 'Chosen', 'Option']); if (!q) return;
            let idx = null; const sv = String(v || '').trim();
            if (/^\d+$/.test(sv)) idx = Number(sv) - 1; else if (/^[A-Za-z]$/.test(sv)) idx = sv.toUpperCase().charCodeAt(0) - 65;
            else { const qq = ex.questions[q - 1]; if (qq) { const oi = (qq.options || []).findIndex(o => String(o).trim().toLowerCase() === sv.toLowerCase()); if (oi >= 0) idx = oi; } }
            if (idx != null) ans[q - 1] = idx;
          });
          a.exam = { questions: ex.questions.map((q, i) => ({ ...q, chosen: ans[i] != null ? ans[i] : null })), passMarks: ex.passMarks, approved: false };
          a.responses = ans; a.updatedAt = nowISO(); a.logs.push({ at: nowISO(), action: 'Individual answer sheet uploaded (Excel)' });
          DB.write('apps', apps); logEvent('Uploaded individual answer sheet for ' + (a.data.f_name || '')); toast('Answers loaded — review & approve to publish', 'ok'); render();
        } catch (err) { toast('Could not read answer file', 'bad'); }
      }; r.readAsBinaryString(f); inp.value = '';
    }

    /* ---------- applicant photo (compress to keep storage small) ---------- */
    let __applicantPhoto = '';
    function readPhoto(input, prevId) {
      const f = input.files[0]; if (!f) { __applicantPhoto = ''; return; } const img = new Image(); const rd = new FileReader();
      rd.onload = () => {
        img.onload = () => {
          const max = 360; let w = img.width, h = img.height; if (w > h && w > max) { h = h * max / w; w = max; } else if (h > max) { w = w * max / h; h = max; }
          const c = document.createElement('canvas'); c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
          try { __applicantPhoto = c.toDataURL('image/jpeg', 0.82); } catch (_) { __applicantPhoto = ''; }
          const pv = prevId && document.getElementById(prevId); if (pv) pv.innerHTML = __applicantPhoto ? `<img src="${__applicantPhoto}" style="width:84px;height:84px;object-fit:cover;border-radius:10px;border:1px solid var(--line)">` : '';
        };
        img.src = rd.result;
      };
      rd.readAsDataURL(f);
    }

    /* ---------- optional cloud sync (cross-device) — off by default ---------- */
    function syncCfg() { return DB.read('syncCfg', { url: '', room: '', auto: false }) || { url: '', room: '', auto: false }; }
    function saveSyncCfg() { const c = { url: $('#syUrl').value.trim(), room: $('#syRoom').value.trim(), auto: $('#syAuto').checked }; DB.write('syncCfg', c); toast('Sync settings saved', 'ok'); render(); }
    function syncEndpoint() { const c = syncCfg(); if (!c.url || !c.room) return null; return c.url.replace(/\/+$/, '') + '/' + encodeURIComponent(c.room); }
    async function syncPush() {
      const url = syncEndpoint(); if (!url) { toast('Configure a sync URL & room first', 'warn'); return; } try {
        const data = snapshotData(); const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ at: nowISO(), data }) });
        if (!res.ok) throw 0; setCfg({ syncPushedAt: nowISO() }); logEvent('Pushed data to cloud sync'); toast('Data pushed to cloud', 'ok'); render();
      } catch (_) { toast('Push failed — check the URL/room and that your endpoint accepts POST JSON', 'bad'); }
    }
    async function syncPushSilent() {
      try {
        const c = syncCfg(); if (!c.url || !c.room) return false; const url = syncEndpoint();
        const data = snapshotData(); const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ at: nowISO(), data }) });
        if (res.ok) { setCfg({ syncPushedAt: nowISO() }); return true; } return false;
      } catch (_) { return false; }
    }
    async function syncPullSilent() {
      try {
        const c = syncCfg(); if (!c.url || !c.room) return false; const url = syncEndpoint();
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } }); if (!res.ok) return false; const j = await res.json(); const data = (j && j.data) ? j.data : j; if (!data) return false;
        const changed = JSON.stringify(data) !== window.__lastPulledSnap; window.__lastPulledSnap = JSON.stringify(data);
        BACKUP_KEYS.forEach(k => { if (data[k] != null) DB.write(k, data[k]); }); setCfg({ syncPulledAt: nowISO() });
        if (changed) { render(); }
        return true;
      } catch (_) { return false; }
    }
    function startAutoSyncLoop() {
      if (window.__autoSyncTimer) return; const c = syncCfg(); if (!(c.auto && c.url && c.room)) return;
      window.__autoSyncTimer = setInterval(() => { syncPullSilent(); }, 15000);
    }
    async function syncPull() {
      const url = syncEndpoint(); if (!url) { toast('Configure a sync URL & room first', 'warn'); return; }
      confirmDelete({
        title: 'Pull cloud data?', body: 'This replaces the data in this browser with the latest from the cloud. (A local backup is taken first.)', confirmText: 'Pull & replace', danger: false, onYes: async () => {
          try {
            autoBackup(true); const res = await fetch(url, { headers: { 'Accept': 'application/json' } }); if (!res.ok) throw 0; const j = await res.json(); const data = (j && j.data) ? j.data : j;
            BACKUP_KEYS.forEach(k => { if (data[k] != null) DB.write(k, data[k]); }); setCfg({ syncPulledAt: nowISO() }); logEvent('Pulled data from cloud sync'); toast('Data pulled from cloud', 'ok'); go('/'); render();
          } catch (_) { toast('Pull failed — check the URL/room', 'bad'); }
        }
      });
    }
    function syncPanel() {
      const c = syncCfg();
      return `<div class="panel" style="margin-top:16px"><div class="ph"><h2>Cloud sync (cross-device)</h2>${c.url ? '<span class="chip ok">configured</span>' : '<span class="chip muted"></span>'}</div>
    <div class="pb"><p class="hint" style="margin-top:0">This app stores data in <b>each browser</b> by default, so an application submitted on a student's phone never reaches your admin laptop — hosting the HTML on GitHub Pages alone cannot fix that, since Pages can't store shared data. Point the app at <b>one shared storage endpoint</b> below and every device — student phones and staff dashboards — read and write the same data.</p>

    function askDeleteEvent(id) {

        confirmText: 'Move to Trash', onYes: () => {

          const relApps = apps.filter(a => a.eventId === id);
          trash.unshift({ id: uid('tr'), kind: 'event', label: e.title, deletedAt: nowISO(), by: (currentStaff() || {}).name || '', payload: { event: e, apps: relApps } }); logEvent('Deleted ' + (e.category === 'entrance_exam' ? 'entrance exam' : 'event') + ' ' + e.title);
          DB.write('events', events.filter(x => x.id !== id));

        }
      });
    }
